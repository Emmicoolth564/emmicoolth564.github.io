<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoJet Auth</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
        --neon: #00f0ff;
        --accent: #00ffcc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at top, #020617, #000814);
        color: white;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .wrapper {
        max-width: 420px;
        margin: 0 auto;
        padding: 40px 20px 100px;
    }

    .title {
        text-align: center;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--neon);
    }

    .subtitle {
        text-align: center;
        color: #94a3b8;
        margin-bottom: 50px;
        line-height: 1.6;
        font-size: 15px;
    }

    /* MODERN INPUT */
    .input-group {
        margin-bottom: 24px;
    }

    .input-group input {
        width: 100%;
        padding: 18px 24px;
        border-radius: 16px;
        border: 2px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.06);
        color: white;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    .input-group input:focus {
        border-color: var(--neon);
        box-shadow: 0 0 0 4px rgba(0,240,255,0.15);
        outline: none;
    }

    /* BUTTON */
    .btn {
        width: 100%;
        padding: 18px;
        border-radius: 16px;
        border: none;
        background: linear-gradient(90deg, #00ffcc, #00bfff);
        font-weight: 700;
        font-size: 17px;
        color: #000;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
        margin-top: 10px;
    }

    .btn:active {
        transform: scale(0.97);
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
    }

    /* REMEMBER */
    .remember {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0;
        font-size: 14px;
    }

    /* SWITCH */
    .switch {
        text-align: center;
        margin-top: 30px;
        color: var(--neon);
        cursor: pointer;
        font-size: 15px;
    }

    .footer-text {
        text-align: center;
        margin-top: 60px;
        color: #64748b;
        font-size: 13px;
        line-height: 1.6;
    }
</style>
</head>
<body>

<div class="wrapper">

    <div class="title" id="formTitle">Create Account</div>
    <div class="subtitle">
        Join CryptoJet and unlock automated mining earnings.<br>
        Secure • Fast • Reliable
    </div>

    <!-- NAME -->
    <div class="input-group">
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <!-- EMAIL / PHONE -->
    <div class="input-group">
        <input type="text" id="email" placeholder="Email or Phone Number">
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-group" id="confirmGroup">
        <input type="password" id="confirm" placeholder="Confirm Password">
    </div>

    <!-- REMEMBER ME -->
    <div class="remember">
        <input type="checkbox" id="remember" checked>
        <label for="remember">Remember Me</label>
    </div>

    <button class="btn" id="authBtn" onclick="handleAuth()">Sign Up</button>

    <div class="switch" id="switchText" onclick="toggleMode()">
        Already have an account? Sign In
    </div>

    <div class="footer-text">
        By signing up, you agree to our Terms and Privacy Policy.<br>
        Crypto investments involve risk.
    </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let isSignUp = true;

/* TOGGLE SIGN UP / SIGN IN */
function toggleMode() {
    isSignUp = !isSignUp;

    document.getElementById("formTitle").innerText = isSignUp ? "Create Account" : "Welcome Back";
    document.getElementById("authBtn").innerText = isSignUp ? "Sign Up" : "Sign In";
    document.getElementById("confirmGroup").style.display = isSignUp ? "block" : "none";
    document.getElementById("switchText").innerText = isSignUp 
        ? "Already have an account? Sign In" 
        : "Don't have an account? Sign Up";
}

/* HANDLE AUTH */
function handleAuth() {
    const btn = document.getElementById("authBtn");
    const originalText = btn.innerText;
    btn.innerText = "Processing...";

    const name = document.getElementById("name").value.trim();
    let emailInput = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirm").value.trim();

    if (!emailInput || !password) {
        alert("Please fill all required fields");
        btn.innerText = originalText;
        return;
    }

    let email = emailInput.includes("@") ? emailInput : emailInput + "@phone.crypto";

    if (isSignUp) {
        if (password !== confirm) {
            alert("Passwords do not match");
            btn.innerText = originalText;
            return;
        }

        auth.createUserWithEmailAndPassword(email, password)
        .then(async (userCred) => {
            const uid = userCred.user.uid;
            localStorage.setItem("uid", uid);

            // Generate unique miner ID
            let counterSnap = await db.ref("counter").once("value");
            let counter = (counterSnap.val() || 1000) + 1;
            db.ref("counter").set(counter);

            const minerId = "CJ" + counter;

            const userData = {
                name: name || "Miner",
                email: emailInput,
                balance: 0,
                level: "Novice Miner",
                minerId: minerId,
                points: 100,
                referrals: 0,
                createdAt: Date.now()
            };

            // Handle referral
            const referrer = localStorage.getItem("referrer");
            if (referrer && referrer !== uid) {
                userData.referredBy = referrer;
                db.ref("users/" + referrer + "/referrals").transaction(val => (val || 0) + 1);
            }

            await db.ref("users/" + uid).set(userData);
            localStorage.removeItem("referrer");

            alert("Account created successfully! 🚀\nYour Miner ID: " + minerId);
            window.location.href = "dashboard.html";
        })
        .catch(err => {
            alert(err.message);
            btn.innerText = originalText;
        });

    } else {
        // SIGN IN
        auth.signInWithEmailAndPassword(email, password)
        .then(userCred => {
            localStorage.setItem("uid", userCred.user.uid);

            // Remember Me
            if (document.getElementById("remember").checked) {
                localStorage.setItem("rememberedEmail", emailInput);
            } else {
                localStorage.removeItem("rememberedEmail");
            }

            alert("Sign in successful! Welcome back 🚀");
            window.location.href = "dashboard.html";
        })
        .catch(err => {
            if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password") {
                alert("Incorrect email or password");
            } else {
                alert(err.message);
            }
            btn.innerText = originalText;
        });
    }
}

/* AUTO FILL REMEMBERED EMAIL */
window.onload = () => {
    const remembered = localStorage.getItem("rememberedEmail");
    if (remembered) {
        document.getElementById("email").value = remembered;
        document.getElementById("remember").checked = true;
    }
};
</script>
</body>
</html>
