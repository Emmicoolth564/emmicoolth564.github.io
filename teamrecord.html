<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Income • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root { --neon: #00f0ff; --accent: #00ffcc; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
    }

    .header {
        padding: 20px 16px;
        display: flex;
        align-items: center;
        background: rgba(2,6,23,0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(34,197,94,0.15);
    }
    .back { font-size:28px; color:#22c55e; cursor:pointer; }
    .header h3 { flex:1; text-align:center; font-size:20px; font-weight:600; }

    .tabs {
        display:flex;
        background:#0f172a;
        border-radius:9999px;
        padding:6px;
        margin:20px 16px 16px;
    }
    .tab {
        flex:1;
        padding:12px;
        text-align:center;
        font-weight:600;
        border-radius:9999px;
        cursor:pointer;
        color:#94a3b8;
        font-size:14px;
    }
    .tab.active {
        background:#00ffcc;
        color:#000;
        box-shadow:0 4px 15px rgba(0,255,204,0.4);
    }

    .content-wrapper { padding:0 16px 30px; }

    .stat-row {
        display:flex;
        gap:12px;
        margin-bottom:20px;
    }
    .stat-box {
        flex:1;
        background:#0f172a;
        border-radius:16px;
        padding:16px;
        text-align:center;
    }
    .stat-number { font-size:28px; font-weight:700; color:#00ffcc; }
    .stat-label { font-size:13px; color:#94a3b8; }

    .record-card {
        background:#0f172a;
        border-radius:20px;
        padding:20px;
        margin-bottom:16px;
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }
    .record-header {
        display:flex;
        justify-content:space-between;
        margin-bottom:12px;
    }
    .pts { color:#00ffcc; font-weight:700; font-size:22px; }

    .empty {
        text-align:center;
        padding:80px 20px;
        color:#64748b;
    }
</style>
</head>
<body>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Team Income Record</h3>
</div>

<div class="tabs">
    <div class="tab active" onclick="setFilter('all')">All</div>
    <div class="tab" onclick="setFilter('today')">Today</div>
    <div class="tab" onclick="setFilter('week')">Week</div>
</div>

<div id="content" class="content-wrapper"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid = localStorage.getItem("uid");
if (!uid) window.location.href = "signin.html";

let filterType = "all";

function setFilter(type) {
    filterType = type;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    loadRecords();
}

function loadRecords() {
    db.ref("teamPoints/" + uid).once("value").then(snap => {
        const data = snap.val() || {};
        let records = Object.values(data);
        let total = 0, today = 0, week = 0;

        const now = Date.now();
        const content = document.getElementById("content");
        content.innerHTML = "";

        records.forEach(r => {
            total += r.points || 0;
            if (now - r.time < 86400000) today += r.points || 0;
            if (now - r.time < 604800000) week += r.points || 0;
        });

        // Filter
        let filtered = records.filter(r => {
            if (filterType === "today") return now - r.time < 86400000;
            if (filterType === "week") return now - r.time < 604800000;
            return true;
        });

        filtered.sort((a,b) => b.time - a.time);

        content.innerHTML = `
            <div class="stat-row">
                <div class="stat-box"><div class="stat-number">${total}</div><div class="stat-label">Total</div></div>
                <div class="stat-box"><div class="stat-number">${today}</div><div class="stat-label">Today</div></div>
                <div class="stat-box"><div class="stat-number">${week}</div><div class="stat-label">Week</div></div>
            </div>`;

        if (filtered.length === 0) {
            content.innerHTML += `<div class="empty">No team income records yet</div>`;
            return;
        }

        filtered.forEach(r => {
            const date = new Date(r.time);
            const row = document.createElement("div");
            row.className = "record-card";
            row.innerHTML = `
                <div class="record-header">
                    <div>
                        <strong>${r.from || "Referral"}</strong><br>
                        <small>Level ${r.level || 1}</small>
                    </div>
                    <div class="pts">+${r.points} pts</div>
                </div>
                <small style="color:#94a3b8;">${date.toLocaleDateString('en-NG')} • ${date.toLocaleTimeString('en-NG', {hour:'numeric', minute:'2-digit'})}</small>
            `;
            content.appendChild(row);
        });
    });
}

window.onload = loadRecords;
</script>
</body>
</html>
