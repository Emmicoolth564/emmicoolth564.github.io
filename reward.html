<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewards • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
        --neon: #00f0ff;
        --accent: #00ffcc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .header {
        padding: 30px 20px 20px;
        text-align: center;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--neon);
        text-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
    }

    .tabs {
        display:flex;
        background:#0f172a;
        border-radius:9999px;
        padding:6px;
        margin:20px 16px 16px;
    }
    .tab {
        flex:1;
        padding:14px;
        text-align:center;
        font-weight:600;
        border-radius:9999px;
        cursor:pointer;
        color:#94a3b8;
    }
    .tab.active {
        background:#22c55e;
        color:#022c22;
        box-shadow:0 4px 15px rgba(34,197,94,0.4);
    }

    .content-wrapper { padding:0 16px 30px; }

    .card {
        background: linear-gradient(145deg, #0f172a, #1e2937);
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        border: 1px solid rgba(0,240,255,0.15);
        transition: all 0.4s ease;
    }
    .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 25px 50px rgba(0,240,255,0.25);
    }

    .points {
        font-size: 32px;
        font-weight: 700;
        color: #00ffcc;
        margin: 8px 0;
    }

    .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(90deg, #00f0ff, #00ffcc);
        color: #000;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        margin-top: 16px;
        box-shadow: 0 0 20px rgba(0,240,255,0.4);
        transition: 0.3s;
    }
    .btn:disabled {
        background: #334155;
        color: #94a3b8;
        box-shadow: none;
        cursor: not-allowed;
    }

    .loader {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        flex-direction: column;
        color: #00f0ff;
        gap: 20px;
    }
    .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid rgba(0,240,255,0.2);
        border-top: 6px solid #00f0ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .how-it-works {
        background: #0f172a;
        border-radius: 20px;
        padding: 24px;
        margin: 30px 16px 20px;
        font-size: 14px;
        line-height: 1.6;
        color: #94a3b8;
    }

    .float {
        position: fixed;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 42px;
        font-weight: 700;
        color: #00ffcc;
        text-shadow: 0 0 30px #00ffcc;
        opacity: 0;
        pointer-events: none;
        z-index: 100000;
        animation: floatPop 1.8s ease forwards;
    }

    @keyframes floatPop {
        0% { transform: translate(-50%, -80%) scale(0.3); opacity: 0; }
        40% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -20%) scale(1); opacity: 0; }
    }
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Loading your rewards...</div>
</div>

<div class="header">REWARDS</div>

<div class="tabs">
    <div class="tab active" id="tab-miner" onclick="switchTab('miner', event)">Miner Referral</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup', event)">Signup Referral</div>
</div>

<div id="content" class="content-wrapper"></div>

<!-- HOW IT WORKS -->
<div class="how-it-works">
    <strong>How Rewards Work</strong><br><br>
    • Invite friends with your referral link<br>
    • When they buy any miner → you earn points instantly<br>
    • When they signup → you earn 10 points<br>
    • Claim your points anytime from here
</div>

<!-- FLOAT ANIMATION -->
<div id="float" class="float"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = localStorage.getItem("uid");
if (!uid) {
    alert("Please sign in first");
    window.location.href = "signin.html";
}

let currentTab = "miner";

/* SWITCH TAB */
function switchTab(tab, e) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    e.target.classList.add("active");
    render();
}

/* MAIN RENDER */
async function render() {
    const snap = await db.ref("users/" + uid).once("value");
    const d = snap.val() || {};

    document.getElementById("loader").style.display = "none";

    const content = document.getElementById("content");

    if (currentTab === "miner") {
        renderMiner(d);
    } else {
        renderSignup(d);
    }
}

/* MINER REFERRAL TAB - UPDATED POINTS */
function renderMiner(d) {
    const miners = [
        {name: "S-244", key: "S244", pts: 100},
        {name: "S-500", key: "S500", pts: 200},
        {name: "S-900", key: "S900", pts: 300},
        {name: "S-1200", key: "S1200", pts: 400}
    ];

    let html = `<div class="card"><strong>Earn points when your referrals buy miners</strong></div>`;

    miners.forEach(m => {
        const pending = d.pendingRewards?.[m.key] || 0;
        const claimed = d.minerRewardsClaimed?.[m.key];

        html += `
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <strong>${m.name}</strong><br>
                    <span style="color:#94a3b8;">${m.pts} Points</span>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:28px;color:#00ffcc;">${pending}</div>
                    <small>Available</small>
                </div>
            </div>

            <button onclick="claimMiner('${m.key}', ${m.pts})" class="btn" ${claimed || pending === 0 ? 'disabled' : ''}>
                ${claimed ? "Already Claimed" : pending > 0 ? "Claim Now" : "No points yet"}
            </button>
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
}

/* SIGNUP REFERRAL TAB - FIXED TO 10 POINTS */
function renderSignup(d) {
    const totalReferrals = d.referrals || 0;
    const claimed = d.signupClaimed || 0;
    const availablePoints = (totalReferrals * 10) - claimed;   // 10 points per signup

    let html = `
    <div class="card">
        <strong>Earn 10 points for every successful signup with your link</strong>
    </div>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <strong>Signup Referrals</strong><br>
                <span style="color:#94a3b8;">10 points each</span>
            </div>
            <div style="text-align:right;">
                <div style="font-size:32px;color:#00ffcc;">${availablePoints}</div>
                <small>Available Points</small>
            </div>
        </div>

        <button onclick="claimSignup(${availablePoints})" class="btn" ${availablePoints <= 0 ? 'disabled' : ''}>
            ${availablePoints > 0 ? "Claim Now" : "No points available"}
        </button>
    </div>`;

    document.getElementById("content").innerHTML = html;
}

/* CLAIM MINER REWARDS */
function claimMiner(key, pts) {
    db.ref("users/" + uid).once("value").then(snap => {
        const d = snap.val() || {};

        if (d.minerRewardsClaimed?.[key]) {
            showFloat("Already claimed ❌");
            return;
        }

        const pending = d.pendingRewards?.[key] || 0;
        if (pending === 0) {
            showFloat("No points to claim");
            return;
        }

        db.ref("users/" + uid).update({
            points: (d.points || 0) + pts,
            [`minerRewardsClaimed/${key}`]: true,
            [`pendingRewards/${key}`]: 0
        });

        showFloat(`+${pts} pts 💰`);
        render();
    });
}

/* CLAIM SIGNUP REWARDS - NOW 10 POINTS PER REFERRAL */
function claimSignup(pts) {
    if (pts <= 0) {
        showFloat("No points to claim");
        return;
    }

    db.ref("users/" + uid).once("value").then(snap => {
        const d = snap.val() || {};

        db.ref("users/" + uid).update({
            points: (d.points || 0) + pts,
            signupClaimed: (d.signupClaimed || 0) + pts
        });

        showFloat(`+${pts} pts 🎉`);
        render();
    });
}

/* FLOAT ANIMATION */
function showFloat(text) {
    const el = document.getElementById("float");
    el.innerText = text;
    el.style.animation = "none";
    void el.offsetWidth;
    el.style.animation = "floatPop 1.8s ease forwards";
}

/* INIT */
window.onload = () => {
    render();
};
</script>
</body>
</html>
