<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewards • CryptoJet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --neon:#00f0ff; --green:#00ffcc;
  --bg:#020617; --s1:#0c1628; --s2:#111f35;
  --border:rgba(0,255,204,0.12); --text:#e2e8f0; --muted:#64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { max-width:100vw; overflow-x:hidden; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; padding-bottom:30px;
}

/* ── LOADER ── */
.page-loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:99999; gap:16px; transition:opacity 0.4s;
}
.page-loader.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:44px; height:44px;
  border:4px solid rgba(0,255,204,0.15);
  border-top:4px solid var(--green);
  border-radius:50%; animation:spin 0.9s linear infinite;
}
@keyframes spin { to{ transform:rotate(360deg); } }
.loader-text { font-size:13px; color:var(--muted); font-family:'DM Sans',sans-serif; }

/* ── HEADER ── */
.header {
  padding:18px 18px 14px; text-align:center;
  font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700;
  color:var(--neon); text-shadow:0 0 28px rgba(0,240,255,0.5);
  border-bottom:1px solid var(--border);
  background:rgba(2,6,23,0.97); backdrop-filter:blur(16px);
  position:sticky; top:0; z-index:100;
}

/* ── TABS ── */
.tabs {
  display:flex; background:var(--s1);
  border-radius:999px; padding:5px;
  margin:16px 16px 0; gap:4px;
  border:1px solid var(--border);
}
.tab {
  flex:1; padding:12px 8px; text-align:center;
  font-weight:700; font-size:13px; border-radius:999px;
  cursor:pointer; color:var(--muted); transition:all 0.2s;
  font-family:'DM Sans',sans-serif;
}
.tab.active {
  background:linear-gradient(90deg,#00ffcc,#00f0ff);
  color:#022c22; box-shadow:0 4px 14px rgba(0,255,204,0.35);
}

/* ── CONTENT WRAPPER ── */
.content { padding:14px 16px 40px; }

/* ── POINTS SUMMARY CARD ── */
.points-card {
  background:linear-gradient(145deg,var(--s1),var(--s2));
  border-radius:20px; padding:18px 20px; margin-bottom:16px;
  border:1px solid rgba(0,240,255,0.2);
  display:flex; align-items:center; justify-content:space-between;
}
.pts-left .pts-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:5px; }
.pts-val { font-family:'Space Grotesk',sans-serif; font-size:36px; font-weight:700; color:var(--green); line-height:1; }
.pts-sub { font-size:12px; color:var(--muted); margin-top:4px; }
.pts-icon { font-size:40px; }

/* ── TIER DIVIDER ── */
.tier-divider {
  display:flex; align-items:center; gap:10px;
  margin:20px 0 10px;
}
.tier-divider-line { flex:1; height:1px; background:rgba(0,240,255,0.1); }
.tier-divider-label {
  font-size:10px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; color:#475569; white-space:nowrap;
}

/* ── MINER REWARD CARD ── */
.miner-card {
  background:linear-gradient(145deg,var(--s1),var(--s2));
  border-radius:18px; padding:16px 18px; margin-bottom:10px;
  border:1px solid var(--border); transition:border-color 0.2s;
}
.miner-card.has-pts { border-color:rgba(0,255,204,0.3); }
.miner-card-top {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:14px;
}
.miner-name { font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:700; }
.miner-earn-info { font-size:12px; color:var(--muted); margin-top:3px; }

.pts-ready-val { font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; color:var(--green); line-height:1; text-align:right; }
.pts-ready-lbl { font-size:10px; color:var(--muted); margin-top:2px; text-align:right; }

/* ── CLAIM BUTTON STYLES ── */
.claim-btn {
  width:100%; padding:13px; border:none; border-radius:13px;
  font-weight:700; font-size:14px; cursor:pointer;
  transition:all 0.2s; font-family:'DM Sans',sans-serif;
}
.claim-btn:active { transform:scale(0.97); }
.claim-btn:disabled {
  background:rgba(100,116,139,0.12) !important;
  color:#475569 !important; box-shadow:none !important;
  cursor:not-allowed; transform:none !important;
}
.btn-novice   { background:linear-gradient(90deg,#00f0ff,#00ffcc); color:#000; box-shadow:0 0 18px rgba(0,240,255,0.25); }
.btn-junior   { background:linear-gradient(90deg,#22c55e,#00ffcc); color:#000; box-shadow:0 0 18px rgba(34,197,94,0.3); }
.btn-pro      { background:linear-gradient(90deg,#00bfff,#00f0ff); color:#000; box-shadow:0 0 18px rgba(0,240,255,0.35); }
.btn-elite    { background:linear-gradient(90deg,#f59e0b,#fbbf24); color:#000; box-shadow:0 0 18px rgba(245,158,11,0.35); }
.btn-legend   { background:linear-gradient(90deg,#a855f7,#c084fc); color:#fff; box-shadow:0 0 18px rgba(168,85,247,0.35); }
.btn-employee { background:linear-gradient(90deg,#ef4444,#f97316); color:#fff; box-shadow:0 0 18px rgba(239,68,68,0.35); }

/* ── SIGNUP CARD ── */
.signup-card {
  background:linear-gradient(145deg,var(--s1),var(--s2));
  border-radius:20px; padding:22px; margin-bottom:14px;
  border:1px solid var(--border); text-align:center;
}
.signup-big { font-family:'Space Grotesk',sans-serif; font-size:52px; font-weight:700; color:var(--green); line-height:1; margin:10px 0 4px; }
.signup-sub { font-size:13px; color:var(--muted); margin-bottom:18px; }
.signup-avail { font-size:22px; font-weight:700; color:var(--green); margin-bottom:16px; font-family:'Space Grotesk',sans-serif; }

/* ── HOW IT WORKS BOX ── */
.how-box {
  background:var(--s1); border:1px solid rgba(0,240,255,0.08);
  border-radius:16px; padding:16px 18px; margin-top:16px;
  font-size:13px; line-height:1.8; color:var(--muted);
}
.how-box strong { color:var(--neon); display:block; margin-bottom:8px; font-family:'Space Grotesk',sans-serif; }
.how-row { display:flex; gap:8px; align-items:flex-start; }
.how-dot { width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; margin-top:7px; }

/* ── FLOAT POP ANIMATION ── */
.float-pop {
  position:fixed; top:30%; left:50%; transform:translate(-50%,-50%);
  font-size:36px; font-weight:700; color:var(--green);
  text-shadow:0 0 28px var(--green); opacity:0;
  pointer-events:none; z-index:100000;
  font-family:'Space Grotesk',sans-serif;
  animation:floatPop 1.8s ease forwards;
}
@keyframes floatPop {
  0%  { transform:translate(-50%,-80%) scale(0.3); opacity:0; }
  40% { transform:translate(-50%,-50%) scale(1.2); opacity:1; }
  100%{ transform:translate(-50%,-20%) scale(1);   opacity:0; }
}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  padding:11px 22px; border-radius:999px; font-weight:700; font-size:13px;
  opacity:0; transition:opacity 0.3s; z-index:99999; pointer-events:none;
  max-width:88vw; text-align:center; font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.toast.success { background:var(--green); color:#022c22; }
.toast.error   { background:#ef4444; color:#fff; }

/* ── TIER COLOR ACCENTS ── */
.name-novice   { color:#00f0ff; }
.name-junior   { color:#22c55e; }
.name-pro      { color:#00bfff; }
.name-elite    { color:#f59e0b; }
.name-legend   { color:#c084fc; }
.name-employee { color:#f87171; }
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="spinner"></div>
  <div class="loader-text">Loading rewards…</div>
</div>

<div class="header">⚡ REWARDS</div>

<div class="tabs">
  <div class="tab active" id="tabMiner"  onclick="switchTab('miner',this)">Miner Referral</div>
  <div class="tab"        id="tabSignup" onclick="switchTab('signup',this)">Signup Referral</div>
</div>

<div class="content" id="content"></div>
<div id="floatEl"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
/* ───────────────────────── FIREBASE INIT ───────────────────────── */
const firebaseConfig = {
  apiKey:      "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:  "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:   "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

/* ───────────────────────── MINER DEFINITIONS ───────────────────── */
// Keys MUST match exactly what buyMiner() stores in pendingRewards
const MINERS = [
  // NOVICE
  { key:"S244",  name:"S-244",           pts:50,   tier:"novice",   label:"⛏️ Novice"   },
  { key:"S500",  name:"S-500",           pts:75,   tier:"novice",   label:"⛏️ Novice"   },
  { key:"S900",  name:"S-900",           pts:100,  tier:"novice",   label:"⛏️ Novice"   },
  { key:"S1200", name:"S-1200",          pts:200,  tier:"novice",   label:"⛏️ Novice"   },
  // JUNIOR
  { key:"JX200", name:"JX-200 Turbo",    pts:300,  tier:"junior",   label:"🥈 Junior"   },
  { key:"JX500", name:"JX-500 Boost",    pts:500,  tier:"junior",   label:"🥈 Junior"   },
  // PRO
  { key:"PX1K",  name:"PX-1000 Apex",    pts:800,  tier:"pro",      label:"💎 Pro"      },
  { key:"PX2K",  name:"PX-2000 Core",    pts:1500, tier:"pro",      label:"💎 Pro"      },
  // ELITE
  { key:"EX3K",  name:"EX-1500 Blaze",   pts:2000, tier:"elite",    label:"🔥 Elite"    },
  { key:"EX5K",  name:"EX-2000 Inferno", pts:3000, tier:"elite",    label:"🔥 Elite"    },
  // LEGEND
  { key:"LX3K",  name:"LX-2200 Titan",   pts:4000, tier:"legend",   label:"👑 Legend"   },
  { key:"LX5K",  name:"LX-3000 Zeus",    pts:5000, tier:"legend",   label:"👑 Legend"   },
  // EMPLOYEE
  { key:"EM4K",  name:"EM-4000 Oracle",  pts:6000, tier:"employee", label:"🚀 Employee" },
  { key:"EM5K",  name:"EM-5000 Nexus",   pts:8000, tier:"employee", label:"🚀 Employee" },
];

const TIER_ORDER = ["novice","junior","pro","elite","legend","employee"];

/* ───────────────────────── STATE ───────────────────────────────── */
let currentTab  = "miner";
let userData    = {};        // live snapshot of users/{uid}
let unsubscribe = null;      // realtime listener cleanup

/* ───────────────────────── ENTRY POINT ─────────────────────────── */
// Follow the same auth pattern as miner.html / team.html
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = "signin.html"; return; }
  startRealtimeListener(user.uid);
});

/* ───────────────────────── REALTIME LISTENER ───────────────────── */
// Uses .on("value") — same pattern used in team.html for live updates.
// Fires immediately on load AND whenever Firebase data changes.
// This means the page always reflects the true DB state.
function startRealtimeListener(uid) {
  if (unsubscribe) unsubscribe();   // detach any old listener

  db.ref("users/" + uid).on("value", snap => {
    userData = snap.val() || {};
    document.getElementById("pageLoader").classList.add("hidden");
    renderCurrentTab();
  }, err => {
    console.error("DB read error:", err);
    showToast("Failed to load data — check connection", "error");
    document.getElementById("pageLoader").classList.add("hidden");
  });
}

/* ───────────────────────── TAB SWITCHING ───────────────────────── */
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === "miner") renderMinerTab();
  else                        renderSignupTab();
}

/* ───────────────────────── MINER REFERRAL TAB ──────────────────── */
function renderMinerTab() {
  const pending  = userData.pendingRewards || {};   // {S244: 0, JX200: 300, ...}
  const totalPts = userData.points || 0;

  // Group miners by tier preserving TIER_ORDER
  const byTier = {};
  MINERS.forEach(m => {
    if (!byTier[m.tier]) byTier[m.tier] = [];
    byTier[m.tier].push(m);
  });

  // Total claimable across all miner types
  const totalClaimable = MINERS.reduce((sum, m) => sum + (pending[m.key] || 0), 0);

  let html = `
    <div class="points-card">
      <div class="pts-left">
        <div class="pts-label">Total Points Balance</div>
        <div class="pts-val">${totalPts.toLocaleString()}</div>
        <div class="pts-sub">${totalClaimable > 0 ? totalClaimable.toLocaleString() + " pts ready to claim" : "No pending points"}</div>
      </div>
      <div class="pts-icon">🏆</div>
    </div>`;

  TIER_ORDER.forEach(tier => {
    const group = byTier[tier];
    if (!group) return;

    html += `
      <div class="tier-divider">
        <div class="tier-divider-line"></div>
        <div class="tier-divider-label">${group[0].label}</div>
        <div class="tier-divider-line"></div>
      </div>`;

    group.forEach(m => {
      // Read directly from pendingRewards — 0 if key not set (normal, not an error)
      const ptsReady = pending[m.key] || 0;
      const canClaim = ptsReady > 0;

      html += `
        <div class="miner-card ${canClaim ? "has-pts" : ""}">
          <div class="miner-card-top">
            <div>
              <div class="miner-name name-${m.tier}">${m.name}</div>
              <div class="miner-earn-info">+${m.pts.toLocaleString()} pts when your referral buys this</div>
            </div>
            <div>
              <div class="pts-ready-val" style="${canClaim ? "color:var(--green)" : "color:#334155"}">${ptsReady.toLocaleString()}</div>
              <div class="pts-ready-lbl">pts ready</div>
            </div>
          </div>
          <button
            class="claim-btn btn-${m.tier}"
            onclick="claimMinerPoints('${m.key}', '${m.name}')"
            ${canClaim ? "" : "disabled"}>
            ${canClaim ? "Claim " + ptsReady.toLocaleString() + " Points" : "No points yet"}
          </button>
        </div>`;
    });
  });

  html += `
    <div class="how-box">
      <strong>How Miner Rewards Work</strong>
      <div class="how-row"><div class="how-dot"></div><span>When your referral buys any miner, the points shown above are added to your pending balance</span></div>
      <div class="how-row"><div class="how-dot"></div><span>Claim anytime — points go straight to your total balance</span></div>
      <div class="how-row"><div class="how-dot"></div><span>Each new purchase by that referral adds more — you can claim again</span></div>
      <div class="how-row"><div class="how-dot"></div><span>Use points on the Exchange page to convert to Team Income</span></div>
    </div>`;

  document.getElementById("content").innerHTML = html;
}

/* ───────────────────────── SIGNUP REFERRAL TAB ─────────────────── */
function renderSignupTab() {
  const totalPts      = userData.points || 0;
  const totalSignups  = userData.referrals || 0;               // count of people who signed up with your code
  const available     = (userData.pendingRewards || {}).signup || 0;  // unclaimed signup pts

  const html = `
    <div class="points-card">
      <div class="pts-left">
        <div class="pts-label">Total Points Balance</div>
        <div class="pts-val">${totalPts.toLocaleString()}</div>
        <div class="pts-sub">${available > 0 ? available.toLocaleString() + " pts ready to claim" : "No pending points"}</div>
      </div>
      <div class="pts-icon">🏆</div>
    </div>

    <div class="signup-card">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Total Signup Referrals</div>
      <div class="signup-big">${totalSignups.toLocaleString()}</div>
      <div class="signup-sub">${totalSignups} person${totalSignups !== 1 ? "s" : ""} signed up using your code · 3 pts each</div>
      <div class="signup-avail">${available.toLocaleString()} pts available</div>
      <button
        class="claim-btn btn-novice"
        onclick="claimSignupPoints()"
        ${available > 0 ? "" : "disabled"}>
        ${available > 0 ? "Claim " + available.toLocaleString() + " Points" : "Nothing to claim yet"}
      </button>
    </div>

    <div class="how-box">
      <strong>How Signup Rewards Work</strong>
      <div class="how-row"><div class="how-dot"></div><span>Someone signs up using your referral link or code → you earn 3 pts instantly</span></div>
      <div class="how-row"><div class="how-dot"></div><span>Points accumulate here until you claim them — no expiry</span></div>
      <div class="how-row"><div class="how-dot"></div><span>Past unclaimed referrals are all counted and shown above</span></div>
      <div class="how-row"><div class="how-dot"></div><span>Use points on the Exchange page to convert to Team Income</span></div>
    </div>`;

  document.getElementById("content").innerHTML = html;
}

/* ───────────────────────── CLAIM — MINER ───────────────────────── */
// Pattern: read own data (allowed), write own data (allowed).
// No transaction needed — user owns this node so read+write is fine.
async function claimMinerPoints(minerKey, minerName) {
  const uid = localStorage.getItem("uid");
  disableAllButtons();

  try {
    // Fresh read — never rely on cached userData for financial ops
    const snap    = await db.ref("users/" + uid).once("value");
    const live    = snap.val() || {};
    const pending = live.pendingRewards || {};
    const pts     = pending[minerKey] || 0;

    if (pts <= 0) {
      showToast("No points to claim for " + minerName, "error");
      return;
    }

    const newPoints = (live.points || 0) + pts;

    // Write: add pts to balance, zero out this miner's pending
    await db.ref("users/" + uid).update({
      points: newPoints,
      ["pendingRewards/" + minerKey]: 0
    });

    // The realtime listener above will fire automatically and re-render
    showFloat("+" + pts.toLocaleString() + " pts 💰");
    showToast("Claimed " + pts.toLocaleString() + " pts from " + minerName + "!", "success");

  } catch (err) {
    console.error("Claim error:", err);
    showToast("Claim failed — please try again", "error");
  }
}

/* ───────────────────────── CLAIM — SIGNUP ──────────────────────── */
async function claimSignupPoints() {
  const uid = localStorage.getItem("uid");
  disableAllButtons();

  try {
    const snap    = await db.ref("users/" + uid).once("value");
    const live    = snap.val() || {};
    const pending = live.pendingRewards || {};
    const pts     = pending.signup || 0;

    if (pts <= 0) {
      showToast("No signup points to claim", "error");
      return;
    }

    const newPoints = (live.points || 0) + pts;

    await db.ref("users/" + uid).update({
      points: newPoints,
      "pendingRewards/signup": 0
    });

    showFloat("+" + pts.toLocaleString() + " pts 🎉");
    showToast("Claimed " + pts.toLocaleString() + " signup pts!", "success");

  } catch (err) {
    console.error("Claim error:", err);
    showToast("Claim failed — please try again", "error");
  }
}

/* ───────────────────────── UI HELPERS ──────────────────────────── */
function disableAllButtons() {
  document.querySelectorAll(".claim-btn").forEach(b => b.disabled = true);
}

function showFloat(text) {
  const el = document.createElement("div");
  el.className = "float-pop";
  el.textContent = text;
  document.getElementById("floatEl").appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast " + type;
  t.style.opacity = 1;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = 0, 3000);
}
</script>
</body>
</html>
