<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Jet.co - Team</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#000814;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND FLOAT */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.orb{
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle,#00ffcc33,transparent);
  border-radius:50%;
  filter:blur(100px);
  animation:move 20s infinite alternate;
}

.orb:nth-child(2){left:60%; top:40%;}
.orb:nth-child(3){left:20%; top:70%;}

@keyframes move{
  0%{transform:translate(0,0);}
  100%{transform:translate(100px,-80px);}
}

/* HEADER */
.logo-container{
  display:flex;
  justify-content:center;
  margin-top:25px;
}

.logo-text{
  font-size:55px;
  font-weight:900;
  fill:none;
  stroke:#00ffcc;
  stroke-width:2;
  stroke-dasharray:600;
  stroke-dashoffset:600;
  animation:write 3s ease forwards, glow 2s infinite alternate;
}

@keyframes write{
  to{stroke-dashoffset:0;}
}

@keyframes glow{
  from{text-shadow:0 0 10px #00ffcc;}
  to{text-shadow:0 0 30px #00ffcc;}
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:10px;
}

/* USER ID */
.user-id{
  text-align:center;
  color:#94a3b8;
  margin-bottom:20px;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  padding:10px;
}

.stat{
  flex:1;
  background:#0f172a;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 20px #00ffcc22;
  animation:fadeUp .8s ease;
}

.stat h3{
  margin:0;
  color:#00ffcc;
}

.stat p{
  margin:5px 0 0;
  font-size:12px;
  color:#aaa;
}

/* TABLE */
.table{
  margin:15px;
  border-radius:15px;
  overflow:hidden;
  background:#0f172a;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .6s forwards;
}

.row.header{
  background:#020617;
  opacity:1;
  transform:none;
}

/* LEVEL COLORS */
.level1{color:#22c55e;}
.level2{color:#0ea5e9;}
.level3{color:#f59e0b;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:65px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-item{
  text-align:center;
  font-size:11px;
  color:#aaa;
}

.nav-item img{
  width:22px;
  display:block;
  margin:auto;
  margin-bottom:4px;
  filter:brightness(.6);
}

.nav-item.active img{
  filter:brightness(1.5) drop-shadow(0 0 8px #00ffcc);
}

.nav-item.active{
  color:#00ffcc;
}

/* ANIMATION */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<div class="bg">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- HEADER -->
<div class="logo-container">
<svg viewBox="0 0 600 120">
<text x="10" y="80" class="logo-text">CryptoJet</text>
</svg>
</div>

<div class="subtitle">Team Network</div>

<div class="user-id">User ID: <span id="uid"></span></div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h3 id="total">0</h3>
    <p>Total Team</p>
  </div>
  <div class="stat">
    <h3 id="lvl1">0</h3>
    <p>Level 1</p>
  </div>
  <div class="stat">
    <h3 id="lvl2">0</h3>
    <p>Level 2</p>
  </div>
  <div class="stat">
    <h3 id="lvl3">0</h3>
    <p>Level 3</p>
  </div>
</div>

<!-- TABLE -->
<div class="table" id="teamTable">

<div class="row header">
  <div>User ID</div>
  <div>Level</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-item" onclick="location.href='dashboard.html'">
    <img src="./home.png">Home
  </div>
  <div class="nav-item" onclick="location.href='miner.html'">
    <img src="./miner.png">Miner
  </div>
  <div class="nav-item active" onclick="location.href='me.html'">
    <img src="./user.png">Me
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid = localStorage.getItem("uid");
db.ref("users/" + uid).once("value", snap=>{
  const data = snap.val();
  document.getElementById("uid").innerText = data?.minerId || uid;
});

let total=0, l1=0, l2=0, l3=0;

const table = document.getElementById("teamTable");

db.ref("users").once("value", snap=>{
  let users = snap.val();

 let level1=[], level2=[], level3=[];

for(let id in users){
  let user = users[id];

  if(user.referredBy === uid){
    level1.push(user.minerId);
  }
}

for(let id in users){
  let user = users[id];

  if(level1.includes(user.referredBy)){
    level2.push(user.minerId);
  }
}

for(let id in users){
  let user = users[id];

  if(level2.includes(user.referredBy)){
    level3.push(user.minerId);
  }
}

  function add(uid, lvl, cls){
    let div = document.createElement("div");
    div.className="row";
    div.innerHTML=`<div>${uid}</div><div class="${cls}">${lvl}</div>`;
    table.appendChild(div);
    total++;
  }

  level1.forEach(u=>{add(u,"Level 1","level1"); l1++;});
  level2.forEach(u=>{add(u,"Level 2","level2"); l2++;});
  level3.forEach(u=>{add(u,"Level 3","level3"); l3++;});

  document.getElementById("total").innerText=total;
  document.getElementById("lvl1").innerText=l1;
  document.getElementById("lvl2").innerText=l2;
  document.getElementById("lvl3").innerText=l3;
});
</script>

</body>
</html>
