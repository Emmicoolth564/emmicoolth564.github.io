<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Network • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root { --neon: #00f0ff; --accent: #00ffcc; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .header {
        padding: 20px 16px;
        display: flex;
        align-items: center;
        background: rgba(2,6,23,0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(34,197,94,0.15);
    }
    .back { font-size:28px; color:#22c55e; cursor:pointer; }
    .header h3 { flex:1; text-align:center; font-size:20px; font-weight:600; }

    .tabs {
        display:flex;
        background:#0f172a;
        border-radius:9999px;
        padding:6px;
        margin:20px 16px 16px;
    }
    .tab {
        flex:1;
        padding:12px;
        text-align:center;
        font-weight:600;
        border-radius:9999px;
        cursor:pointer;
        color:#94a3b8;
        font-size:14px;
    }
    .tab.active {
        background:#00ffcc;
        color:#000;
        box-shadow:0 4px 15px rgba(0,255,204,0.4);
    }

    .content-wrapper { padding:0 16px 30px; }

    .stat-row {
        display:flex;
        gap:12px;
        margin-bottom:20px;
    }
    .stat-box {
        flex:1;
        background:#0f172a;
        border-radius:16px;
        padding:16px;
        text-align:center;
    }
    .stat-number { font-size:28px; font-weight:700; color:#00ffcc; }
    .stat-label { font-size:13px; color:#94a3b8; }

    .team-table {
        background:#0f172a;
        border-radius:20px;
        overflow:hidden;
    }
    .table-header {
        display:flex;
        padding:16px;
        background:#020617;
        font-weight:600;
        color:#94a3b8;
    }
    .table-row {
        display:flex;
        padding:16px;
        border-top:1px solid rgba(255,255,255,0.05);
    }
    .level1 { color:#22c55e; }
    .level2 { color:#0ea5e9; }
    .level3 { color:#f59e0b; }

    .empty {
        text-align:center;
        padding:60px 20px;
        color:#64748b;
    }
</style>
</head>
<body>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Team Network</h3>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">All</div>
    <div class="tab" onclick="switchTab(1)">Level 1</div>
    <div class="tab" onclick="switchTab(2)">Level 2</div>
    <div class="tab" onclick="switchTab(3)">Level 3</div>
</div>

<div class="content-wrapper">
    <div class="stat-row">
        <div class="stat-box">
            <div class="stat-number" id="total">0</div>
            <div class="stat-label">Total Team</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="lvl1">0</div>
            <div class="stat-label">Level 1</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="lvl2">0</div>
            <div class="stat-label">Level 2</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="lvl3">0</div>
            <div class="stat-label">Level 3</div>
        </div>
    </div>

    <div class="team-table" id="teamTable">
        <!-- Populated by JS -->
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let uid = localStorage.getItem("uid");
if (!uid) window.location.href = "signin.html";

let currentLevel = 0;

function switchTab(level) {
    currentLevel = level;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab')[level].classList.add('active');
    loadTeam();
}

function loadTeam() {
    db.ref("users").once("value", snap => {
        const users = snap.val() || {};
        let total = 0, l1 = 0, l2 = 0, l3 = 0;

        const map = {};
        for (let id in users) {
            let u = users[id] || {};
            map[id] = {
                uid: id,
                minerId: u.minerId || "CJ-" + id.slice(-6),
                referredBy: u.referredBy
            };
        }

        let level1 = [], level2 = [], level3 = [];

        // Level 1
        for (let id in map) {
            let u = map[id];
            if (u.referredBy === uid || u.referredBy === map[uid]?.minerId) {
                level1.push(u);
                l1++;
                total++;
            }
        }

        // Level 2
        level1.forEach(a => {
            for (let id in map) {
                let u = map[id];
                if (u.referredBy === a.uid || u.referredBy === a.minerId) {
                    level2.push(u);
                    l2++;
                    total++;
                }
            }
        });

        // Level 3
        level2.forEach(a => {
            for (let id in map) {
                let u = map[id];
                if (u.referredBy === a.uid || u.referredBy === a.minerId) {
                    level3.push(u);
                    l3++;
                    total++;
                }
            }
        });

        document.getElementById("total").innerText = total;
        document.getElementById("lvl1").innerText = l1;
        document.getElementById("lvl2").innerText = l2;
        document.getElementById("lvl3").innerText = l3;

        const table = document.getElementById("teamTable");
        table.innerHTML = `
            <div style="display:flex;padding:16px;background:#020617;font-weight:600;color:#94a3b8;">
                <div style="flex:1">Miner ID</div>
                <div style="flex:1">Level</div>
            </div>`;

        let list = [];
        if (currentLevel === 0) list = [...level1, ...level2, ...level3];
        else if (currentLevel === 1) list = level1;
        else if (currentLevel === 2) list = level2;
        else if (currentLevel === 3) list = level3;

        if (list.length === 0) {
            table.innerHTML += `<div class="empty">No team members in this level yet</div>`;
            return;
        }

        list.forEach(u => {
            let levelClass = currentLevel === 1 ? "level1" : currentLevel === 2 ? "level2" : "level3";
            let levelText = currentLevel === 0 ? "—" : `Level ${currentLevel}`;

            const row = document.createElement("div");
            row.style.cssText = "display:flex;padding:16px;border-top:1px solid rgba(255,255,255,0.05);";
            row.innerHTML = `
                <div style="flex:1">${u.minerId}</div>
                <div style="flex:1;color:#00ffcc;">${levelText}</div>
            `;
            table.appendChild(row);
        });
    });
}

window.onload = loadTeam;
</script>
</body>
</html>
