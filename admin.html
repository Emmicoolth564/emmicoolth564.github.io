<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • CryptoJet</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020617; --s1:#0c1628; --s2:#111f35; --s3:#1a2d45;
  --neon:#00f0ff; --green:#22c55e; --gold:#f59e0b;
  --red:#ef4444; --purple:#a855f7;
  --border:rgba(0,240,255,0.12);
  --text:#e2e8f0; --muted:#64748b; --subtle:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{padding:18px 20px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--neon);letter-spacing:1px;}
.header-badge{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.strip-item{background:var(--s1);padding:14px;text-align:center;}
.strip-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--neon);}
.strip-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px;}

/* TABS */
.tabs-bar{display:flex;gap:6px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:65px;z-index:199;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;color:var(--muted);background:var(--s1);transition:all 0.2s;}
.tab.active{background:rgba(0,240,255,0.1);border-color:var(--neon);color:var(--neon);}

/* SEARCH */
.search-wrap{padding:14px 16px;}
.search-input{width:100%;padding:12px 16px;background:var(--s1);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
.search-input:focus{outline:none;border-color:var(--neon);}

/* USER CARDS */
.users-grid{padding:0 16px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.user-card{background:var(--s1);border-radius:18px;padding:18px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
.user-card:hover{border-color:rgba(0,240,255,0.35);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,240,255,0.08);}
.uc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.uc-id{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--neon);}
.uc-level{font-size:11px;color:var(--muted);background:var(--s2);padding:3px 8px;border-radius:6px;}
.uc-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
.uc-row:last-child{border-bottom:none;}
.uc-lbl{color:var(--muted);}
.uc-val{font-weight:700;color:var(--text);}
.uc-val.green{color:var(--green);}
.uc-val.gold{color:var(--gold);}

/* TX CARDS */
.tx-list{padding:0 16px 80px;display:flex;flex-direction:column;gap:10px;}
.tx-card{background:var(--s1);border-radius:16px;padding:16px 18px;border:1px solid var(--border);}
.tx-top{display:flex;justify-content:space-between;align-items:flex-start;}
.tx-type{font-size:14px;font-weight:700;color:var(--neon);margin-bottom:3px;}
.tx-date{font-size:12px;color:var(--muted);}
.tx-amount{font-size:17px;font-weight:700;margin-bottom:4px;}
.badge{display:inline-block;padding:3px 10px;border-radius:7px;font-size:11px;font-weight:700;text-transform:uppercase;}
.badge.approved{background:rgba(34,197,94,0.15);color:var(--green);}
.badge.pending{background:rgba(245,158,11,0.15);color:var(--gold);}
.badge.rejected{background:rgba(239,68,68,0.15);color:var(--red);}

/* ACTION BUTTONS on TX cards */
.tx-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);}
.tx-action-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.tx-action-btn.approve{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.tx-action-btn.approve:hover{background:var(--green);color:#000;}
.tx-action-btn.reject{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.tx-action-btn.reject:hover{background:var(--red);color:#fff;}
.tx-action-btn:disabled{opacity:0.45;cursor:not-allowed;}

/* LOAD MORE */
.load-more-btn{display:block;width:calc(100% - 32px);margin:0 16px 80px;padding:14px;background:var(--s1);border:1.5px solid var(--border);border-radius:14px;color:var(--neon);font-size:14px;font-weight:700;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.load-more-btn:hover{border-color:var(--neon);background:rgba(0,240,255,0.05);}

/* ── USER DETAIL PANEL ───────────────────────── */
.detail-panel{position:fixed;inset:0;background:var(--bg);z-index:500;overflow-y:auto;display:none;padding-bottom:60px;}
.detail-panel.open{display:block;}

.dp-header{padding:18px 16px;display:flex;align-items:center;gap:12px;background:rgba(2,6,23,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.dp-back{font-size:26px;color:var(--neon);cursor:pointer;}
.dp-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--neon);}

.dp-hero{padding:20px 16px;background:linear-gradient(135deg,#0c1628,#111f35);border-bottom:1px solid var(--border);}
.dp-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--neon);margin-bottom:4px;}
.dp-uid{font-size:12px;color:var(--muted);word-break:break-all;margin-bottom:14px;}

.dp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dp-stat{background:rgba(2,6,23,0.6);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--border);}
.dp-stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--neon);}
.dp-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;}

.dp-tabs{display:flex;gap:6px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.dp-tabs::-webkit-scrollbar{display:none;}
.dp-tab{flex-shrink:0;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;color:var(--muted);background:var(--s1);}
.dp-tab.active{background:rgba(0,240,255,0.1);border-color:var(--neon);color:var(--neon);}

.dp-content{padding:16px;}

/* SECTION CARDS */
.sec-card{background:var(--s1);border-radius:16px;padding:16px 18px;margin-bottom:12px;border:1px solid var(--border);}
.sec-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
.sec-row:last-child{border-bottom:none;}
.sec-lbl{color:var(--muted);}
.sec-val{font-weight:600;color:var(--text);}
.sec-title{font-size:13px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}

/* REFERRAL */
.ref-person{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s2);border-radius:12px;margin-bottom:8px;cursor:pointer;}
.ref-avatar{width:36px;height:36px;border-radius:50%;background:rgba(0,255,204,0.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--neon);flex-shrink:0;}
.ref-id{font-size:14px;font-weight:700;color:var(--text);}
.ref-meta{font-size:11px;color:var(--muted);}

/* BALANCE ADJUST */
.adjust-form{background:var(--s1);border-radius:16px;padding:18px;border:1px solid var(--border);margin-bottom:12px;}
.adj-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;margin-top:14px;display:block;}
.adj-label:first-of-type{margin-top:0;}
.adj-input{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
.adj-input:focus{outline:none;border-color:var(--neon);}
.adj-btns{display:flex;gap:10px;margin-top:16px;}
.adj-btn{flex:1;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.adj-btn.add{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.adj-btn.add:hover{background:var(--green);color:#000;}
.adj-btn.deduct{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.adj-btn.deduct:hover{background:var(--red);color:#000;}
.adj-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* SUCCESS FLASH */
.adj-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--green);font-weight:600;display:none;margin-top:12px;text-align:center;}

/* MINI RECORD */
.mini-rec{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
.mini-rec:last-child{border-bottom:none;}
.mini-lbl{color:var(--subtle);}
.mini-val{font-weight:600;}
.mini-val.pos{color:var(--green);}
.mini-val.neg{color:var(--red);}
.mini-val.team{color:var(--gold);}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green);color:#022c22;padding:12px 24px;border-radius:999px;font-weight:700;font-size:14px;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;white-space:nowrap;}

.lvl-sel{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-spin{width:32px;height:32px;border:3px solid rgba(0,240,255,0.1);border-top:3px solid var(--neon);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 12px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">⚡ CryptoJet Admin</div>
  <div class="header-badge" id="pendingBadge" onclick="switchTab('pending',this)">0 Pending</div>
</div>

<!-- STAT STRIP -->
<div class="stat-strip">
  <div class="strip-item"><div class="strip-val" id="statUsers">—</div><div class="strip-lbl">Users</div></div>
  <div class="strip-item"><div class="strip-val" id="statBalance">—</div><div class="strip-lbl">Total Balance</div></div>
  <div class="strip-item"><div class="strip-val" id="statPending">—</div><div class="strip-lbl">Pending</div></div>
  <div class="strip-item"><div class="strip-val" id="statMiners">—</div><div class="strip-lbl">Active Miners</div></div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <div class="tab active" id="tab-users"   onclick="switchTab('users',this)">👥 Users</div>
  <div class="tab"        id="tab-pending" onclick="switchTab('pending',this)">⏳ Pending</div>
  <div class="tab"        id="tab-all-tx"  onclick="switchTab('all-tx',this)">📋 All Tx</div>
</div>

<!-- VIEWS -->
<div id="view-users">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="🔍 Search by Miner ID or name..." oninput="filterUsers(this.value)">
  </div>
  <div class="users-grid" id="usersGrid">
    <div class="empty"><div class="empty-spin"></div></div>
  </div>
</div>
<div id="view-pending" style="display:none"><div class="tx-list" id="pendingList"></div></div>
<div id="view-all-tx"  style="display:none">
  <div class="tx-list" id="allTxList"></div>
  <button class="load-more-btn" id="loadMoreBtn" style="display:none" onclick="loadMoreTx()">Load More Transactions</button>
</div>

<!-- USER DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <div class="dp-header">
    <div class="dp-back" onclick="closeDetail()">←</div>
    <div class="dp-title" id="dpTitle">User Detail</div>
  </div>
  <div id="dpBody"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey:      "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:  "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:   "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const ADMIN_UID            = "1G40GHwudBcea5GGdEeIIKFT5rL2";
const myUid                = localStorage.getItem("uid");
const URL_APPROVE_RECHARGE = "https://approverecharge-t34xxkwqvq-ew.a.run.app";
const URL_REJECT_RECHARGE  = "https://rejectrecharge-t34xxkwqvq-ew.a.run.app";
const SECRET               = "cryptojet_secret_2024";
const TX_PAGE_SIZE         = 20;

let allUsers       = {};
let currentOpenUid = null;
// Tx are NEVER bulk-loaded. Each tab fetches only what it needs from Firebase.
let allTxOldestKey = null;   // cursor for "All Tx" pagination
let allTxExhausted = false;  // no more pages left

// ── BOOT — only load users, pending count is a separate lightweight query ──
window.addEventListener("load", () => {
  auth.onAuthStateChanged(async user => {
    if (!user || user.uid !== ADMIN_UID) {
      alert("Access denied");
      window.location.href = "signin.html";
      return;
    }
    await loadUsers();
    loadPendingCount();
    const params  = new URLSearchParams(window.location.search);
    const deepUid = params.get("uid");
    if (deepUid && allUsers[deepUid]) openDetail(deepUid, allUsers[deepUid]);
  });
});
// ── LOAD USERS ────────────────────────────────────────────────
async function loadUsers() {
  const snap = await db.ref("users").once("value");
  allUsers = snap.val() || {};
  updateStripStats();
  renderUsers();
}

// ── PENDING COUNT — only fetches pending status, very small payload ──
async function loadPendingCount() {
  const snap  = await db.ref("transactions").orderByChild("status").equalTo("pending").once("value");
  const count = snap.numChildren();
  document.getElementById("pendingBadge").textContent = count + " Pending";
  document.getElementById("statPending").textContent  = count;
}

function updateStripStats() {
  const users  = Object.values(allUsers);
  const total  = users.reduce((s, u) => s + (u.balance || 0), 0);
  const miners = users.reduce((s, u) => s + Object.keys(u.minerUnlocked || {}).length, 0);
  document.getElementById("statUsers").textContent   = users.length;
  document.getElementById("statBalance").textContent = "$" + Math.floor(total);
  document.getElementById("statMiners").textContent  = miners;
}

// ── TAB SWITCH ────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (el) el.classList.add("active");
  document.getElementById("view-users").style.display   = name === "users"   ? "block" : "none";
  document.getElementById("view-pending").style.display = name === "pending" ? "block" : "none";
  document.getElementById("view-all-tx").style.display  = name === "all-tx"  ? "block" : "none";
  if (name === "pending") renderPending();
  if (name === "all-tx")  renderAllTx(true);
}

// ── RENDER USERS ──────────────────────────────────────────────
function renderUsers(filter = "") {
  const grid = document.getElementById("usersGrid");
  grid.innerHTML = "";
  Object.entries(allUsers).forEach(([uid, u]) => {
    const id = u.minerId || "N/A";
    if (filter && !id.toLowerCase().includes(filter.toLowerCase()) && !(u.name||"").toLowerCase().includes(filter.toLowerCase())) return;
    const teamSize = Object.values(allUsers).filter(x => x.referredBy === uid).length;
    const card     = document.createElement("div");
    card.className = "user-card";
    card.onclick   = () => openDetail(uid, u);
    card.innerHTML = `
      <div class="uc-header">
        <div class="uc-id">${id}</div>
        <div class="uc-level">${u.level || "Novice"}</div>
      </div>
      <div class="uc-row"><span class="uc-lbl">Name</span><span class="uc-val">${u.name||"—"}</span></div>
      <div class="uc-row"><span class="uc-lbl">Balance</span><span class="uc-val green">$${Math.floor(u.balance||0)}</span></div>
      <div class="uc-row"><span class="uc-lbl">Team Income</span><span class="uc-val gold">$${(u.team||0).toFixed(2)}</span></div>
      <div class="uc-row"><span class="uc-lbl">Team Size</span><span class="uc-val">${teamSize} members</span></div>
      <div class="uc-row"><span class="uc-lbl">Referred By</span><span class="uc-val">${getReferrerName(u.referredBy)}</span></div>`;
    grid.appendChild(card);
  });
  if (!grid.children.length) grid.innerHTML = `<div class="empty">No users found</div>`;
}

function filterUsers(v) { renderUsers(v); }
function getReferrerName(refUid) {
  if (!refUid) return "None";
  return (allUsers[refUid] && allUsers[refUid].minerId) || "Unknown";
}

// ── PENDING — fetches ONLY pending records from Firebase ──────
async function renderPending() {
  const list = document.getElementById("pendingList");
  list.innerHTML = `<div class="empty"><div class="empty-spin"></div></div>`;
  const snap    = await db.ref("transactions").orderByChild("status").equalTo("pending").once("value");
  const entries = [];
  snap.forEach(child => entries.push([child.key, child.val()]));
  entries.sort((a,b) => (b[1].date||0) - (a[1].date||0));
  list.innerHTML = entries.length ? "" : `<div class="empty">No pending transactions</div>`;
  entries.forEach(([txId, tx]) => list.appendChild(buildTxCard(txId, tx, allUsers[tx.uid]||{}, true)));
}

// ── ALL TX — Firebase cursor pagination, 20 records at a time ─
async function renderAllTx(reset = true) {
  if (reset) {
    allTxOldestKey = null;
    allTxExhausted = false;
    document.getElementById("allTxList").innerHTML = `<div class="empty"><div class="empty-spin"></div></div>`;
  }
  if (allTxExhausted) return;

  const list = document.getElementById("allTxList");
  const btn  = document.getElementById("loadMoreBtn");
  btn.disabled = true;
  btn.textContent = "Loading...";

  // Fetch TX_PAGE_SIZE + 1 so we know if there's a next page
  let query = db.ref("transactions").orderByKey().limitToLast(TX_PAGE_SIZE + 1);
  if (allTxOldestKey) query = query.endAt(allTxOldestKey);

  const snap    = await query.once("value");
  const entries = [];
  snap.forEach(child => entries.push([child.key, child.val()]));

  // If we used a cursor, the first result is the duplicate of the previous page's last item — drop it
  if (allTxOldestKey) entries.shift();

  // Sort newest first (Firebase orderByKey gives oldest first)
  entries.sort((a,b) => (b[1].date||0) - (a[1].date||0));

  // Determine if more pages exist
  const hasMore = entries.length > TX_PAGE_SIZE;
  const page    = hasMore ? entries.slice(0, TX_PAGE_SIZE) : entries;

  if (reset) list.innerHTML = "";
  page.forEach(([txId, tx]) => list.appendChild(buildTxCard(txId, tx, allUsers[tx.uid]||{}, false)));

  // Update cursor to oldest key in this page
  if (page.length) allTxOldestKey = page[page.length - 1][0];

  allTxExhausted = !hasMore;
  btn.disabled    = false;
  btn.textContent = "Load More Transactions";
  btn.style.display = allTxExhausted ? "none" : "block";
}

function loadMoreTx() { renderAllTx(false); }

// ── BUILD TX CARD ─────────────────────────────────────────────
function buildTxCard(txId, tx, u, showUser) {
  const card  = document.createElement("div");
  card.id     = "txcard-" + txId;
  card.className = "tx-card";
  const date  = tx.date ? new Date(tx.date).toLocaleString("en-NG") : "—";
  const color = tx.type === "recharge" ? "color:#22c55e" : "color:#f87171";
  const pref  = tx.type === "recharge" ? "+" : "−";

  const actionsHTML = (tx.status === "pending" && tx.type === "recharge") ? `
    <div class="tx-actions">
      <button class="tx-action-btn approve" id="approve-${txId}" onclick="handleApprove('${txId}')">✅ Approve</button>
      <button class="tx-action-btn reject"  id="reject-${txId}"  onclick="handleReject('${txId}')">❌ Reject</button>
    </div>` : "";

  card.innerHTML = `
    <div class="tx-top">
      <div class="tx-info" style="cursor:${showUser?'pointer':'default'}" ${showUser&&u.minerId?`onclick="openDetail('${tx.uid}',null)"`:""}> 
        <div class="tx-type">${(tx.type||"tx").toUpperCase()} ${showUser?`· <span style="color:var(--neon)">${u.minerId||tx.uid.slice(0,8)}</span>`:""}</div>
        <div class="tx-date">${date} · ${tx.method||"—"}</div>
        ${tx.bank?`<div class="tx-date">🏦 ${tx.bank} · ${tx.number||""}</div>`:""}
        ${tx.walletAddress?`<div class="tx-date">💎 ${tx.walletAddress.slice(0,20)}...</div>`:""}
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:10px;">
        <div class="tx-amount" style="${color}">${pref}$${tx.amount}</div>
        <div class="badge ${tx.status||'pending'}" id="badge-${txId}">${(tx.status||"pending").toUpperCase()}</div>
      </div>
    </div>
    ${actionsHTML}`;
  return card;
}

// ── APPROVE ───────────────────────────────────────────────────
async function handleApprove(txId) {
  if (!confirm("Approve this recharge?")) return;
  setTxBtnsDisabled(txId, true);
  try {
    const resp = await fetch(`${URL_APPROVE_RECHARGE}?txId=${txId}&secret=${SECRET}`);
    const text = await resp.text();
    if (!resp.ok) throw new Error(text);
    updateTxCardStatus(txId, "approved");
    // Refresh pending count from Firebase
    loadPendingCount();
    toast("✅ Recharge approved!");
  } catch(e) {
    setTxBtnsDisabled(txId, false);
    toast("❌ Approve failed: " + e.message);
  }
}

// ── REJECT ────────────────────────────────────────────────────
async function handleReject(txId) {
  if (!confirm("Reject this recharge?")) return;
  setTxBtnsDisabled(txId, true);
  try {
    const resp = await fetch(`${URL_REJECT_RECHARGE}?txId=${txId}&secret=${SECRET}`);
    const text = await resp.text();
    if (!resp.ok) throw new Error(text);
    updateTxCardStatus(txId, "rejected");
    loadPendingCount();
    toast("🗑 Recharge rejected");
  } catch(e) {
    setTxBtnsDisabled(txId, false);
    toast("❌ Reject failed: " + e.message);
  }
}

function setTxBtnsDisabled(txId, state) {
  const a = document.getElementById("approve-" + txId);
  const r = document.getElementById("reject-" + txId);
  if (a) a.disabled = state;
  if (r) r.disabled = state;
}

function updateTxCardStatus(txId, status) {
  // Update badge
  const badge = document.getElementById("badge-" + txId);
  if (badge) { badge.textContent = status.toUpperCase(); badge.className = "badge " + status; }
  // Remove action buttons
  const actions = document.querySelector(`#txcard-${txId} .tx-actions`);
  if (actions) actions.remove();
}

// ── OPEN USER DETAIL ──────────────────────────────────────────
function openDetail(uid, userData) {
  if (!userData) userData = allUsers[uid] || {};
  currentOpenUid = uid;
  document.getElementById("dpTitle").textContent = userData.minerId || "User Detail";
  document.getElementById("dpTitle").dataset.uid = uid;
  document.getElementById("dpBody").innerHTML    = buildDetailHTML(uid, userData);
  document.getElementById("detailPanel").classList.add("open");
  showDpTab("overview", document.querySelector(".dp-tab"));
}

function closeDetail() {
  document.getElementById("detailPanel").classList.remove("open");
  currentOpenUid = null;
}

      <div class="sec-title">Bank Details</div>

    </div>

  <!-- MINING -->
  <div id="dp-mining" class="dp-content" style="display:none">
    ${Object.keys(u.miners||{}).length===0?'<div class="empty">No mining data</div>':

          <div class="sec-row"><span class="sec-lbl">Running</span><span class="sec-val">${elapsed}h elapsed</span></div>
          <div class="sec-row"><span class="sec-lbl">Credited</span><span class="sec-val">${m.credited?"✅ Yes":"⏳ Not yet"}</span></div>

      ${Object.values(u.miningRecords||{}).reverse().slice(0,20).map(r=>`
        <div class="mini-rec">

            <div class="ref-id">${allUsers[u.referredBy]?.minerId||u.referredBy.slice(0,8)}</div>

      <label class="adj-label">Apply To</label>
      <select class="adj-input lvl-sel" id="adjTarget">
        <option value="balance">Balance (main wallet)</option>
        <option value="team">Team Income</option>

      <div class="adj-btns">
        <button class="adj-btn add"    id="adjAddBtn"    onclick="adjustBalance('${uid}','add')">➕ Add</button>

        <option value="Pro Miner"     ${(u.level||"")==="Pro Miner"     ?"selected":""}>Pro Miner</option>
        <option value="Elite Miner"   ${(u.level||"")==="Elite Miner"   ?"selected":""}>Elite Miner</option>
        <option value="Legend Miner"  ${(u.level||"")==="Legend Miner"  ?"selected":""}>Legend Miner</option>

// ── SHOW DETAIL SUB-TAB ───────────────────────────────────────
  function showDpTab(name, el) {
  document.querySelectorAll(".dp-tab").forEach(t => t.classList.remove("active"));
  if (el) el.classList.add("active");
  document.querySelectorAll("[id^='dp-']").forEach(d => d.style.display = "none");
  const target = document.getElementById("dp-" + name);
  if (target) target.style.display = "block";
  if (name === "team")         loadTeamIncome();
  if (name === "adjust")       loadAdjHistory();
  if (name === "transactions") loadUserTxs();  // ADD THIS
}
function loadTeamIncome() {
  const uid       = document.getElementById("dpTitle").dataset.uid;
  const container = document.getElementById("teamIncomeRecords-" + uid);
  if (!container || container.dataset.loaded) return;
  container.dataset.loaded = "1";
  db.ref("teamIncome/" + uid).orderByChild("timestamp").limitToLast(20).once("value", snap => {
    const recs = Object.values(snap.val()||{}).sort((a,b)=>b.timestamp-a.timestamp);
    if (!recs.length) { container.innerHTML = '<div style="color:var(--muted);font-size:13px;">No team income yet</div>'; return; }
    container.innerHTML = recs.map(r=>`
      <div class="mini-rec">
        <div>
          <div style="font-size:13px;color:var(--subtle);">${r.fromMiner||"?"} · Level ${r.level||1}</div>
          <div style="font-size:11px;color:var(--muted);">${new Date(r.timestamp).toLocaleDateString("en-NG")}</div>
        </div>
        <span class="mini-val team">+$${Number(r.amount).toFixed(4)}</span>
      </div>`).join("");
  });
}

function loadAdjHistory() {
  const uid       = document.getElementById("dpTitle").dataset.uid;
  const container = document.getElementById("adjHistory-" + uid);
  if (!container) return;
  container.dataset.loaded = "";
  container.innerHTML = '<div class="empty-spin"></div>';
  db.ref("balanceAdjustments/" + uid).orderByChild("timestamp").limitToLast(30).once("value", snap => {
    const recs = Object.values(snap.val()||{}).sort((a,b)=>b.timestamp-a.timestamp);
    if (!recs.length) { container.innerHTML = '<div style="color:var(--muted);font-size:13px;">No adjustments yet</div>'; return; }
    container.innerHTML = recs.map(r=>`
      <div class="mini-rec">
        <div>
          <div style="font-size:13px;color:var(--subtle);">${r.reason||"No reason"} · ${r.field}</div>
          <div style="font-size:11px;color:var(--muted);">${new Date(r.timestamp).toLocaleDateString("en-NG")} · Before: $${r.before} → After: $${r.after}</div>
        </div>
        <span class="mini-val ${r.type==="add"?"pos":"neg"}">${r.type==="add"?"+":"−"}$${r.amount}</span>
      </div>`).join("");
  });
}

// ── MANUAL BALANCE ADJUSTMENT ─────────────────────────────────
async function adjustBalance(uid, type) {
  const amount  = parseFloat(document.getElementById("adjAmount").value);
  const reason  = document.getElementById("adjReason").value.trim() || "Admin adjustment";
  const field   = document.getElementById("adjTarget").value;

  if (!amount || amount <= 0) return toast("Enter a valid amount");

  const addBtn    = document.getElementById("adjAddBtn");
  const deductBtn = document.getElementById("adjDeductBtn");
  const successEl = document.getElementById("adjSuccessMsg");
  if (addBtn)    addBtn.disabled    = true;
  if (deductBtn) deductBtn.disabled = true;

  try {
    const snap    = await db.ref(`users/${uid}/${field}`).once("value");
    const current = snap.val() || 0;
    const newVal  = type === "add"
      ? parseFloat((current + amount).toFixed(4))
      : parseFloat(Math.max(0, current - amount).toFixed(4));

    await db.ref(`users/${uid}/${field}`).set(newVal);
    await db.ref(`balanceAdjustments/${uid}`).push({
      type, field, amount, reason,
      before:    current,
      after:     newVal,
      adminUid:  myUid,
      timestamp: Date.now()
    });

    allUsers[uid] = { ...(allUsers[uid]||{}), [field]: newVal };

    if (field === "balance") {
      const el = document.getElementById("live-balance");
      if (el) el.textContent = Math.floor(newVal);
    }
    if (field === "team") {
      const el = document.getElementById("live-team");
      if (el) el.textContent = newVal.toFixed(2);
    }
    if (field === "points") {
      const el = document.getElementById("live-points");
      if (el) el.textContent = newVal;
    }

    updateStripStats();

    const label = type === "add" ? "Added" : "Deducted";
    if (successEl) {
      successEl.textContent = `✅ ${label} $${amount} ${type==="add"?"to":"from"} ${field}. New value: $${newVal}`;
      successEl.style.display = "block";
      setTimeout(() => { successEl.style.display = "none"; }, 4000);
    }

    loadAdjHistory();
    document.getElementById("adjAmount").value = "";
    document.getElementById("adjReason").value = "";
    toast(`✅ ${label} $${amount} ${type==="add"?"to":"from"} ${field}`);

  } catch (err) {
    toast("❌ Error: " + err.message);
  } finally {
    if (addBtn)    addBtn.disabled    = false;
    if (deductBtn) deductBtn.disabled = false;
  }
}

// ── UPDATE USER LEVEL ─────────────────────────────────────────
async function updateLevel(uid) {
  const level = document.getElementById("lvlSelect").value;
  await db.ref(`users/${uid}`).update({
    level: level,
    levelOverride: true
  });
  allUsers[uid] = { ...(allUsers[uid]||{}), level };
  toast("✅ Level updated to " + level);
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2800);
}
function loadUserTxs() {
  const uid       = document.getElementById("dpTitle").dataset.uid;
  const container = document.getElementById("userTxList-" + uid);
  if (!container || container.dataset.loaded) return;
  container.dataset.loaded = "1";
  db.ref("userTransactions/" + uid).once("value", snap => {
    const txns = snap.val() || {};
    const sorted = Object.entries(txns).sort((a,b) => (b[1].date||0) - (a[1].date||0));
    if (!sorted.length) { container.innerHTML = '<div class="empty">No transactions</div>'; return; }
    container.innerHTML = sorted.map(([txId, tx]) => `
      <div class="sec-card" style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--neon);margin-bottom:2px;">${(tx.type||"tx").toUpperCase()} · ${tx.method||"—"}</div>
            <div style="font-size:12px;color:var(--muted);">${tx.date?new Date(tx.date).toLocaleString("en-NG"):"—"}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:16px;font-weight:700;${tx.type==="recharge"?"color:var(--green)":"color:var(--red)"}">
              ${tx.type==="recharge"?"+":"−"}$${tx.amount}
            </div>
            <div class="badge ${tx.status||'pending'}">${(tx.status||"pending").toUpperCase()}</div>
          </div>
        </div>
      </div>`).join("");
  });
}
</script>
