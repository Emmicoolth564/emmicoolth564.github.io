<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoJet Miner</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root { --neon: #00f0ff; --accent: #00ffcc; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .header { padding: 30px 20px 20px; text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: var(--neon); text-shadow: 0 0 30px rgba(0, 240, 255, 0.6); }

    .balance-header {
        text-align: center; margin: 10px 20px 30px; background: rgba(15,23,42,0.9);
        border-radius: 20px; padding: 16px; box-shadow: 0 0 30px rgba(0,240,255,0.2);
    }
    .balance-label { font-size:13px; color:#94a3b8; }
    .balance-amount { font-size:32px; font-weight:700; color:#00ffcc; }

    .tabs { display:flex; justify-content:center; gap:12px; margin:0 20px 20px; }
    .tabs button {
        padding:12px 28px; border:none; border-radius:9999px; background:#111827;
        color:#00f0ff; font-weight:600; font-size:15px; cursor:pointer;
    }
    .tabs button.active { background:#00ffcc; color:#000; box-shadow:0 0 20px #00ffcc; }

    .container { padding:0 20px 100px; }

    .miner-card {
        background: linear-gradient(145deg, #0f172a, #1e2937);
        border-radius: 24px; padding: 24px; margin-bottom: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(0,240,255,0.2);
    }

    .miner-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .miner-img { width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 20px #00f0ff); }
    .miner-name { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; color: #00ffcc; }

    .stats-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;
    }
    .stat-item {
        background: rgba(2,6,23,0.6); border-radius: 16px; padding: 14px; text-align: center;
    }
    .stat-label { font-size:12px; color:#94a3b8; margin-bottom:4px; }
    .stat-value { font-size:18px; font-weight:700; }

    .live-info {
        margin-top: 16px; padding: 14px; background: rgba(0,240,255,0.1);
        border-radius: 12px; font-size: 15px; text-align: center; color: #00f0ff;
    }

    .live-dot {
        display: inline-block; width: 10px; height: 10px; background: #00ff88;
        border-radius: 50%; animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .btn {
        width:100%; padding:16px; border:none; border-radius:16px;
        background:linear-gradient(90deg,#00f0ff,#00ffcc); color:#000;
        font-weight:700; font-size:16px; cursor:pointer; margin-top:12px;
        box-shadow:0 0 20px rgba(0,240,255,0.4);
    }

    .nav-glass {
        position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
        width:90%; height:70px; display:flex; justify-content:space-around;
        align-items:center; background:rgba(255,255,255,0.05);
        backdrop-filter:blur(20px); border-radius:25px;
        box-shadow:0 8px 30px rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08);
        z-index:999;
    }
    .nav-item { text-align:center; color:#aaa; font-size:11px; }
    .nav-item.active { color:#00ffcc; }

    .icon { width:26px; height:26px; margin-bottom:4px; position:relative; }
    .icon.home::before { content:""; position:absolute; width:18px; height:18px; background:#aaa; transform:rotate(45deg); top:4px; left:4px; border-radius:3px; }
    .nav-item.active .home::before { background:#00ffcc; }
    .icon.miner::before { content:"⚡"; font-size:20px; position:absolute; left:3px; top:-2px; }
    .nav-item.active .miner::before { color:#00ffcc; }
    .icon.me { background:#ffffff22; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .icon.me::before { content:"👤"; font-size:14px; }
    .nav-item.active .me { background:#00ffcc33; }

    #loader {
        position:fixed; top:0; left:0; width:100%; height:100%;
        background:#020617; display:flex; align-items:center;
        justify-content:center; z-index:9999; flex-direction:column;
        color:#22c55e; font-size:18px;
    }
    .loader-logo { font-size:30px; font-weight:900; color:#00ffcc; margin-bottom:20px; animation:glow 1.5s infinite alternate; }
    .loader-bar { width:180px; height:4px; background:#111; border-radius:10px; overflow:hidden; }
    .loader-fill { width:0%; height:100%; background:#00ffcc; animation:loadBar 2s ease forwards; }
    @keyframes loadBar { to { width:100%; } }
    @keyframes glow { from { text-shadow:0 0 5px #00ffcc; } to { text-shadow:0 0 25px #00ffcc; } }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-content">
    <div class="loader-logo">CryptoJet</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>
</div>

<div class="header">CryptoJet Miner</div>

<div class="balance-header">
    <div class="balance-label">AVAILABLE BALANCE</div>
    <div class="balance-amount" id="liveBalance">$0.00</div>
</div>

<div class="tabs">
  <button id="runBtn" class="active" onclick="showTab('running')">Running</button>
  <button id="shopBtn" onclick="showTab('shop')">Purchase</button>
</div>

<div id="runningTab" class="container"></div>
<div id="shopTab" class="container" style="display:none;"></div>

<div class="nav-glass">
  <div class="nav-item" onclick="nav('dashboard.html')"><div class="icon home"></div><span>Home</span></div>
  <div class="nav-item active" onclick="nav('miner.html')"><div class="icon miner"></div><span>Miner</span></div>
  <div class="nav-item" onclick="nav('me.html')"><div class="icon me"></div><span>Me</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid = localStorage.getItem("uid");
if (!uid) { alert("Session expired"); window.location.href = "signin.html"; }

let userData = null;

// UPDATED MINER PLANS WITH CYCLE HOURS
const miners = {
  S244:  { name:"S-244",  speed:0.000005787037037, price:10,  duration:30, daily:0.5,   cycleHours:48, img:"purchase1.png" },
  S500:  { name:"S-500",  speed:0.000017361111111,  price:30,  duration:30, daily:1.5,   cycleHours:48, img:"purchase2.png" },
  S900:  { name:"S-900",  speed:0.000023148148148,   price:50,  duration:35, daily:2,     cycleHours:24, img:"purchase3.png" },
  S1200: { name:"S-1200", speed:0.000046296296296,   price:120, duration:45, daily:4,     cycleHours:24, img:"purchase4.png" }
};

function showTab(tab) {
  document.getElementById("runningTab").style.display = tab === "running" ? "block" : "none";
  document.getElementById("shopTab").style.display = tab === "shop" ? "block" : "none";
  document.getElementById("runBtn").classList.toggle("active", tab === "running");
  document.getElementById("shopBtn").classList.toggle("active", tab === "shop");
}

async function loadPage() {
  const snap = await db.ref("users/" + uid).once("value");
  userData = snap.val() || {};

  catchUpMining();

  renderRunning();
  renderShop();
  updateLiveBalance();
}

// Catch-up offline mining
function catchUpMining() {
  if (!userData.miners) return;

  const now = Date.now();
  let totalToAdd = 0;

  const unlocked = userData.minerUnlocked || {};

  Object.keys(unlocked).forEach(id => {
    const count = unlocked[id];
    for (let i = 1; i <= count; i++) {
      const key = id === "S244" ? `${id}_${i}` : id;
      let minerData = userData.miners[key];
      if (!minerData) continue;

      const cycleDays = miners[id].cycleHours / 24;
      const timeSinceStart = (now - minerData.start) / (1000 * 3600 * 24);
      if (timeSinceStart >= cycleDays) continue;

      const secondsPassed = (now - minerData.lastUpdate) / 1000;
      const increase = secondsPassed * miners[id].speed;

      if (increase > 0) {
        minerData.earned = (minerData.earned || 0) + increase;
        minerData.lastUpdate = now;

        const floor = Math.floor(minerData.earned);
        if (floor > (minerData.lastAdded || 0)) {
          const added = floor - (minerData.lastAdded || 0);
          totalToAdd += added;
          db.ref("users/" + uid + "/miningRecords").push({
            amount: added,
            miner: miners[id].name + (id === "S244" ? ` #${i}` : ""),
            timestamp: now
          });
          minerData.lastAdded = floor;
        }
      }
    }
  });

  if (totalToAdd > 0) {
    userData.balance = Math.floor((userData.balance || 0) + totalToAdd);
  }
}

function updateLiveBalance() {
  document.getElementById("liveBalance").textContent = "$" + Math.floor(userData.balance || 0) + ".00";
}

/* RUNNING TAB */
function renderRunning() {
  const container = document.getElementById("runningTab");
  container.innerHTML = "";

  const unlocked = userData.minerUnlocked || {};
  const minersData = userData.miners || {};

  Object.keys(unlocked).forEach(id => {
    const count = unlocked[id];
    for (let i = 1; i <= count; i++) {
      const key = id === "S244" ? `${id}_${i}` : id;
      let data = minersData[key] || { earned: 0, start: Date.now(), lastUpdate: Date.now(), lastAdded: 0 };

      const now = Date.now();
      const cycleDays = miners[id].cycleHours / 24;
      const timeSinceStart = (now - data.start) / (1000 * 3600 * 24);
      const isActive = timeSinceStart < cycleDays;

      const expireDate = new Date(data.start + miners[id].duration * 24 * 60 * 60 * 1000);
      const boughtDate = new Date(data.start);

      const card = document.createElement("div");
      card.className = "miner-card";
      card.id = `card-${key}`;

      card.innerHTML = `
        <div class="miner-header">
          <img src="${miners[id].img}" class="miner-img">
          <div>
            <div class="miner-name">${miners[id].name} #${i}</div>
            <div style="color:#94a3b8;font-size:13px;">
              Bought: ${boughtDate.toLocaleDateString('en-NG')}<br>
              Expires: ${expireDate.toLocaleDateString('en-NG')}
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">DAILY</div>
            <div class="stat-value" style="color:#00ff88;">$${miners[id].daily}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">DURATION LEFT</div>
            <div class="stat-value">${Math.max(0, Math.ceil(miners[id].duration - timeSinceStart))} days</div>
          </div>
        </div>

        <div class="live-info">
          <strong>PER SECOND:</strong> ${miners[id].speed}<br>
          LIVE EARNING: <span id="liveEarn_${key}">${data.earned.toFixed(6)}</span>
        </div>

        ${isActive ? `
        <div style="margin-top:16px;text-align:center;color:#00ff88;">
          <span class="live-dot"></span> LIVE MINING (${miners[id].cycleHours}h)
        </div>` : `
        <button class="btn" onclick="startMiner('${id}', ${i})">Start Mining (${miners[id].cycleHours}h)</button>`}
      `;
      container.appendChild(card);
    }
  });

  if (container.children.length === 0) {
    container.innerHTML = `<p style="text-align:center;color:#64748b;padding:60px;">No active miners yet.<br>Buy from Purchase tab.</p>`;
  }
}
/* PURCHASE TAB - unchanged */
function renderShop() {
  const container = document.getElementById("shopTab");
  container.innerHTML = "";

  Object.keys(miners).forEach(id => {
    const m = miners[id];
    const owned = (userData.minerUnlocked && userData.minerUnlocked[id]) || 0;

    const card = document.createElement("div");
    card.className = "miner-card";

    let buttonHTML = `<button class="btn" onclick="buyMiner('${id}', ${m.price})">Buy for $${m.price}</button>`;

    if (id === "S244" && owned >= 2) buttonHTML = `<button class="btn" style="background:#334155;color:white;">Maximum 2 Purchased</button>`;
    else if (owned >= 1 && id !== "S244") buttonHTML = `<button class="btn" style="background:#334155;color:white;">Already Owned</button>`;

    card.innerHTML = `
      <div class="miner-header">
        <img src="${m.img}" class="miner-img">
        <div><div class="miner-name">${m.name}</div></div>
      </div>

      <div class="stats-grid">
        <div class="stat-item"><div class="stat-label">PRICE</div><div class="stat-value">$${m.price}</div></div>
        <div class="stat-item"><div class="stat-label">DAILY INCOME</div><div class="stat-value" style="color:#00ff88;">$${m.daily}</div></div>
        <div class="stat-item"><div class="stat-label">PER SECOND</div><div class="stat-value">${m.speed.toExponential(2)}</div></div>
        <div class="stat-item"><div class="stat-label">DURATION</div><div class="stat-value">${m.duration} days</div></div>
      </div>

      <div style="margin-top:12px;">${buttonHTML}</div>
    `;
    container.appendChild(card);
  });
}

/* BUY & START - UPDATED WITH REFERRAL POINTS & TEAM INCOME */
async function buyMiner(id, price) {
  const snap = await db.ref("users/" + uid).once("value");
  const data = snap.val() || {};
  const availableBalance = (data.balance || 0) + (data.teamIncome || 0);
  if (availableBalance < price) return alert("Not enough balance or team income");

  let unlocked = data.minerUnlocked || {};
  let count = unlocked[id] || 0;

  if (id === "S244" && count >= 2) return alert("You can only buy S-244 twice");
  if (id !== "S244" && count >= 1) return alert("You already own this miner");

  const instanceKey = id === "S244" ? `${id}_${count + 1}` : id;

  // Deduct from team income first, then balance
  let deductFromTeamIncome = Math.min(price, data.teamIncome || 0);
  let deductFromBalance = price - deductFromTeamIncome;

  // Calculate referral points for the referrer
  let referralPoints = 0;
  if (id === "S244") referralPoints = 100;
  else if (id === "S500") referralPoints = 200;
  else if (id === "S900") referralPoints = 300;
  else if (id === "S1200") referralPoints = 400;

  // Update buyer
  db.ref("users/" + uid).update({
    balance: Math.max(0, (data.balance || 0) - deductFromBalance),
    teamIncome: Math.max(0, (data.teamIncome || 0) - deductFromTeamIncome),
    [`minerUnlocked/${id}`]: count + 1,
    [`miners/${instanceKey}`]: { start: Date.now(), lastUpdate: Date.now(), earned: 0, lastAdded: 0 }
  });

  // Award points to referrer if any
  const referrer = data.referredBy;
  if (referrer && referralPoints > 0) {
    db.ref("users/" + referrer).transaction(userData => {
      if (!userData) return userData;
      userData.pendingRewards = userData.pendingRewards || {};
      userData.pendingRewards[id] = (userData.pendingRewards[id] || 0) + referralPoints;
      return userData;
    });
  }

  loadPage();
}

function startMiner(id, instance) {
  const key = id === "S244" ? `${id}_${instance}` : id;
  const now = Date.now();
  db.ref("users/" + uid + "/miners/" + key).update({ start: now, lastUpdate: now, earned: 0, lastAdded: 0 });
  loadPage();
}

/* REAL-TIME MINING - now uses per-miner cycleHours */
function startMining() {
  setInterval(() => {
    if (!userData) return;
    const now = Date.now();
    let totalToAdd = 0;

    const unlocked = userData.minerUnlocked || {};
    Object.keys(unlocked).forEach(id => {
      const count = unlocked[id];
      for (let i = 1; i <= count; i++) {
        const key = id === "S244" ? `${id}_${i}` : id;
        let minerData = userData.miners[key];
        if (!minerData) return;

        const cycleDays = miners[id].cycleHours / 24;
        const timeSince = (now - minerData.start) / (1000 * 3600 * 24);
        if (timeSince >= cycleDays) return;

        minerData.earned = (minerData.earned || 0) + miners[id].speed;

        const earnEl = document.getElementById(`liveEarn_${key}`);
        if (earnEl) earnEl.textContent = minerData.earned.toFixed(6);

        const floor = Math.floor(minerData.earned);
        if (floor > (minerData.lastAdded || 0)) {
          const added = floor - (minerData.lastAdded || 0);
          totalToAdd += added;
          db.ref("users/" + uid + "/miningRecords").push({
            amount: added,
            miner: miners[id].name + (id === "S244" ? ` #${i}` : ""),
            timestamp: now
          });
          minerData.lastAdded = floor;
        }
      }
    });

    if (totalToAdd > 0) {
      userData.balance = Math.floor((userData.balance || 0) + totalToAdd);
      updateLiveBalance();
    }
  }, 1000);
}

setInterval(() => {
  if (userData) db.ref("users/" + uid).update({ miners: userData.miners, balance: userData.balance });
}, 8000);

function nav(page) { window.location.href = page; }

window.addEventListener("load", () => {
  loadPage();
  startMining();
  setTimeout(() => document.getElementById("loader").style.display = "none", 1200);
});
</script>
</body>
</html>
