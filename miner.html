<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoJet Miner</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root { --neon:#00f0ff; --accent:#00ffcc; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#020617; color:#e2e8f0; min-height:100vh; overflow-x:hidden; }

    #loader { position:fixed; top:0; left:0; width:100%; height:100%; background:#020617; display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; }
    .loader-logo { font-size:30px; font-weight:900; color:#00ffcc; margin-bottom:20px; animation:glow 1.5s infinite alternate; }
    .loader-bar  { width:180px; height:4px; background:#111; border-radius:10px; overflow:hidden; }
    .loader-fill { width:0%; height:100%; background:#00ffcc; animation:loadBar 1.5s ease forwards; }
    @keyframes loadBar { to{ width:100%; } }
    @keyframes glow { from{text-shadow:0 0 5px #00ffcc;} to{text-shadow:0 0 25px #00ffcc;} }

    .header { padding:30px 20px 20px; text-align:center; font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700; color:var(--neon); text-shadow:0 0 30px rgba(0,240,255,0.6); }

    .balance-header { text-align:center; margin:10px 20px 30px; background:rgba(15,23,42,0.9); border-radius:20px; padding:16px; box-shadow:0 0 30px rgba(0,240,255,0.2); }
    .balance-label  { font-size:13px; color:#94a3b8; }
    .balance-amount { font-size:32px; font-weight:700; color:#00ffcc; }

    .tabs { display:flex; justify-content:center; gap:12px; margin:0 20px 20px; }
    .tabs button { padding:12px 28px; border:none; border-radius:9999px; background:#111827; color:#00f0ff; font-weight:600; font-size:15px; cursor:pointer; }
    .tabs button.active { background:#00ffcc; color:#000; box-shadow:0 0 20px #00ffcc; }

    .container { padding:0 20px 100px; }

    .miner-card { background:linear-gradient(145deg,#0f172a,#1e2937); border-radius:24px; padding:24px; margin-bottom:24px; box-shadow:0 20px 40px rgba(0,0,0,0.6); border:1px solid rgba(0,240,255,0.2); }
    .miner-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }

    .ring-wrap { position:relative; width:88px; height:88px; flex-shrink:0; }
    .ring-svg { position:absolute; top:0; left:0; width:88px; height:88px; transform:rotate(-90deg); }
    .ring-bg   { fill:none; stroke:#1e2937; stroke-width:5; }
    .ring-fill { fill:none; stroke:#00ffcc; stroke-width:5; stroke-linecap:round; stroke-dasharray:251.2; stroke-dashoffset:251.2; transition:stroke-dashoffset 1s linear; }
    .ring-fill.paused { stroke:#ef4444; }
    .miner-img { width:72px; height:72px; object-fit:contain; filter:drop-shadow(0 0 14px #00f0ff); position:absolute; top:8px; left:8px; }

    .miner-name  { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; color:#00ffcc; }
    .miner-dates { color:#94a3b8; font-size:13px; margin-top:4px; line-height:1.6; }

    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .stat-item  { background:rgba(2,6,23,0.6); border-radius:16px; padding:14px; text-align:center; }
    .stat-label { font-size:12px; color:#94a3b8; margin-bottom:4px; }
    .stat-value { font-size:18px; font-weight:700; }

    .status-box { border-radius:14px; padding:16px 18px; margin-top:4px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .status-box.active   { background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2); }
    .status-box.paused   { background:rgba(239,68,68,0.08);  border:1px solid rgba(239,68,68,0.25); }
    .status-box.inactive { background:rgba(100,116,139,0.1); border:1px solid rgba(100,116,139,0.2); }

    .status-left { flex:1; }
    .status-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
    .badge-dot { width:8px; height:8px; border-radius:50%; }
    .badge-dot.green { background:#00ff88; animation:pulse 1.2s infinite; }
    .badge-dot.red   { background:#ef4444; animation:pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .earned-row { font-size:13px; color:#94a3b8; margin-top:2px; }
    .earned-val { font-size:22px; font-weight:700; color:#00ffcc; }
    .earned-val.locked { color:#f59e0b; }

    .time-remaining { font-size:13px; color:#64748b; text-align:right; }
    .time-val { font-size:16px; font-weight:700; color:#e2e8f0; margin-top:2px; }

    .btn { width:100%; padding:16px; border:none; border-radius:16px; background:linear-gradient(90deg,#00f0ff,#00ffcc); color:#000; font-weight:700; font-size:16px; cursor:pointer; margin-top:14px; box-shadow:0 0 20px rgba(0,240,255,0.4); }

    .shop-card { background:linear-gradient(145deg,#0f172a,#1e2937); border-radius:24px; padding:24px; margin-bottom:24px; box-shadow:0 20px 40px rgba(0,0,0,0.6); border:1px solid rgba(0,240,255,0.15); }
    .shop-header { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
    .shop-img { width:72px; height:72px; object-fit:contain; filter:drop-shadow(0 0 14px #00f0ff); }
    .shop-name { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#00ffcc; }

    .nav-glass { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; height:70px; display:flex; justify-content:space-around; align-items:center; background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border-radius:25px; box-shadow:0 8px 30px rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); z-index:999; }
    .nav-item { text-align:center; color:#aaa; font-size:11px; cursor:pointer; }
    .nav-item.active { color:#00ffcc; }
    .icon { width:26px; height:26px; margin-bottom:4px; position:relative; }
    .icon.home::before { content:""; position:absolute; width:18px; height:18px; background:#aaa; transform:rotate(45deg); top:4px; left:4px; border-radius:3px; }
    .nav-item.active .home::before { background:#00ffcc; }
    .icon.miner::before { content:"⚡"; font-size:20px; position:absolute; left:3px; top:-2px; }
    .nav-item.active .miner::before { color:#00ffcc; }
    .icon.me { background:#ffffff22; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .icon.me::before { content:"👤"; font-size:14px; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">CryptoJet</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div class="header">CryptoJet Miner</div>

<div class="balance-header">
    <div class="balance-label">AVAILABLE BALANCE</div>
    <div class="balance-amount" id="liveBalance">$0.00</div>
</div>

<div class="tabs">
  <button id="runBtn" class="active" onclick="showTab('running')">Running</button>
  <button id="shopBtn" onclick="showTab('shop')">Purchase</button>
</div>

<div id="runningTab" class="container"></div>
<div id="shopTab"    class="container" style="display:none;"></div>

<div class="nav-glass">
  <div class="nav-item" onclick="nav('dashboard.html')"><div class="icon home"></div><span>Home</span></div>
  <div class="nav-item active"><div class="icon miner"></div><span>Miner</span></div>
  <div class="nav-item" onclick="nav('me.html')"><div class="icon me"></div><span>Me</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const uid = localStorage.getItem("uid");
if (!uid) { alert("Session expired"); window.location.href = "signin.html"; }

let userData = null;

// ── MINER CONFIG ──────────────────────────────────────────────
const MINERS = {
  S244:  { name:"S-244",  price:10,  daily:0.5, cycleHours:48, img:"purchase1.png", duration:30 },
  S500:  { name:"S-500",  price:30,  daily:1.5, cycleHours:48, img:"purchase2.png", duration:30 },
  S900:  { name:"S-900",  price:50,  daily:2,   cycleHours:24, img:"purchase3.png", duration:35 },
  S1200: { name:"S-1200", price:120, daily:4,   cycleHours:24, img:"purchase4.png", duration:45 }
};

// ── REFERRAL LEVELS & PERCENTAGES ────────────────────────────
const REFERRAL_LEVELS = [
  { level: 1, pct: 0.10 },  // Level 1 direct referrer → 10%
  { level: 2, pct: 0.04 },  // Level 2 → 4%
  { level: 3, pct: 0.02 }   // Level 3 → 2%
];

// ── HELPERS ───────────────────────────────────────────────────
function fmtTime(ms) {
  if (ms <= 0) return "00:00:00";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("en-NG");
}

function computeEarned(id, minerData) {
  const cfg     = MINERS[id];
  const now     = Date.now();
  const elapsed = now - minerData.start;
  const cycleMs = cfg.cycleHours * 3600000;
  const dayMs   = 24 * 3600000;

  if (elapsed >= cycleMs) {
    const totalEarn = cfg.daily * (cfg.cycleHours / 24);
    return { displayEarned: totalEarn, pct: 100, isComplete: true, phase: "done", timeLeft: 0 };
  }

  const pct      = (elapsed / cycleMs) * 100;
  const timeLeft = cycleMs - elapsed;

  if (cfg.cycleHours === 24) {
    const earned = (elapsed / dayMs) * cfg.daily;
    return { displayEarned: Math.min(earned, cfg.daily), pct, isComplete: false, phase: "active", timeLeft };
  } else {
    if (elapsed < dayMs) {
      const earned = (elapsed / dayMs) * cfg.daily;
      return { displayEarned: earned, pct, isComplete: false, phase: "first24", timeLeft };
    } else {
      const extra  = elapsed - dayMs;
      const earned = cfg.daily + (extra / dayMs) * cfg.daily;
      return { displayEarned: Math.min(earned, cfg.daily * 2), pct, isComplete: false, phase: "second24", timeLeft };
    }
  }
}

// ── CREDIT REFERRAL CHAIN ─────────────────────────────────────
// When a user's miner cycle completes, walk up 3 levels of referrers
// and credit the right % of earned amount into their `team` balance
async function creditReferralChain(earnerUid, earnedAmount, minerName) {
  let currentUid  = earnerUid;
  let earnerMiner = null;

  // Get earner's minerId for the record
  const earnerSnap = await db.ref(`users/${earnerUid}/minerId`).once("value");
  earnerMiner = earnerSnap.val() || earnerUid.substring(0, 8);

  for (const { level, pct } of REFERRAL_LEVELS) {
    // Get the referrer of currentUid
    const refSnap    = await db.ref(`users/${currentUid}/referredBy`).once("value");
    const referrerUid = refSnap.val();
    if (!referrerUid) break; // no more referrers in chain

    const teamCredit = parseFloat((earnedAmount * pct).toFixed(4));
    if (teamCredit <= 0) { currentUid = referrerUid; continue; }

    // Add to referrer's team balance
    const teamSnap    = await db.ref(`users/${referrerUid}/team`).once("value");
    const currentTeam = teamSnap.val() || 0;
    await db.ref(`users/${referrerUid}/team`).set(
      parseFloat((currentTeam + teamCredit).toFixed(4))
    );

    // Record in teamIncome for history
    await db.ref(`teamIncome/${referrerUid}`).push({
      fromUid:   earnerUid,
      fromMiner: earnerMiner,
      amount:    teamCredit,
      level:     level,
      miner:     minerName,
      pct:       pct * 100,
      timestamp: Date.now()
    });

    currentUid = referrerUid; // move up the chain
  }
}

// ── TAB SWITCH ────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById("runningTab").style.display = tab === "running" ? "block" : "none";
  document.getElementById("shopTab").style.display    = tab === "shop"    ? "block" : "none";
  document.getElementById("runBtn").classList.toggle("active", tab === "running");
  document.getElementById("shopBtn").classList.toggle("active", tab === "shop");
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadPage() {
  const snap = await db.ref("users/" + uid).once("value");
  userData = snap.val() || {};
  document.getElementById("liveBalance").textContent = "$" + Math.floor(userData.balance || 0) + ".00";
  renderRunning();
  renderShop();
}

// ── RENDER RUNNING TAB ────────────────────────────────────────
function renderRunning() {
  const container = document.getElementById("runningTab");
  container.innerHTML = "";

  const unlocked  = userData.minerUnlocked || {};
  const minersMap = userData.miners || {};

  let hasAny = false;
  Object.keys(unlocked).forEach(id => {
    const count = unlocked[id];
    for (let i = 1; i <= count; i++) {
      hasAny = true;
      const key      = id === "S244" ? `${id}_${i}` : id;
      const cfg      = MINERS[id];
      const mData    = minersMap[key];
      const expireTs = mData ? mData.start + cfg.duration * 86400000 : null;

      const card = document.createElement("div");
      card.className = "miner-card";
      card.id = "card-" + key;

      card.innerHTML = `
        <div class="miner-header">
          <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 88 88">
              <circle class="ring-bg"   cx="44" cy="44" r="40"/>
              <circle class="ring-fill" cx="44" cy="44" r="40" id="ring-${key}"/>
            </svg>
            <img src="${cfg.img}" class="miner-img" alt="${cfg.name}">
          </div>
          <div>
            <div class="miner-name">${cfg.name}${unlocked[id] > 1 ? ` #${i}` : ""}</div>
            <div class="miner-dates">
              Bought: ${mData ? fmtDate(mData.start) : "—"}<br>
              Expires: ${expireTs ? fmtDate(expireTs) : "—"}
            </div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">DAILY INCOME</div>
            <div class="stat-value" style="color:#00ff88;">$${cfg.daily}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">CYCLE</div>
            <div class="stat-value">${cfg.cycleHours}h</div>
          </div>
        </div>
        <div id="statusbox-${key}"></div>
      `;
      container.appendChild(card);
      refreshCard(id, key, mData);
    }
  });

  if (!hasAny) {
    container.innerHTML = `<p style="text-align:center;color:#64748b;padding:60px 20px;">No active miners yet.<br>Buy one from the Purchase tab.</p>`;
  }
}

// ── REFRESH SINGLE CARD (every second) ───────────────────────
function refreshCard(id, key, mData) {
  const box = document.getElementById("statusbox-" + key);
  if (!box) return;

  const cfg = MINERS[id];

  if (!mData || !mData.start) {
    box.innerHTML = `
      <div class="status-box inactive">
        <div style="font-size:14px;color:#64748b;text-align:center;width:100%;">Miner ready — tap Start to begin</div>
      </div>
      <button class="btn" onclick="startMiner('${id}','${key}')">▶ Start Mining (${cfg.cycleHours}h)</button>`;
    return;
  }

  const { displayEarned, pct, isComplete, phase, timeLeft } = computeEarned(id, mData);

  // Update ring
  const ring = document.getElementById("ring-" + key);
  if (ring) {
    const circ   = 2 * Math.PI * 40;
    const offset = circ - (pct / 100) * circ;
    ring.style.strokeDasharray  = circ;
    ring.style.strokeDashoffset = offset;
    ring.style.transition       = "stroke-dashoffset 1s linear";
    isComplete ? ring.classList.add("paused") : ring.classList.remove("paused");
  }

  const totalEarn = cfg.daily * (cfg.cycleHours / 24);
  const isLocked  = phase === "second24";

  if (isComplete) {
    checkAndCredit(id, key, mData);
    box.innerHTML = `
      <div class="status-box paused">
        <div class="status-left">
          <div class="status-badge" style="color:#ef4444;">
            <span class="badge-dot red"></span> Earning Paused
          </div>
          <div class="earned-row">Cycle complete — earned:</div>
          <div class="earned-val">$${totalEarn.toFixed(2)} ✓</div>
        </div>
      </div>
      <button class="btn" onclick="startMiner('${id}','${key}')">🔄 Start New Cycle (${cfg.cycleHours}h)</button>`;
  } else {
    box.innerHTML = `
      <div class="status-box active">
        <div class="status-left">
          <div class="status-badge" style="color:#00ff88;">
            <span class="badge-dot green"></span> Actively Earning
          </div>
          <div class="earned-row">Earned this cycle${isLocked ? ' <span style="color:#f59e0b;font-size:11px;">(pending balance)</span>' : ''}:</div>
          <div class="earned-val ${isLocked ? 'locked' : ''}">$${displayEarned.toFixed(2)}</div>
        </div>
        <div style="text-align:right;">
          <div class="time-remaining">Time left</div>
          <div class="time-val">${fmtTime(timeLeft)}</div>
        </div>
      </div>`;
  }
}

// ── CREDIT BALANCE + REFERRAL CHAIN ON CYCLE END ──────────────
const _credited = {};
async function checkAndCredit(id, key, mData) {
  if (_credited[key]) return;
  if (mData.credited)  return;

  _credited[key] = true;

  const cfg       = MINERS[id];
  const totalEarn = cfg.daily * (cfg.cycleHours / 24);
  const now       = Date.now();

  // Mark credited
  await db.ref(`users/${uid}/miners/${key}`).update({ credited: true });

  // Add to user's own balance
  const balSnap = await db.ref(`users/${uid}/balance`).once("value");
  const balance = balSnap.val() || 0;
  await db.ref(`users/${uid}/balance`).set(balance + totalEarn);

  // Record in miningRecords
  await db.ref(`users/${uid}/miningRecords`).push({
    amount:    totalEarn,
    miner:     cfg.name,
    timestamp: now
  });

  // Update local display
  userData.balance = balance + totalEarn;
  document.getElementById("liveBalance").textContent = "$" + Math.floor(userData.balance) + ".00";

  // ── CREDIT REFERRAL CHAIN (10% / 4% / 2%) ────────────────
  // Runs in background — doesn't block the UI
  creditReferralChain(uid, totalEarn, cfg.name).catch(console.error);
}

// ── START MINER ───────────────────────────────────────────────
async function startMiner(id, key) {
  const now     = Date.now();
  const newData = { start: now, lastUpdate: now, credited: false };
  await db.ref(`users/${uid}/miners/${key}`).set(newData);
  if (!userData.miners) userData.miners = {};
  userData.miners[key] = newData;
  delete _credited[key]; // allow re-crediting on next cycle
  renderRunning();
}

// ── RENDER SHOP ───────────────────────────────────────────────
function renderShop() {
  const container = document.getElementById("shopTab");
  container.innerHTML = "";

  Object.keys(MINERS).forEach(id => {
    const m     = MINERS[id];
    const owned = (userData.minerUnlocked && userData.minerUnlocked[id]) || 0;

    let btnHTML = `<button class="btn" onclick="buyMiner('${id}',${m.price})">Buy for $${m.price}</button>`;
    if (id === "S244" && owned >= 2) btnHTML = `<button class="btn" style="background:#334155;color:white;cursor:not-allowed;">Maximum 2 Purchased</button>`;
    else if (id !== "S244" && owned >= 1) btnHTML = `<button class="btn" style="background:#334155;color:white;cursor:not-allowed;">Already Owned</button>`;

    const card = document.createElement("div");
    card.className = "shop-card";
    card.innerHTML = `
      <div class="shop-header">
        <img src="${m.img}" class="shop-img" alt="${m.name}">
        <div>
          <div class="shop-name">${m.name}</div>
          <div style="font-size:13px;color:#64748b;">${m.cycleHours}h cycle • ${m.duration} day plan</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-label">PRICE</div><div class="stat-value">$${m.price}</div></div>
        <div class="stat-item"><div class="stat-label">DAILY</div><div class="stat-value" style="color:#00ff88;">$${m.daily}</div></div>
        <div class="stat-item"><div class="stat-label">PER CYCLE</div><div class="stat-value">$${m.daily * (m.cycleHours / 24)}</div></div>
        <div class="stat-item"><div class="stat-label">DURATION</div><div class="stat-value">${m.duration} days</div></div>
      </div>
      <div style="margin-top:12px;">${btnHTML}</div>`;
    container.appendChild(card);
  });
}

// ── BUY MINER ─────────────────────────────────────────────────
async function buyMiner(id, price) {
  const snap = await db.ref("users/" + uid).once("value");
  const data = snap.val() || {};
  const available = (data.balance || 0) + (data.team || 0);
  if (available < price) return alert("Not enough balance");

  let unlocked = data.minerUnlocked || {};
  let count    = unlocked[id] || 0;
  if (id === "S244" && count >= 2) return alert("You can only buy S-244 twice");
  if (id !== "S244" && count >= 1) return alert("You already own this miner");

  const instanceKey    = id === "S244" ? `${id}_${count + 1}` : id;
  const deductTeam     = Math.min(price, data.team || 0);
  const deductBalance  = price - deductTeam;

  // Referral points for referrer
  const refPoints = { S244:100, S500:200, S900:300, S1200:400 };
  const referrer  = data.referredBy;
  if (referrer && refPoints[id]) {
    db.ref("users/" + referrer).transaction(u => {
      if (!u) return u;
      u.pendingRewards = u.pendingRewards || {};
      u.pendingRewards[id] = (u.pendingRewards[id] || 0) + refPoints[id];
      return u;
    });
  }

  await db.ref("users/" + uid).update({
    balance: Math.max(0, (data.balance || 0) - deductBalance),
    team:    Math.max(0, (data.team    || 0) - deductTeam),
    [`minerUnlocked/${id}`]:   count + 1,
    [`miners/${instanceKey}`]: { start: Date.now(), lastUpdate: Date.now(), credited: false }
  });

  loadPage();
}

// ── TICK — display update every second ───────────────────────
function startTick() {
  setInterval(() => {
    if (!userData || !userData.miners) return;
    const unlocked = userData.minerUnlocked || {};
    Object.keys(unlocked).forEach(id => {
      const count = unlocked[id];
      for (let i = 1; i <= count; i++) {
        const key   = id === "S244" ? `${id}_${i}` : id;
        refreshCard(id, key, userData.miners[key]);
      }
    });
  }, 1000);
}

function nav(page) { window.location.href = page; }

window.addEventListener("load", async () => {
  await loadPage();
  startTick();
  setTimeout(() => document.getElementById("loader").style.display = "none", 1500);
  const params = new URLSearchParams(window.location.search);
  if (params.get("tab") === "purchase") showTab("shop");
});
</script>
