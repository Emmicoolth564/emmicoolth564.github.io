<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoJet Miner</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root { --neon:#00f0ff; --accent:#00ffcc; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#020617; color:#e2e8f0; min-height:100vh; overflow-x:hidden; }

    #loader { position:fixed; top:0; left:0; width:100%; height:100%; background:#020617; display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; }
    .loader-logo { font-size:30px; font-weight:900; color:#00ffcc; margin-bottom:20px; animation:glow 1.5s infinite alternate; }
    .loader-bar  { width:180px; height:4px; background:#111; border-radius:10px; overflow:hidden; }
    .loader-fill { width:0%; height:100%; background:#00ffcc; animation:loadBar 1.5s ease forwards; }
    @keyframes loadBar { to{ width:100%; } }
    @keyframes glow { from{text-shadow:0 0 5px #00ffcc;} to{text-shadow:0 0 25px #00ffcc;} }

    .header { padding:30px 20px 20px; text-align:center; font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700; color:var(--neon); text-shadow:0 0 30px rgba(0,240,255,0.6); }

    .level-hero { margin:0 20px 16px; border-radius:20px; padding:14px 20px; display:flex; align-items:center; gap:14px; }
    .lh-icon { font-size:26px; flex-shrink:0; }
    .lh-name { font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:800; }
    .lh-sub  { font-size:11px; opacity:0.75; margin-top:2px; }
    .lh-progress { margin-left:auto; text-align:right; }
    .lh-prog-val { font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:800; }
    .lh-prog-lbl { font-size:10px; opacity:0.6; text-transform:uppercase; letter-spacing:0.06em; }

    .lh-novice   { background:linear-gradient(135deg,rgba(100,116,139,0.2),rgba(100,116,139,0.06)); border:1px solid rgba(100,116,139,0.3); color:#94a3b8; }
    .lh-junior   { background:linear-gradient(135deg,rgba(34,197,94,0.18),rgba(34,197,94,0.05)); border:1px solid rgba(34,197,94,0.35); color:#22c55e; }
    .lh-pro      { background:linear-gradient(135deg,rgba(0,240,255,0.16),rgba(0,240,255,0.05)); border:1px solid rgba(0,240,255,0.35); color:#00f0ff; }
    .lh-elite    { background:linear-gradient(135deg,rgba(245,158,11,0.18),rgba(245,158,11,0.05)); border:1px solid rgba(245,158,11,0.35); color:#f59e0b; }
    .lh-legend   { background:linear-gradient(135deg,rgba(168,85,247,0.18),rgba(168,85,247,0.05)); border:1px solid rgba(168,85,247,0.35); color:#c084fc; }
    .lh-employee { background:linear-gradient(135deg,rgba(239,68,68,0.18),rgba(239,68,68,0.05)); border:1px solid rgba(239,68,68,0.35); color:#f87171; }

    .balance-header { text-align:center; margin:10px 20px 30px; background:rgba(15,23,42,0.9); border-radius:20px; padding:16px; box-shadow:0 0 30px rgba(0,240,255,0.2); }
    .balance-label  { font-size:13px; color:#94a3b8; }
    .balance-amount { font-size:32px; font-weight:700; color:#00ffcc; }

    .tabs { display:flex; justify-content:center; gap:12px; margin:0 20px 20px; }
    .tabs button { padding:12px 28px; border:none; border-radius:9999px; background:#111827; color:#00f0ff; font-weight:600; font-size:15px; cursor:pointer; font-family:'Inter',sans-serif; }
    .tabs button.active { background:#00ffcc; color:#000; box-shadow:0 0 20px #00ffcc; }

    .container { padding:0 20px 100px; }

    .miner-card { background:linear-gradient(145deg,#0f172a,#1e2937); border-radius:24px; padding:24px; margin-bottom:24px; box-shadow:0 20px 40px rgba(0,0,0,0.6); border:1px solid rgba(0,240,255,0.2); }
    .miner-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }

    .ring-wrap { position:relative; width:88px; height:88px; flex-shrink:0; }
    .ring-svg { position:absolute; top:0; left:0; width:88px; height:88px; transform:rotate(-90deg); }
    .ring-bg   { fill:none; stroke:#1e2937; stroke-width:5; }
    .ring-fill { fill:none; stroke:#00ffcc; stroke-width:5; stroke-linecap:round; stroke-dasharray:251.2; stroke-dashoffset:251.2; transition:stroke-dashoffset 1s linear; }
    .ring-fill.paused  { stroke:#ef4444; }
    .ring-fill.expired { stroke:#475569; }
    .miner-img { width:72px; height:72px; object-fit:contain; filter:drop-shadow(0 0 14px #00f0ff); position:absolute; top:8px; left:8px; }

    .miner-name  { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; color:#00ffcc; }
    .miner-dates { color:#94a3b8; font-size:13px; margin-top:4px; line-height:1.6; }

    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .stat-item  { background:rgba(2,6,23,0.6); border-radius:16px; padding:14px; text-align:center; }
    .stat-label { font-size:12px; color:#94a3b8; margin-bottom:4px; }
    .stat-value { font-size:18px; font-weight:700; }

    .status-box { border-radius:14px; padding:16px 18px; margin-top:4px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .status-box.active   { background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2); }
    .status-box.paused   { background:rgba(239,68,68,0.08);  border:1px solid rgba(239,68,68,0.25); }
    .status-box.inactive { background:rgba(100,116,139,0.1); border:1px solid rgba(100,116,139,0.2); }
    .status-box.expired  { background:rgba(71,85,105,0.1);   border:1px solid rgba(71,85,105,0.3); }

    .status-left { flex:1; }
    .status-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
    .badge-dot { width:8px; height:8px; border-radius:50%; }
    .badge-dot.green { background:#00ff88; animation:pulse 1.2s infinite; }
    .badge-dot.red   { background:#ef4444; animation:pulse 0.8s infinite; }
    .badge-dot.blue  { background:#00f0ff; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .earned-row { font-size:13px; color:#94a3b8; margin-top:2px; }
    .earned-val { font-size:22px; font-weight:700; color:#00ffcc; }

    .time-remaining { font-size:13px; color:#64748b; text-align:right; }
    .time-val { font-size:16px; font-weight:700; color:#e2e8f0; margin-top:2px; }

    .btn { width:100%; padding:16px; border:none; border-radius:16px; background:linear-gradient(90deg,#00f0ff,#00ffcc); color:#000; font-weight:700; font-size:16px; cursor:pointer; margin-top:14px; box-shadow:0 0 20px rgba(0,240,255,0.4); transition:0.2s; font-family:'Inter',sans-serif; }

    .auto-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(0,255,204,0.1); border:1px solid rgba(0,255,204,0.2); border-radius:999px; padding:4px 10px; font-size:11px; font-weight:700; color:#00ffcc; margin-top:6px; }

    .plan-bar-fill{ height:100%; background:linear-gradient(90deg,#00ffcc,#00f0ff); border-radius:999px; transition:width 0.5s; }
    .plan-label   { display:flex; justify-content:space-between; font-size:11px; color:#64748b; margin-top:4px; }

    /* LEVELS TAB */

    .th-info { flex:1; }
    .th-name { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:800; }
    .th-req  { font-size:12px; opacity:0.72; margin-top:5px; line-height:1.55; }
    .th-badge { padding:6px 14px; border-radius:999px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; flex-shrink:0; }

    .tier-novice   { background:linear-gradient(135deg,#1a2535,#0c1628); border:1px solid rgba(148,163,184,0.3); color:#94a3b8; }
    .tier-junior   { background:linear-gradient(135deg,#0d2318,#071a10); border:1px solid rgba(34,197,94,0.4); color:#22c55e; }
    .tier-pro      { background:linear-gradient(135deg,#0a1e30,#060f1c); border:1px solid rgba(0,240,255,0.4); color:#00f0ff; }
    .tier-elite    { background:linear-gradient(135deg,#1e1500,#120d00); border:1px solid rgba(245,158,11,0.45); color:#f59e0b; }
    .tier-legend   { background:linear-gradient(135deg,#1a0d2e,#0d0618); border:1px solid rgba(168,85,247,0.45); color:#c084fc; }
    .tier-employee { background:linear-gradient(135deg,#1e0a0a,#120505); border:1px solid rgba(239,68,68,0.45); color:#f87171; }

    .badge-active   { background:rgba(0,240,255,0.12); color:#00f0ff; border:1px solid rgba(0,240,255,0.3); animation:glowbadge 2s infinite alternate; }
    .badge-unlocked { background:rgba(34,197,94,0.12); color:#22c55e; border:1px solid rgba(34,197,94,0.3); }
    .badge-locked   { background:rgba(100,116,139,0.1); color:#64748b; border:1px solid rgba(100,116,139,0.2); }
    @keyframes glowbadge { from{box-shadow:none;} to{box-shadow:0 0 12px rgba(0,240,255,0.5);} }

    .shop-card { border-radius:24px; padding:24px; margin-bottom:14px; box-shadow:0 20px 40px rgba(0,0,0,0.5); }
    .shop-novice   { background:linear-gradient(145deg,#0f172a,#1e2937); border:1px solid rgba(0,240,255,0.15); }
    .shop-junior   { background:linear-gradient(145deg,#071a10,#0a2016); border:1px solid rgba(34,197,94,0.25); }
    .shop-pro      { background:linear-gradient(145deg,#060f1c,#091a2a); border:1px solid rgba(0,240,255,0.25); }
    .shop-elite    { background:linear-gradient(145deg,#120d00,#1c1400); border:1px solid rgba(245,158,11,0.3); }
    .shop-legend   { background:linear-gradient(145deg,#0d0618,#160a26); border:1px solid rgba(168,85,247,0.3); }
    .shop-employee { background:linear-gradient(145deg,#120505,#1c0808); border:1px solid rgba(239,68,68,0.3); }

    .shop-header { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
    .shop-img { width:72px; height:72px; object-fit:contain; filter:drop-shadow(0 0 14px #00f0ff); }
    .shop-name { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; }
    .shop-sub  { font-size:13px; color:#64748b; margin-top:4px; }

    .shop-btn { width:100%; padding:15px; border:none; border-radius:14px; font-weight:700; font-size:15px; cursor:pointer; margin-top:12px; transition:0.2s; font-family:'Inter',sans-serif; }
    .shop-btn:active { transform:scale(0.97); }
    .shop-btn.disabled { background:#334155; color:#64748b; cursor:not-allowed; }

    .btn-novice   { background:linear-gradient(90deg,#00f0ff,#00ffcc); color:#000; box-shadow:0 0 20px rgba(0,240,255,0.4); }
    .btn-junior   { background:linear-gradient(90deg,#22c55e,#00ffcc); color:#000; box-shadow:0 0 20px rgba(34,197,94,0.5); }
    .btn-pro      { background:linear-gradient(90deg,#00bfff,#00f0ff); color:#000; box-shadow:0 0 20px rgba(0,240,255,0.6); }
    .btn-elite    { background:linear-gradient(90deg,#f59e0b,#fbbf24); color:#000; box-shadow:0 0 20px rgba(245,158,11,0.6); }
    .btn-legend   { background:linear-gradient(90deg,#a855f7,#c084fc); color:#fff; box-shadow:0 0 20px rgba(168,85,247,0.6); }
    .btn-employee { background:linear-gradient(90deg,#ef4444,#f97316); color:#fff; box-shadow:0 0 20px rgba(239,68,68,0.6); }

    .promo-toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:linear-gradient(90deg,#00ffcc,#00f0ff); color:#000; padding:14px 28px; border-radius:999px; font-weight:800; font-size:14px; box-shadow:0 0 40px rgba(0,255,204,0.8); opacity:0; transition:all 0.4s; z-index:100001; pointer-events:none; white-space:nowrap; font-family:'Space Grotesk',sans-serif; }

    .nav-glass { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; height:70px; display:flex; justify-content:space-around; align-items:center; background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border-radius:25px; box-shadow:0 8px 30px rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); z-index:999; }
    .nav-item { text-align:center; color:#aaa; font-size:11px; cursor:pointer; }
    .nav-item.active { color:#00ffcc; }
    .icon { width:26px; height:26px; margin-bottom:4px; position:relative; }
    .icon.home::before { content:""; position:absolute; width:18px; height:18px; background:#aaa; transform:rotate(45deg); top:4px; left:4px; border-radius:3px; }
    .nav-item.active .home::before { background:#00ffcc; }
    .icon.miner::before { content:"⚡"; font-size:20px; position:absolute; left:3px; top:-2px; }
    .nav-item.active .miner::before { color:#00ffcc; }
    .icon.me { background:#ffffff22; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .icon.me::before { content:"👤"; font-size:14px; }
</style>
</head>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",

const db   = firebase.database();

const uid = localStorage.getItem("uid");
if (!uid) { alert("Session expired"); window.location.href = "signin.html"; }

let userData        = null;
let currentLevelKey = "novice";

const LEVELS = {
  novice:   { name:"Novice Miner",  emoji:"⛏️",  cls:"novice",   l1:0,   total:0,   dbName:"Novice Miner"  },
  junior:   { name:"Junior Miner",  emoji:"🥈",  cls:"junior",   l1:5,   total:20,  dbName:"Junior Miner"  },
  pro:      { name:"Pro Miner",     emoji:"💎",  cls:"pro",      l1:10,  total:50,  dbName:"Pro Miner"     },
  elite:    { name:"Elite Miner",   emoji:"🔥",  cls:"elite",    l1:25,  total:75,  dbName:"Elite Miner"   },
  legend:   { name:"Legend Miner",  emoji:"👑",  cls:"legend",   l1:50,  total:150, dbName:"Legend Miner"  },

const LEVEL_ORDER = ["novice","junior","pro","elite","legend","employee"];

// ── MINER CONFIG ──────────────────────────────────────────────
// ALL miners now 24hr cycle — auto-run until duration expires, no manual restart
const MINERS = {

  S900:  { name:"S-900",           tier:"novice",   price:50,   daily:2.00, cycleHours:24, img:"purchase3.png", duration:35,  maxOwn:1 },

  JX500: { name:"JX-500 Boost",    tier:"junior",   price:500,  daily:8,    cycleHours:24, img:"junior2.png",   duration:85,  maxOwn:1, unlimited:false },
  // PRO
  PX1K:  { name:"PX-1000 Apex",    tier:"pro",      price:1000, daily:12,   cycleHours:24, img:"pro1.png",      duration:120, maxOwn:1, unlimited:false },

const REFERRAL_LEVELS = [
  { level:1, pct:0.10 },
  { level:2, pct:0.04 },
  { level:3, pct:0.02 }
];

const REF_PTS = {
  S100:30,
  S244:50,  S500:75,   S900:100,  S1200:200,
  JX200:300, JX500:500,
  PX1K:800,  PX2K:1500,
  EX3K:2000, EX5K:3000,

};

function fmtTime(ms) {
  if (ms <= 0) return "00:00:00";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function fmtDate(ts) { return new Date(ts).toLocaleDateString("en-NG"); }
function nav(page)   { window.location.href = page; }

function getTierColor(cls) {
  return { novice:"#00ffcc", junior:"#22c55e", pro:"#00f0ff", elite:"#f59e0b", legend:"#c084fc", employee:"#f87171" }[cls] || "#00ffcc";
}

// ── LEVEL CHECK ───────────────────────────────────────────────
async function checkAndUpdateLevel() {
  if (userData.levelOverride) {
    const dbLevel    = userData.level || "Novice Miner";
    const matchedKey = LEVEL_ORDER.find(k => LEVELS[k].dbName === dbLevel) || "novice";
    currentLevelKey  = matchedKey;
    const lv   = LEVELS[matchedKey];
    const hero = document.getElementById("levelHero");
    hero.className = `level-hero lh-${lv.cls}`;
    hero.innerHTML = `
      <div class="lh-icon">${lv.emoji}</div>
      <div><div class="lh-name">${lv.name}</div><div class="lh-sub">Level set by admin</div></div>
      <div class="lh-progress"><div class="lh-prog-lbl">Active Team</div><div class="lh-prog-val">—</div></div>`;
    return;
  }
  const membersSnap = await db.ref("users/" + uid + "/teamMembers").once("value");
  const members     = membersSnap.val() || {};
  const l1Active    = Object.values(members).filter(m => m.hasMiner === true).length;
  const incomeSnap  = await db.ref("teamIncome/" + uid).once("value");
  const income      = incomeSnap.val() || {};
  const uniqueActive = new Set();
  Object.keys(members).forEach(mUid => { if (members[mUid].hasMiner) uniqueActive.add(mUid); });
  Object.values(income).forEach(r => { if (r.fromUid) uniqueActive.add(r.fromUid); });
  const totalActive = uniqueActive.size;
  document.getElementById("activeTeamCount").textContent = totalActive;

  let newLevelKey = "novice";
  for (const key of LEVEL_ORDER) {
    const req = LEVELS[key];
    if (l1Active >= req.l1 && totalActive >= req.total) newLevelKey = key;
  }
  currentLevelKey = newLevelKey;
  const lv  = LEVELS[newLevelKey];
  const idx = LEVEL_ORDER.indexOf(newLevelKey);
  const nextReq = idx < LEVEL_ORDER.length - 1
    ? `Need ${LEVELS[LEVEL_ORDER[idx+1]].l1} L1 + ${LEVELS[LEVEL_ORDER[idx+1]].total} total active`
    : "Maximum level reached 🏆";

  const hero = document.getElementById("levelHero");
  hero.className = `level-hero lh-${lv.cls}`;
  hero.innerHTML = `
    <div class="lh-icon">${lv.emoji}</div>
    <div><div class="lh-name">${lv.name}</div><div class="lh-sub">${nextReq}</div></div>
    <div class="lh-progress"><div class="lh-prog-lbl">Active Team</div><div class="lh-prog-val">${totalActive}</div></div>`;

  const prevLevel = userData.level || "Novice Miner";
  if (lv.dbName !== prevLevel && !userData.levelOverride) {
    await db.ref("users/" + uid + "/level").set(lv.dbName);
    userData.level = lv.dbName;
    showPromoToast("🎉 Promoted to " + lv.name + "!");
  }
}

function showPromoToast(msg) {
  const t = document.getElementById("promoToast");
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 4000);
}

function showTab(tab) {
  document.getElementById("runningTab").style.display = tab === "running" ? "block" : "none";
  document.getElementById("levelsTab").style.display  = tab === "levels"  ? "block" : "none";
  document.getElementById("runBtn").classList.toggle("active", tab === "running");
  document.getElementById("levBtn").classList.toggle("active", tab === "levels");
}

async function loadPage() {
  const snap = await db.ref("users/" + uid).once("value");
  userData   = snap.val() || {};
  // Show balance with 2 decimal places
  document.getElementById("liveBalance").textContent = "$" + (userData.balance || 0).toFixed(2);
  await checkAndUpdateLevel();
  renderRunning();
  renderLevels();
}

// ── RENDER RUNNING TAB ───────────────────────────────────────
function renderRunning() {
  const container = document.getElementById("runningTab");
  container.innerHTML = "";
  const unlocked  = userData.minerUnlocked || {};
  const minersMap = userData.miners || {};
  let hasAny = false;

  Object.keys(unlocked).forEach(id => {
    if (!MINERS[id]) return;
    const count = unlocked[id];
    for (let i = 1; i <= count; i++) {
      hasAny = true;
      const key  = (id === "S244" || id === "S100") ? `${id}_${i}` : id;
      const cfg  = MINERS[id];
      const mData = minersMap[key];

      // Plan expiry uses purchaseDate (when first bought)
      const purchaseDate = mData?.purchaseDate || mData?.start;
      const planExpiry   = (!cfg.unlimited && purchaseDate && cfg.duration)
        ? purchaseDate + cfg.duration * 86400000
        : null;
      const daysRemaining = planExpiry
        ? Math.max(0, Math.ceil((planExpiry - Date.now()) / 86400000))
        : null;
      const daysTotal   = cfg.duration || 1;
      const planPct     = planExpiry ? Math.max(0, Math.min(100, ((Date.now() - purchaseDate) / (daysTotal * 86400000)) * 100)) : 0;

      const totalEarnLabel = cfg.unlimited ? "∞ Unlimited" : "$" + (cfg.daily * cfg.duration).toLocaleString();
      const expiresLine    = cfg.unlimited
        ? "Plan: Unlimited — runs forever"
        : planExpiry
          ? `Expires: ${fmtDate(planExpiry)} · ${daysRemaining}d left`
          : "Starting soon...";

      const tierColor = getTierColor(LEVELS[cfg.tier].cls);
      const ringColor = cfg.tier === "novice" ? "#00ffcc" : tierColor;
      const card      = document.createElement("div");
      card.className  = "miner-card";
      card.id         = "card-" + key;

      card.innerHTML = `
        <div class="miner-header">
          <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 88 88">
              <circle class="ring-bg"   cx="44" cy="44" r="40"/>
              <circle class="ring-fill" cx="44" cy="44" r="40" id="ring-${key}" style="stroke:${ringColor}"/>
            </svg>
            <img src="${cfg.img}" class="miner-img" alt="${cfg.name}">
          </div>
          <div>
            <div class="miner-name" style="color:${ringColor};">${cfg.name}${count > 1 ? ` #${i}` : ""}</div>
            <div class="miner-dates">
              Bought: ${purchaseDate ? fmtDate(purchaseDate) : "—"}<br>${expiresLine}
            </div>
            <div class="auto-badge">⚡ Auto-Run</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-label">DAILY INCOME</div><div class="stat-value" style="color:#00ff88;">$${cfg.daily.toFixed(2)}</div></div>
          <div class="stat-item"><div class="stat-label">CYCLE</div><div class="stat-value">${cfg.cycleHours}h</div></div>
          <div class="stat-item"><div class="stat-label">TOTAL EARN</div><div class="stat-value" style="color:#f59e0b;">${totalEarnLabel}</div></div>
          <div class="stat-item"><div class="stat-label">DURATION</div><div class="stat-value">${cfg.unlimited ? "∞" : cfg.duration + "d"}</div></div>
        </div>
        ${!cfg.unlimited && planExpiry ? `
        <div class="plan-progress">
          <div class="plan-bar-bg"><div class="plan-bar-fill" style="width:${planPct}%"></div></div>
          <div class="plan-label"><span>Plan started</span><span>${daysRemaining}d remaining</span></div>
        </div>` : ""}
        <div id="statusbox-${key}"></div>`;

      container.appendChild(card);
      refreshCard(id, key, mData);
    }
  });

  if (!hasAny) {
    container.innerHTML = `<p style="text-align:center;color:#64748b;padding:60px 20px;font-size:15px;">No active miners yet.<br><br><span style="font-size:13px;">Go to the <strong style="color:#00ffcc;">Levels</strong> tab to buy your first miner.</span></p>`;
  }
}

// ── COMPUTE EARNED — always 24hr cycle ────────────────────────
function computeEarned(id, mData) {
  const cfg     = MINERS[id];
  const now     = Date.now();
  const elapsed = now - mData.start;
  const cycleMs = cfg.cycleHours * 3600000; // always 24hr = 86400000ms
  const dayMs   = 86400000;

  if (elapsed >= cycleMs) {
    return { displayEarned: cfg.daily, pct: 100, isComplete: true, timeLeft: 0 };
  }

  const pct      = (elapsed / cycleMs) * 100;
  const earned   = (elapsed / dayMs) * cfg.daily;
  const timeLeft = cycleMs - elapsed;
  return { displayEarned: Math.min(earned, cfg.daily), pct, isComplete: false, timeLeft };
}

// ── REFRESH CARD ─────────────────────────────────────────────
function refreshCard(id, key, mData) {
  const box = document.getElementById("statusbox-" + key);
  if (!box) return;
  const cfg = MINERS[id];

  // Check plan expiry
  const purchaseDate = mData?.purchaseDate || mData?.start;
  const planExpiry   = (!cfg.unlimited && purchaseDate && cfg.duration)
    ? purchaseDate + cfg.duration * 86400000 : null;
  const isPlanExpired = planExpiry && Date.now() > planExpiry && !cfg.unlimited;

  if (isPlanExpired) {
    // Plan expired — show final state
    const ring = document.getElementById("ring-" + key);
    if (ring) ring.classList.add("expired");
    box.innerHTML = `
      <div class="status-box expired">
        <div class="status-left">
          <div class="status-badge" style="color:#64748b;">
            <span class="badge-dot" style="background:#475569"></span> Plan Expired
          </div>
          <div class="earned-row">This miner has completed its ${cfg.duration}-day plan</div>
        </div>
      </div>`;
    return;
  }

  if (!mData || !mData.start) {
    box.innerHTML = `<div class="status-box inactive"><div style="font-size:14px;color:#64748b;text-align:center;width:100%;">Starting miner...</div></div>`;
    return;
  }

  const { displayEarned, pct, isComplete, timeLeft } = computeEarned(id, mData);

  // Update ring
  const ring = document.getElementById("ring-" + key);
  if (ring) {
    const circ   = 2 * Math.PI * 40;
    const offset = circ - (pct / 100) * circ;
    ring.style.strokeDasharray  = circ;
    ring.style.strokeDashoffset = offset;
    ring.classList.remove("paused", "expired");
  }

if (isComplete) {
    // If already credited but restart never happened — force restart now
    if (mData.credited) {
        forceRestart(id, key, mData);
    } else {
        checkAndCredit(id, key, mData);
    }
    box.innerHTML = `
      <div class="status-box paused">
        <div class="status-left">
          <div class="status-badge" style="color:#00f0ff;">
            <span class="badge-dot blue"></span> Crediting & Restarting...
          </div>
          <div class="earned-row">Cycle complete — crediting $${cfg.daily.toFixed(2)}</div>
        </div>
      </div>`;
  } else {
    box.innerHTML = `
      <div class="status-box active">
        <div class="status-left">
          <div class="status-badge" style="color:#00ff88;">
            <span class="badge-dot green"></span> Actively Earning
          </div>
          <div class="earned-row">Earned this cycle:</div>
          <div class="earned-val">$${displayEarned.toFixed(4)}</div>
        </div>
        <div style="text-align:right;">
          <div class="time-remaining">Next payout</div>
          <div class="time-val">${fmtTime(timeLeft)}</div>
        </div>
      </div>`;
  }
}

// ── CREDIT + AUTO-RESTART ─────────────────────────────────────
const _credited = {};
async function checkAndCredit(id, key, mData) {
  if (_credited[key]) return;
  if (mData.credited)  return;
  _credited[key] = true;

  const cfg          = MINERS[id];
  const totalEarn    = cfg.daily;  // 24hr cycle = exactly daily income
  const now          = Date.now();
  const purchaseDate = mData.purchaseDate || mData.start;

  // Mark credited first (prevents double-credit)
  await db.ref(`users/${uid}/miners/${key}`).update({ credited: true });

  // Credit balance using increment (no read needed)
  await db.ref(`users/${uid}/balance`).set(
    firebase.database.ServerValue.increment(totalEarn)
  );

  // Log mining record
  await db.ref(`users/${uid}/miningRecords`).push({
    amount: totalEarn, miner: cfg.name, timestamp: now
  });
// Update balance display immediately without waiting for a read
  userData.balance = (userData.balance || 0) + totalEarn;
  document.getElementById("liveBalance").textContent = "$" + userData.balance.toFixed(2);

  // ── AUTO-RESTART immediately — don't wait for referral chain ──
  const planExpiry = (!cfg.unlimited && purchaseDate && cfg.duration)
    ? purchaseDate + cfg.duration * 86400000 : null;

  if (!planExpiry || Date.now() < planExpiry) {
    const newData = {
      start:        now,
      purchaseDate: purchaseDate,
      lastUpdate:   now,
      credited:     false
    };
    await db.ref(`users/${uid}/miners/${key}`).set(newData);
    userData.miners[key] = newData;
    delete _credited[key];
    renderRunning();
  } else {
    renderRunning();
  }

  // Fire referral chain + level check in background — never blocks restart
  creditReferralChain(uid, totalEarn, cfg.name).catch(console.error);
  checkAndUpdateLevel().catch(console.error);
}
async function forceRestart(id, key, mData) {
    if (_credited[key]) return;
    _credited[key] = true;
    const cfg          = MINERS[id];
    const now          = Date.now();
    const purchaseDate = mData.purchaseDate || mData.start;
    const planExpiry   = (!cfg.unlimited && purchaseDate && cfg.duration)
        ? purchaseDate + cfg.duration * 86400000 : null;

    if (!planExpiry || now < planExpiry) {
        const newData = { start: now, purchaseDate, lastUpdate: now, credited: false };
        await db.ref(`users/${uid}/miners/${key}`).set(newData);
        userData.miners[key] = newData;
        delete _credited[key];
        renderRunning();
    } else {
        renderRunning();
    }
}
async function creditReferralChain(earnerUid, earnedAmount, minerName) {
  let currentUid    = earnerUid;
  const earnerSnap  = await db.ref(`users/${earnerUid}/minerId`).once("value");
  const earnerMiner = earnerSnap.val() || earnerUid.substring(0, 8);

  for (const { level, pct } of REFERRAL_LEVELS) {
    const refSnap     = await db.ref(`users/${currentUid}/referredBy`).once("value");
    const referrerUid = refSnap.val();
    if (!referrerUid) break;

    const teamCredit = parseFloat((earnedAmount * pct).toFixed(4));
    if (teamCredit <= 0) { currentUid = referrerUid; continue; }

    await db.ref(`users/${referrerUid}/team`).set(
      firebase.database.ServerValue.increment(teamCredit)
    );

    await db.ref(`teamIncome/${referrerUid}`).push({
      fromUid:   earnerUid,
      fromMiner: earnerMiner,
      amount:    teamCredit,
      level,
      miner:     minerName,
      pct:       pct * 100,
      timestamp: Date.now()
    });

    currentUid = referrerUid;
  }
}

// ── BUY MINER ─────────────────────────────────────────────────
async function buyMiner(id, price) {
  const m = MINERS[id];
  if (!m) return;

  const tierIdx = LEVEL_ORDER.indexOf(m.tier);
  const userIdx = LEVEL_ORDER.indexOf(currentLevelKey);
  if (userIdx < tierIdx) {
    const lv = LEVELS[m.tier];
    alert(`You need ${lv.name} to buy this miner!\n\nRequirement: ${lv.l1} L1 active + ${lv.total} total active team.`);
    return;
  }

  const snap      = await db.ref("users/" + uid).once("value");
  const data      = snap.val() || {};
  const available = (data.balance || 0) + (data.team || 0);
  if (available < price) return alert("Not enough balance.\nRequired: $" + price.toLocaleString());

  const unlocked = data.minerUnlocked || {};
  const count    = unlocked[id] || 0;
  if (count >= m.maxOwn) return alert("You already own the maximum of this miner.");

  // Key: S100 and S244 support multiple, others are single
  const instanceKey   = (id === "S244" || id === "S100") ? `${id}_${count + 1}` : id;
  const deductTeam    = Math.min(price, data.team || 0);
  const deductBalance = price - deductTeam;
  const referrer      = data.referredBy;
  const now           = Date.now();

  // Credit referral points
  if (referrer && REF_PTS[id]) {
    db.ref("users/" + referrer + "/pendingRewards/" + id).set(
      firebase.database.ServerValue.increment(REF_PTS[id])
    );
    db.ref("users/" + referrer + "/referralMinerRecords").push({
      buyerUid: uid, buyerMiner: m.name, pointsEarned: REF_PTS[id], timestamp: now
    });
  }

  // Update user — miner starts immediately on purchase, stores purchaseDate
  await db.ref("users/" + uid).update({
    balance: Math.max(0, (data.balance || 0) - deductBalance),
    team:    Math.max(0, (data.team    || 0) - deductTeam),
    [`minerUnlocked/${id}`]:   count + 1,
    [`miners/${instanceKey}`]: {
      start:        now,
      purchaseDate: now,   // ← tracks plan start for expiry
      lastUpdate:   now,
      credited:     false
    }
  });

  // Update referrer teamMembers with hasMiner + minerId
  if (referrer) {
    const myIdSnap  = await db.ref("users/" + uid + "/minerId").once("value");
    const myMinerId = myIdSnap.val() || uid.slice(0, 8);
    db.ref("users/" + referrer + "/teamMembers/" + uid).update({
      hasMiner: true, minerId: myMinerId
    });
  }

  await loadPage();
  showTab("running");
}

// ── RENDER LEVELS TAB ─────────────────────────────────────────
function renderLevels() {
  const container = document.getElementById("levelsTab");
  container.innerHTML = "";

  LEVEL_ORDER.forEach(levelKey => {
    const lv         = LEVELS[levelKey];
    const userIdx    = LEVEL_ORDER.indexOf(currentLevelKey);
    const tierIdx    = LEVEL_ORDER.indexOf(levelKey);
    const isUnlocked = tierIdx <= userIdx;
    const isCurrent  = levelKey === currentLevelKey;

    const badgeText  = isCurrent ? "✦ YOUR LEVEL" : isUnlocked ? "UNLOCKED" : "🔒 LOCKED";
    const badgeClass = isCurrent ? "badge-active"  : isUnlocked ? "badge-unlocked" : "badge-locked";
    const reqText    = levelKey === "novice"
      ? "Available to all users — start here"
      : `${lv.l1} Level 1 active + ${lv.total} total active team`;

    const section = document.createElement("div");
    section.className = "tier-section";
    section.innerHTML = `
      <div class="tier-header tier-${lv.cls}">
        <div class="th-icon">${lv.emoji}</div>
        <div class="th-info">
          <div class="th-name">${lv.name}</div>
          <div class="th-req">📋 ${reqText}</div>
        </div>
        <div class="th-badge ${badgeClass}">${badgeText}</div>
      </div>`;

    Object.entries(MINERS).filter(([, m]) => m.tier === levelKey).forEach(([id, m]) => {
      const owned     = (userData.minerUnlocked || {})[id] || 0;
      const isMaxed   = owned >= m.maxOwn;
      const tierColor = getTierColor(lv.cls);

      let btnHTML = "";
      if (isMaxed) {
        btnHTML = `<button class="shop-btn disabled">Already Owned</button>`;
      } else if (!isUnlocked) {
        btnHTML = `<button class="shop-btn disabled" onclick="lockedAlert('${lv.name}',${lv.l1},${lv.total})" style="cursor:pointer;opacity:0.6;">🔒 Locked — ${lv.name} Required</button>`;
      } else {
        btnHTML = `<button class="shop-btn btn-${lv.cls}" onclick="buyMiner('${id}',${m.price})">Buy for $${m.price.toLocaleString()}</button>`;
      }

      const card = document.createElement("div");
      card.className = `shop-card shop-${lv.cls}`;
      if (!isUnlocked) card.style.opacity = "0.6";

      const totalEarn = m.unlimited ? "∞" : "$" + (m.daily * m.duration).toFixed(2);

      card.innerHTML = `
        <div class="shop-header">
          <img src="${m.img}" class="shop-img" alt="${m.name}">
          <div>
            <div class="shop-name" style="color:${tierColor};">${m.name}</div>
            <div class="shop-sub">Auto-run · ${m.unlimited ? "∞ Unlimited" : m.duration + " days"} · Max ${m.maxOwn}×</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-label">PRICE</div><div class="stat-value">$${m.price.toLocaleString()}</div></div>
          <div class="stat-item"><div class="stat-label">DAILY</div><div class="stat-value" style="color:#00ff88;">$${m.daily.toFixed(2)}</div></div>
          <div class="stat-item"><div class="stat-label">TOTAL EARN</div><div class="stat-value" style="color:#f59e0b;">${totalEarn}</div></div>
          <div class="stat-item"><div class="stat-label">DURATION</div><div class="stat-value">${m.unlimited ? "∞ Forever" : m.duration + "d"}</div></div>
        </div>
        ${btnHTML}`;
      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

function lockedAlert(levelName, l1Needed, totalNeeded) {
  alert(`🔒 ${levelName} Required\n\nTo unlock these miners you need:\n• ${l1Needed} Level 1 active members\n• ${totalNeeded} total active team members`);
}

// ── TICK ──────────────────────────────────────────────────────
function startTick() {
  setInterval(() => {
    if (!userData || !userData.miners) return;
    const unlocked = userData.minerUnlocked || {};
    Object.keys(unlocked).forEach(id => {
      if (!MINERS[id]) return;
      const count = unlocked[id];
      for (let i = 1; i <= count; i++) {
        const key = (id === "S244" || id === "S100") ? `${id}_${i}` : id;
        refreshCard(id, key, userData.miners[key]);
      }
    });
  }, 1000);
}

window.addEventListener("load", async () => {
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = "signin.html"; return; }
    await loadPage();
    startTick();
    setTimeout(() => document.getElementById("loader").style.display = "none", 1500);
    const params = new URLSearchParams(window.location.search);
    if (params.get("tab") === "purchase") showTab("levels");
  });
});
</script>
