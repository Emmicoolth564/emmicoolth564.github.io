<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { max-width:100vw; overflow-x:hidden; }
body { font-family:'DM Sans',sans-serif; background:#020617; color:#e2e8f0; min-height:100vh; }

.header { padding:18px 16px; display:flex; align-items:center; background:rgba(2,6,23,0.97); backdrop-filter:blur(12px); border-bottom:1px solid rgba(34,197,94,0.15); position:sticky; top:0; z-index:100; }
.back { font-size:26px; color:#22c55e; cursor:pointer; padding-right:8px; }
.header h3 { flex:1; text-align:center; font-size:18px; font-weight:700; }

.balance-box { background:#0f172a; margin:14px 14px 0; padding:20px; border-radius:20px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.balance-label  { font-size:11px; color:#64748b; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }

.usdt-icon { width:16px; height:16px; background:linear-gradient(135deg,#26a17b,#1a8a65); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:900; color:#fff; flex-shrink:0; }

.content-wrapper { padding:0 14px 50px; }
.card { background:#0f172a; border-radius:20px; padding:20px 18px; box-shadow:0 8px 24px rgba(0,0,0,0.3); margin-bottom:14px; }

input {
    width:100%; padding:14px 16px; margin-top:10px;
    background:#1e2937; border:2px solid transparent; border-radius:13px;
    color:white; font-size:15px; font-family:'DM Sans',sans-serif;
    transition:border-color 0.2s; -webkit-appearance:none;
}
input:focus { border-color:#22c55e; outline:none; box-shadow:0 0 0 3px rgba(34,197,94,0.12); }

.button { width:100%; padding:15px; background:#22c55e; color:#022c22; font-weight:700; font-size:15px; border:none; border-radius:14px; cursor:pointer; box-shadow:0 6px 18px rgba(34,197,94,0.25); transition:all 0.2s; margin-top:14px; font-family:'DM Sans',sans-serif; }

.saved-bank { background:#1e2937; border-radius:14px; padding:16px; margin-bottom:14px; }

.wallet-label { font-size:13px; font-weight:600; color:#e2e8f0; margin-top:14px; margin-bottom:2px; }
.wallet-hint  { font-size:11px; color:#475569; margin-bottom:2px; }

.password-modal { position:fixed; inset:0; background:rgba(2,6,23,0.92); display:none; align-items:center; justify-content:center; z-index:10000; padding:20px; }
.password-box { background:#0f172a; width:100%; max-width:360px; border-radius:22px; padding:26px; text-align:center; border:1px solid rgba(34,197,94,0.2); }
.password-box h3 { margin-bottom:18px; font-size:17px; }

.loader { position:fixed; inset:0; background:rgba(2,6,23,0.96); display:none; align-items:center; justify-content:center; z-index:99999; }
.spinner { width:56px; height:56px; border:5px solid rgba(34,197,94,0.15); border-top:5px solid #22c55e; border-radius:50%; animation:spin 0.9s linear infinite; }
@keyframes spin { to{ transform:rotate(360deg); } }

.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#22c55e; color:#022c22; padding:12px 24px; border-radius:999px; font-weight:700; font-size:13px; box-shadow:0 8px 24px rgba(34,197,94,0.35); opacity:0; transition:all 0.3s; z-index:100000; pointer-events:none; max-width:90vw; text-align:center; white-space:nowrap; }

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const uid = localStorage.getItem("uid");
if (!uid) { alert("Please sign in first"); window.location.href = "signin.html"; }

const URL_APPROVE_WITHDRAW = "https://approvewithdraw-t34xxkwqvq-ew.a.run.app";

auth.onAuthStateChanged(user => {

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + tab).classList.add("active");
    renderCurrentTab();
}

function renderCurrentTab() {
    if (currentTab === "bank") renderBank();

}

function renderBank() {
    const c   = document.getElementById("content");

        c.innerHTML = `<div class="weekend-notice">⏸ <strong>Withdrawals are processed Monday – Friday only.</strong><br>Come back on a weekday.</div>`;

    c.innerHTML = `

        <h3 style="font-size:17px;font-weight:700;margin-bottom:14px;">Bank Withdrawal</h3>
        ${savedBank ? `
        <div class="saved-bank">
            <div class="bank-name">${savedBank.bank}</div>
            <p><strong>Name:</strong> ${savedBank.name}</p>
            <p><strong>Account:</strong> ${savedBank.number}</p>
            <button onclick="window.location.href='bank.html'" style="margin-top:12px;background:#334155;color:white;width:100%;padding:11px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;">Edit Bank Details</button>
        </div>` : `<p style="color:#f87171;text-align:center;padding:16px;font-size:13px;">No bank account saved.<br><a href="bank" style="color:#22c55e">Go to Bank Settings →</a></p>`}
        <input id="bankAmount" type="number" inputmode="decimal" placeholder="Enter withdrawal amount in USD">
        <div id="bankFeeBox" style="display:none" class="fee-box">
            <div class="fee-row"><span>Amount requested</span><strong id="feeReq">$0</strong></div>
            <div class="fee-row"><span>Processing fee (10%)</span><strong id="feeCharge" style="color:#f87171">-$0</strong></div>
            <div class="fee-row receive"><span>You will receive</span><strong id="feeRecv">$0</strong></div>
        </div>
        <button onclick="startBankWithdraw()" class="button">Request Withdrawal</button>
        <p style="text-align:center;font-size:12px;color:#475569;margin-top:10px;">Processing: up to 48 hours • Mon–Fri only</p>
    </div>`;

    document.getElementById("bankAmount").addEventListener("input", e => {
        const amt = parseFloat(e.target.value) || 0;
        const box = document.getElementById("bankFeeBox");
        if (amt > 0) {
            box.style.display = "block";
            document.getElementById("feeReq").textContent    = "$" + amt.toFixed(2);
            document.getElementById("feeCharge").textContent = "-$" + (amt * FEE_PERCENT).toFixed(2);
            document.getElementById("feeRecv").textContent   = "$" + (amt - amt * FEE_PERCENT).toFixed(2);
        } else { box.style.display = "none"; }
    });
}

function startBankWithdraw() {
    const amount = parseFloat(document.getElementById("bankAmount").value);
    if (!amount || amount < 3)  return toast("Minimum withdrawal is $3");
    if (amount > currentBalance) return toast("Insufficient balance");
    if (!savedBank)              return toast("Please set your bank details first");
    if (!withdrawalPassword)     { toast("Please set a withdrawal password first"); setTimeout(() => window.location.href = "bank", 1800); return; }
    pendingAmount = amount;
    window._withdrawType = "bank";
    document.getElementById("passwordModal").style.display = "flex";
    document.getElementById("withdrawPass").focus();
}

function startUSDTWithdraw() {
    const address = document.getElementById("usdtAddress").value.trim();
    const amount  = parseFloat(document.getElementById("usdtAmount").value);
    if (!address || !address.startsWith("0x") || address.length < 40) return toast("Please enter a valid BEP20 wallet address");
    if (!amount || amount < 3)  return toast("Minimum withdrawal is $3");
    if (amount > currentBalance) return toast("Insufficient balance");
    if (!withdrawalPassword) { toast("Please set a withdrawal password first"); setTimeout(() => window.location.href = "bank", 1800); return; }
    pendingAmount = amount;
    window._withdrawType = "usdt";
    window._usdtAddress  = address;
    document.getElementById("passwordModal").style.display = "flex";
    document.getElementById("withdrawPass").focus();
}

function verifyPassword() {
    const entered = document.getElementById("withdrawPass").value.trim();
    if (entered !== withdrawalPassword) { toast("Incorrect withdrawal password"); document.getElementById("withdrawPass").value = ""; return; }
    hidePasswordModal();
    if (window._withdrawType === "usdt") proceedUSDTWithdraw();
    else proceedBankWithdraw();
}
function hidePasswordModal() {
    document.getElementById("passwordModal").style.display = "none";
    document.getElementById("withdrawPass").value = "";
}

async function proceedBankWithdraw() {
    document.getElementById("loader").style.display = "flex";
    const charge      = pendingAmount * FEE_PERCENT;
    const finalAmount = pendingAmount - charge;
    const minerId     = await getMinerId();

    const txData = { uid, type:"withdraw", method:"bank", amount:pendingAmount, charge, finalAmount, status:"pending", date:Date.now(), ...savedBank };
    const txRef  = db.ref("transactions").push();
    await txRef.set(txData);
    await db.ref("userTransactions/" + uid + "/" + txRef.key).set({ uid, type:"withdraw", method:"bank", amount:pendingAmount, status:"pending", date:Date.now() });

    const approveUrl = `${URL_APPROVE_WITHDRAW}?txId=${txRef.key}&secret=${SECRET}`;
    const rejectUrl  = `${URL_REJECT_WITHDRAW}?txId=${txRef.key}&secret=${SECRET}`;

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id:ADMIN_CHAT_ID,
            text:`🏦 Bank Withdrawal Request\n──────────────────\n👤 User: ${uid}\n🆔 Miner ID: ${minerId}\n💰 Amount: $${pendingAmount.toFixed(2)}\n📉 Fee (10%): $${charge.toFixed(2)}\n✅ To Send: $${finalAmount.toFixed(2)}\n🏦 Bank: ${savedBank.bank}\n📋 Account: ${savedBank.number}\n👤 Name: ${savedBank.name}\n🔑 Tx ID: ${txRef.key}`,
            reply_markup:{ inline_keyboard:[[
                { text:"✅ Approve", url:approveUrl },
                { text:"❌ Reject",  url:rejectUrl  }
            ]]}})
    });
    document.getElementById("loader").style.display = "none";
    toast("Withdrawal submitted • Processing within 48 hours");
    setTimeout(() => renderCurrentTab(), 2000);
}

async function proceedUSDTWithdraw() {
    document.getElementById("loader").style.display = "flex";
    const address     = window._usdtAddress;
    const charge      = pendingAmount * FEE_PERCENT;
    const finalAmount = pendingAmount - charge;
    const minerId     = await getMinerId();

    const txData = { uid, type:"withdraw", method:"bep20", amount:pendingAmount, charge, finalAmount, status:"pending", date:Date.now(), walletAddress:address };
    const txRef  = db.ref("transactions").push();
    await txRef.set(txData);
    await db.ref("userTransactions/" + uid + "/" + txRef.key).set({ uid, type:"withdraw", method:"bep20", amount:pendingAmount, status:"pending", date:Date.now() });

    const approveUrl = `${URL_APPROVE_USDT}?txId=${txRef.key}&secret=${SECRET}`;
    const rejectUrl  = `${URL_REJECT_WITHDRAW}?txId=${txRef.key}&secret=${SECRET}`;

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id:ADMIN_CHAT_ID,
            text:`💎 USDT Withdrawal Request\n──────────────────\n👤 User: ${uid}\n🆔 Miner ID: ${minerId}\n💰 Amount: $${pendingAmount.toFixed(2)}\n📉 Fee (10%): $${charge.toFixed(2)}\n✅ To Send: $${finalAmount.toFixed(2)} USDT\n🌐 Network: BEP20 (BSC)\n📋 Address: ${address}\n🔑 Tx ID: ${txRef.key}`,
            reply_markup:{ inline_keyboard:[[
                { text:"✅ Approve & Send USDT", url:approveUrl },
                { text:"❌ Reject",              url:rejectUrl  }
            ]]}})
    });
    document.getElementById("loader").style.display = "none";
    toast("USDT withdrawal submitted • Sent automatically on approval");
    window._usdtAddress = null;
    setTimeout(() => renderCurrentTab(), 2000);
}

async function getMinerId() {
    return new Promise(resolve => {
        db.ref("users/" + uid).once("value", snap => resolve((snap.val()||{}).minerId||"N/A"));
    });
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3200);
}
</script>
