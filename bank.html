

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Settings • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
        --green: #22c55e;
        --dark: #020617;
        --card: #0f172a;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* HEADER */
    .header {
        padding: 20px 16px;
        display: flex;
        align-items: center;
        position: relative;
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(34, 197, 94, 0.15);
    }

    .back {
        font-size: 28px;
        color: #22c55e;
        cursor: pointer;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .header h3 {
        flex: 1;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.5px;
    }

    /* TABS */
    .tabs {
        display: flex;
        background: #0f172a;
        border-radius: 9999px;
        padding: 6px;
        margin: 20px 16px 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .tab {
        flex: 1;
        padding: 14px;
        text-align: center;
        font-weight: 600;
        font-size: 16px;
        border-radius: 9999px;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #94a3b8;
    }

    .tab.active {
        background: #22c55e;
        color: #022c22;
        box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
    }

    /* CONTENT WRAPPER */
    .content-wrapper {
        padding: 0 16px 30px;
    }

    .card {
        background: #0f172a;
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* INPUTS */
    input {
        width: 100%;
        padding: 16px 18px;
        margin-top: 12px;
        background: #1e2937;
        border: 2px solid transparent;
        border-radius: 16px;
        color: white;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    input:focus {
        border-color: #22c55e;
        outline: none;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    input::placeholder {
        color: #64748b;
    }

    /* BUTTON */
    .button {
        width: 100%;
        padding: 16px;
        margin-top: 24px;
        background: #22c55e;
        color: #022c22;
        font-weight: 700;
        font-size: 17px;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3);
    }

    .button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4);
    }

    /* SAVED BANK DISPLAY */
    .saved-bank {
        background: #0f172a;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .bank-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .bank-name {
        font-size: 18px;
        font-weight: 600;
        color: #22c55e;
    }

    .account-info p {
        margin: 8px 0;
        font-size: 15px;
        color: #cbd5e1;
    }

    /* BANK LIST */
    .list {
        max-height: 320px;
        overflow-y: auto;
        margin-top: 16px;
        background: #1e2937;
        border-radius: 16px;
        padding: 8px;
    }

    .list div {
        padding: 16px 20px;
        border-radius: 12px;
        margin-bottom: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 16px;
    }

    .list div:hover {
        background: #334155;
    }

    .list div.selected {
        background: #022c22;
        color: #22c55e;
        font-weight: 600;
    }

    /* MODALS */
    .modal {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(12px);
        display: none;
        align-items: flex-end;
        z-index: 10000;
    }

    .modal-box {
        width: 100%;
        max-width: 420px;
        background: #0f172a;
        border-radius: 28px 28px 0 0;
        padding: 28px 24px;
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        animation: modalPop 0.3s ease;
    }

    @keyframes modalPop {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }

    /* LOADER */
    .loader {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
    }

    .spin {
        width: 52px;
        height: 52px;
        border: 5px solid rgba(34, 197, 94, 0.2);
        border-top: 5px solid #22c55e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #22c55e;
        color: #022c22;
        padding: 14px 28px;
        border-radius: 9999px;
        font-weight: 600;
        box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 100000;
    }

    /* SCROLLBAR */
    .list::-webkit-scrollbar {
        width: 6px;
    }

    .list::-webkit-scrollbar-thumb {
        background: #22c55e;
        border-radius: 20px;
    }
</style>
</head>
<body>

<div class="loader" id="loader">
    <div class="spin"></div>
</div>

<!-- HEADER -->
<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Bank Settings</h3>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active" id="tab-bank" onclick="switchTab('bank', event)">Bank</div>
    <div class="tab" id="tab-pass" onclick="switchTab('pass', event)">Password</div>
</div>

<div id="content" class="content-wrapper"></div>

<!-- EDIT BANK MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3 style="margin-bottom: 24px; font-size: 20px; font-weight: 600;">Edit Bank Account</h3>
        
        <div onclick="openBankPicker()" style="cursor:pointer;">
            <input id="eBank" placeholder="Select Bank" readonly style="margin-bottom: 12px;">
        </div>
        
        <input id="eName" placeholder="Account Name">
        <input id="eNumber" placeholder="Account Number">
        
        <button onclick="updateBank()" class="button" style="margin-top: 32px;">Save Changes</button>
        
        <div onclick="document.getElementById('modal').style.display='none'" 
             style="text-align:center; margin-top: 20px; color:#64748b; font-size:15px; cursor:pointer;">
            Cancel
        </div>
    </div>
</div>

<!-- BANK PICKER MODAL -->
<div class="modal" id="bankPicker">
    <div class="modal-box">
        <h3 style="margin-bottom: 16px; font-size: 20px; font-weight: 600;">Select Bank</h3>
        
        <input id="pickerSearch" placeholder="Search bank..." 
               style="margin-bottom: 16px; background:#1e2937;">
        
        <div class="list" id="pickerList"></div>
        
        <div onclick="document.getElementById('bankPicker').style.display='none'" 
             style="text-align:center; margin-top: 24px; color:#64748b; font-size:15px; cursor:pointer;">
            Close
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// ==================== YOUR ORIGINAL FIREBASE & LOGIC (UNCHANGED) ====================
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

/* UID = MINER ID */
const uid = localStorage.getItem("uid");
if (!uid) location.href = "signin.html";

/* IMPORTANT GLOBALS */
let tab = "bank";
let selected = "";

/* BANK LIST (unchanged) */
const banks = ["Access Bank","GTBank","UBA","First Bank","Zenith Bank",
"Opay","PalmPay","Kuda","Moniepoint","FCMB","Union Bank",
"Sterling Bank","Wema Bank","Polaris Bank","Jaiz Bank",
"Fidelity Bank","Keystone Bank","Titan Trust Bank","Globus Bank",
"SunTrust Bank","Providus Bank","Parallex Bank","Rubies Bank",
"VFD Bank","Eyowo","Sparkle","ALAT","Mintyn","FairMoney","Carbon"];

/* LOAD USER */
function load() {
  db.ref("users/" + uid).once("value").then(s => {
    document.getElementById("loader").style.display = "none";
    let d = s.val() || {};
    tab === "bank" ? showBank(d) : showPass(d);
  });
}

/* SWITCH TAB */
function switchTab(t, e) {
  tab = t;
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  e.target.classList.add("active");
  load();
}

/* OPEN BANK PICKER */
function openBankPicker() {
  document.getElementById("bankPicker").style.display = "flex";
  renderPicker();
}

function renderPicker() {
  let list = document.getElementById("pickerList");
  let input = document.getElementById("pickerSearch");

  function draw(q = "") {
    list.innerHTML = "";
    banks.filter(b => b.toLowerCase().includes(q.toLowerCase()))
      .forEach(b => {
        let div = document.createElement("div");
        div.innerText = b;
        div.onclick = () => {
          selected = b;
          document.getElementById("eBank").value = b;
          document.getElementById("bankPicker").style.display = "none";
          toast("Selected " + b);
        };
        list.appendChild(div);
      });
  }

  draw();
  input.oninput = e => draw(e.target.value);
}

/* BANK UI */
function showBank(d) {
  const content = document.getElementById("content");

  if (!d.bank) {
    // ADD ACCOUNT MODE
    content.innerHTML = `
    <div class="card">
      <h3 style="font-size:20px; font-weight:600; margin-bottom:24px;">Add Bank Account</h3>
      <input id="name" placeholder="Account Name">
      <input id="number" placeholder="Account Number">
      <input id="search" placeholder="Search bank">
      <div class="list" id="list"></div>
      <button onclick="saveBank()" class="button">Save Account</button>
    </div>`;
    renderList("list", "search");
  } else {
    // SAVED ACCOUNT MODE
    selected = d.bank;
    content.innerHTML = `
    <div class="saved-bank">
      <div class="bank-header">
        <div class="bank-name">✓ ${d.bank}</div>
      </div>
      <div class="account-info">
        <p><strong>Account Name:</strong> ${d.name}</p>
        <p><strong>Account Number:</strong> ${mask(d.number)}</p>
      </div>
      <button onclick="edit()" class="button" style="margin-top:28px; background:#334155; color:white;">Edit Account</button>
    </div>`;
  }
}

/* RENDER BANK LIST (for add mode) */
function renderList(id, searchId) {
  let list = document.getElementById(id);
  let input = document.getElementById(searchId);

  function draw(q = "") {
    list.innerHTML = "";
    banks.filter(b => b.toLowerCase().includes(q.toLowerCase()))
      .forEach(b => {
        let div = document.createElement("div");
        div.innerText = b;
        if (b === selected) div.classList.add("selected");

        div.onclick = () => {
          selected = b;
          document.querySelectorAll(".list div").forEach(x => x.classList.remove("selected"));
          div.classList.add("selected");
          toast("Selected " + b);
        };
        list.appendChild(div);
      });
  }

  draw();
  input.oninput = e => draw(e.target.value);
}

/* SAVE BANK */
function saveBank() {
  let name = document.getElementById("name").value.trim();
  let number = document.getElementById("number").value.trim();

  if (!name || !number || !selected) return toast("Please complete all fields");

  db.ref("users/" + uid).update({
    bank: selected,
    name: name,
    number: number
  });

  toast("Account saved successfully");
  load();
}

/* EDIT - NOW WITH PASSWORD VERIFICATION */
function edit() {
  // First, ask for password
  let password = prompt("Enter your password to change bank account:");
  
  if (password === null) return; // User cancelled
  if (!password) return toast("Password cannot be empty");

  // Verify password with Firebase Auth
  firebase.auth().currentUser.reauthenticateWithCredential(
    firebase.auth.EmailAuthProvider.credential(
      firebase.auth().currentUser.email,
      password
    )
  ).then(() => {
    // Password correct - open modal
    document.getElementById("modal").style.display = "flex";
    
    db.ref("users/" + uid).once("value").then(s => {
      let d = s.val() || {};
      document.getElementById("eName").value = d.name || "";
      document.getElementById("eNumber").value = d.number || "";
      document.getElementById("eBank").value = d.bank || "";
      selected = d.bank || "";
    });
    
    toast("Password verified - edit your account");
  }).catch(err => {
    toast("❌ Incorrect password");
    console.error("Password verification failed:", err);
  });
}

function updateBank() {
  let name = document.getElementById("eName").value.trim();
  let number = document.getElementById("eNumber").value.trim();

  if (!name || !number || !selected) return toast("Please fill all fields");

  db.ref("users/" + uid).update({
    bank: selected,
    name: name,
    number: number
  });

  document.getElementById("modal").style.display = "none";
  toast("✓ Account updated successfully");
  load();
}

/* PASSWORD SECTION */
function showPass(d) {
  const content = document.getElementById("content");

  if (!d.withdrawalPassword) {
    content.innerHTML = `
    <div class="card">
      <h3 style="font-size:20px; font-weight:600; margin-bottom:24px;">Create Withdrawal Password</h3>
      <input id="p1" type="password" placeholder="Enter password">
      <input id="p2" type="password" placeholder="Confirm password">
      <button onclick="setPass()" class="button">Save Password</button>
    </div>`;
  } else {
    content.innerHTML = `
    <div class="card">
      <h3 style="font-size:20px; font-weight:600; margin-bottom:24px;">Password Active 🔐</h3>
      <p style="color:#64748b; margin-bottom:28px;">Your withdrawal password is set and protected.</p>
      <button onclick="resetPass()" class="button" style="background:#334155; color:white;">Change Password</button>
    </div>`;
  }
}

function setPass() {
  let p1 = document.getElementById("p1").value;
  let p2 = document.getElementById("p2").value;

  if (p1 !== p2) return toast("Passwords do not match");

  db.ref("users/" + uid).update({
    withdrawalPassword: p1,
    passwordTime: Date.now()
  });

  toast("Password saved successfully");
  load();
}

function resetPass() {
  db.ref("users/" + uid).once("value").then(s => {
    let d = s.val() || {};
    let last = d.passwordTime || 0;
    let now = Date.now();
    let diff = now - last;
    let limit = 7 * 24 * 60 * 60 * 1000;

    if (diff < limit) {
      let days = Math.ceil((limit - diff) / 86400000);
      return toast("You can change password in " + days + " day(s)");
    }

    db.ref("users/" + uid).update({ withdrawalPassword: null });
    toast("Password reset allowed");
    load();
  });
}

/* HELPERS */
function mask(n) {
  return n ? n.slice(0, 4) + "••••" + n.slice(-4) : "";
}

function toast(msg) {
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = 1;
  setTimeout(() => { t.style.opacity = 0; }, 2500);
}

/* MODAL CLICK OUTSIDE */
window.addEventListener("click", function(e) {
  if (e.target.id === "modal") e.target.style.display = "none";
  if (e.target.id === "bankPicker") e.target.style.display = "none";
});

/* INIT */
auth.onAuthStateChanged(user => {
  if (!user) { location.href = "signin.html"; return; }
  load();
});
</script>

</body>
</html>
