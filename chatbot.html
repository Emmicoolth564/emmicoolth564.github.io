<style>
:root {
  --green:#00ffcc; --blue:#00f0ff; --bg:#020617;
  --s1:#0c1628; --s2:#111f35; --border:rgba(0,255,204,0.12);
  --text:#e2e8f0; --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;max-width:100vw;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100%;}

.header{padding:14px 16px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn{font-size:22px;color:var(--green);cursor:pointer;background:rgba(0,255,204,0.08);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,255,204,0.15);flex-shrink:0;}
.bot-avatar-wrap{position:relative;flex-shrink:0;}
.bot-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#00ffcc,#00f0ff);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px rgba(0,255,204,0.35);}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#22c55e;border-radius:50%;border:2px solid var(--bg);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.header-info{flex:1;}
.bot-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--green);}
.bot-status{font-size:12px;color:#22c55e;margin-top:1px;}

.chat-area{flex:1;overflow-y:auto;padding:16px 14px 12px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#1e2937 transparent;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:#1e2937;border-radius:4px;}

.msg-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;}
.msg-row.user{flex-direction:row-reverse;}
.row-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00ffcc,#00f0ff);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-bottom:2px;}
.msg-wrap{display:flex;flex-direction:column;max-width:84%;}
.user .msg-wrap{align-items:flex-end;}
.bubble{padding:12px 16px;border-radius:18px;line-height:1.65;font-size:14px;word-break:break-word;}
.bubble.bot{background:var(--s1);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.bubble.user{background:linear-gradient(135deg,#00ffcc,#00bfff);color:#020617;border-bottom-right-radius:4px;font-weight:500;}
.bubble.bot b{color:var(--green);font-weight:700;}
.bubble.bot .bl{color:var(--blue);font-weight:700;}
.bubble.bot .gd{color:#22c55e;font-weight:700;}
.bubble.bot .am{color:#f59e0b;font-weight:700;}
.bubble.bot .rd{color:#f87171;font-weight:700;}
.bubble.bot p{margin-bottom:7px;}
.bubble.bot p:last-child{margin-bottom:0;}
.bubble.bot ul{padding-left:18px;margin:6px 0 2px;}
.bubble.bot ul li{margin-bottom:5px;color:#cbd5e1;font-size:13.5px;line-height:1.55;}
.bubble.bot ol{padding-left:18px;margin:6px 0 2px;}
.bubble.bot ol li{margin-bottom:6px;color:#cbd5e1;font-size:13.5px;line-height:1.55;}
.bubble.bot .step-box{background:var(--s2);border-radius:12px;padding:14px;margin:8px 0 4px;border:1px solid rgba(0,255,204,0.1);}
.bubble.bot .step-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.bubble.bot .step-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;font-size:13px;color:#cbd5e1;line-height:1.5;}
.bubble.bot .step-num{background:rgba(0,255,204,0.15);color:var(--green);font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.bubble.bot .page-tag{display:inline-block;background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.25);color:var(--blue);padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700;margin:0 2px;}
.bubble.bot .miner-grid{display:flex;flex-direction:column;gap:6px;margin:8px 0 4px;}
.bubble.bot .mc{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--s2);border-radius:10px;border:1px solid rgba(0,255,204,0.1);}
.bubble.bot .mc-name{font-weight:700;color:var(--green);font-size:13px;}
.bubble.bot .mc-info{font-size:11px;color:var(--muted);margin-top:2px;}
.bubble.bot .mc-price{color:#22c55e;font-weight:700;font-size:13px;}
.bubble.bot .tier-head{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin:10px 0 4px;padding-left:2px;}
.bubble.bot .tip-box{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:10px 13px;margin:8px 0 4px;font-size:13px;color:#fcd34d;line-height:1.55;}
.bubble.bot .warn-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px 13px;margin:8px 0 4px;font-size:13px;color:#f87171;line-height:1.55;}
.msg-time{font-size:11px;color:#334155;margin-top:3px;padding:0 2px;}

.typing-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;}
.typing-bubble{background:var(--s1);border:1px solid var(--border);padding:12px 16px;border-radius:18px;border-bottom-left-radius:4px;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:bounce 1.2s infinite;opacity:0.7;}
.dot:nth-child(2){animation-delay:.18s;}
.dot:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px);opacity:1}}

.chips{display:flex;flex-wrap:wrap;gap:6px;padding-left:36px;margin-bottom:8px;}
.chip{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid rgba(0,255,204,0.2);background:rgba(0,255,204,0.06);color:var(--green);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.chip:active{transform:scale(0.96);}

.support-wrap{padding-left:36px;margin-bottom:8px;}
.support-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(90deg,#00ffcc,#00bfff);color:#020617;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;}

.input-wrap{padding:12px 14px;background:rgba(2,6,23,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;}
.chat-input{flex:1;padding:12px 16px;border-radius:999px;border:1.5px solid rgba(0,255,204,0.18);background:var(--s1);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.chat-input:focus{border-color:rgba(0,255,204,0.45);}
.chat-input::placeholder{color:#334155;}
.send-btn{width:46px;height:46px;border-radius:50%;flex-shrink:0;border:none;background:linear-gradient(135deg,#00ffcc,#00bfff);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px rgba(0,255,204,0.3);transition:transform 0.15s;}
.send-btn:active{transform:scale(0.92);}
</style>

  { match:["hungry","food","eat","lunch","dinner","breakfast"], resp:`Haha, food on my mind too! 🍽️ Make sure your miners are running so you can afford a good meal! 😄 Need help with anything?` },
];

function matchKB(input) {
  const q = input.toLowerCase().trim();

  for (const { match, resp } of SMALL_TALK_PATTERNS) {
    if (match.some(m => q.includes(m))) {
      return { answer:resp, chips:["How does mining work?","How do I recharge?","How do I withdraw?"], isSupport:false };
    }
  }

  for (const word of FRUSTRATION) {
    if (q.includes(word)) {
      return {
        answer:`I completely understand your frustration, and I'm sorry you're going through this. 💙\n\nLet me connect you with our <b>live support team</b> right away — they can look into your specific situation personally.`,
        chips:[], isSupport:true
      };
    }
  }

  let best=null, bestScore=0;
  for (const entry of KB) {
    let score=0;
    for (const tag of entry.tags) {
      if (q.includes(tag)) score += tag.split(" ").length * 2;
    }
    if (score > bestScore) { bestScore=score; best=entry; }
  }

  if (best && bestScore > 0) {
    return { answer:best.answer(), chips:best.chips||[], isSupport:best.isSupport||false };
  }

  const GUESSES = [
    { words:["balance","money","dollar","earn","credit"], answer:`Sounds like a balance or earnings question! Your balance updates every 24 hours automatically when a mining cycle completes. Check ${pg("Miner → Running")} to see active miners. Want a full explanation?`, chips:["How do cycles work?","Why isn't my balance updating?","How do I withdraw?"] },
    { words:["miner","mine","s-100","s-244","s-900","s-500","s-1200","purchase","buy","level","tier"], answer:`Looks like a miner question! You can view and buy all miners at ${pg("Miner → Levels tab")}. Want to see all available plans?`, chips:["Show me all miners","Which miner is best?","How does auto-run work?"] },
    { words:["pay","send","transfer","naira","ngn","usdt","money in","fund","top","load"], answer:`Sounds like a deposit question! Head to ${pg("Me → Recharge")} — bank transfer or USDT both supported. Minimum $3. Want a step-by-step guide?`, chips:["How do I recharge with bank?","How do I deposit USDT?","How long does approval take?"] },
    { words:["withdraw","cash","out","receive","bank","payout","cashout"], answer:`Sounds like a withdrawal question! Go to ${pg("Me → Withdraw")} to cash out. Minimum $3, once per day, 10% fee. Want the full guide?`, chips:["How do I withdraw?","What's the fee?","Which days can I withdraw?"] },
    { words:["team","refer","invite","friend","link","referral"], answer:`Sounds like a referral or team income question! Go to ${pg("Me → Invite")} for your referral link. Want to know how team income and reward points work?`, chips:["How do referrals work?","What are reward points?","What is team income?"] },
    { words:["level","unlock","tier","junior","pro","elite","legend","employee"], answer:`Sounds like a level system question! CryptoJet has 6 levels that unlock better miners as your team grows. Want to know the full requirements?`, chips:["How does the level system work?","How do I build my team?","What miners are at each level?"] },
  ];

  for (const guess of GUESSES) {
    if (guess.words.some(w => q.includes(w))) {
      return { answer:guess.answer, chips:guess.chips, isSupport:false };
    }
  }

  return {
    answer:`Hmm, I'm not quite sure what you mean, but I'd love to help! 😊\n\nHere are some things I can assist with:\n<ul><li>⛏️ Mining and auto-run cycles</li><li>💰 Recharging (bank or USDT, min $3)</li><li>💸 Withdrawals (min $3, once daily, 10% fee)</li><li>👥 Referrals, team income and reward points</li><li>🏆 Level system and unlocking higher tier miners</li><li>🔐 Account and login issues</li></ul>\nTry rephrasing your question, or tap a suggestion below! 👇`,
    chips:["How does mining work?","How do I recharge?","How do I withdraw?","Level system explained","Contact Support"],
    isSupport:false
  };
}

// ═══════════════════════════════════════════════════════════════
//  UI ENGINE
// ═══════════════════════════════════════════════════════════════

const chatEl  = document.getElementById("chat");
const inputEl = document.getElementById("msgInput");
let   busy    = false;

function now() { return new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }); }
function scroll() { chatEl.scrollTop = chatEl.scrollHeight; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addUserMsg(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `<div class="msg-wrap"><div class="bubble user">${text.replace(/</g,"&lt;")}</div><div class="msg-time">${now()}</div></div>`;
  chatEl.appendChild(row); scroll();
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row"; row.id = "typing";
  row.innerHTML = `<div class="row-avatar">⚡</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatEl.appendChild(row); scroll();
}
function removeTyping() { const t = document.getElementById("typing"); if(t) t.remove(); }

async function addBotMsg(html, chips, isSupport) {
  const row = document.createElement("div");
  row.className = "msg-row";
  const id = "m" + Date.now();
  row.innerHTML = `<div class="row-avatar">⚡</div><div class="msg-wrap"><div class="bubble bot" id="${id}"></div><div class="msg-time">${now()}</div></div>`;
  chatEl.appendChild(row);
  const bubble = document.getElementById(id);

  const isComplex = html.includes("step-box") || html.includes("miner-grid") || html.includes("warn-box");
  if (isComplex || html.length > 600) {
    bubble.innerHTML = html; scroll();
  } else {
    const parts = html.split(/(<[^>]+>)/);
    let built = "";
    for (const part of parts) {
      if (part.startsWith("<")) { built += part; }
      else {
        const words = part.split(" ");
        for (let i = 0; i < words.length; i++) {
          built += (i > 0 ? " " : "") + words[i];
          bubble.innerHTML = built; scroll(); await sleep(16);
        }
      }
    }
  }
  bubble.removeAttribute("id");

  if (chips && chips.length) {
    const chipRow = document.createElement("div");
    chipRow.className = "chips";
    chips.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "chip"; btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll(".chips").forEach(el => el.remove());
        inputEl.value = c; send();
      };
      chipRow.appendChild(btn);
    });
    chatEl.appendChild(chipRow); scroll();
  }

  if (isSupport) {
    const wrap = document.createElement("div");
    wrap.className = "support-wrap";
    const btn = document.createElement("button");
    btn.className = "support-btn";
    btn.innerHTML = "💬 Open Telegram Support";
    btn.onclick = () => window.open("https://t.me/tiffany682", "_blank");
    wrap.appendChild(btn);
    chatEl.appendChild(wrap); scroll();
  }
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  busy = true;
  document.querySelectorAll(".chips").forEach(el => el.remove());
  addUserMsg(text);
  inputEl.value = "";
  const delay = 400 + Math.random() * 500;
  showTyping(); await sleep(delay); removeTyping();
  const { answer, chips, isSupport } = matchKB(text);
  await addBotMsg(answer, chips, isSupport);
  busy = false;
  inputEl.focus();
}

inputEl.addEventListener("keypress", e => { if (e.key === "Enter" && !busy) send(); });

window.onload = async () => {
  await sleep(400);
  await addBotMsg(
    `Hey! 👋 I'm <b>CryptoJet AI</b> — your smart 24/7 assistant.\n\nI know <b>everything</b> about this platform including all the latest updates — auto-run miners, the new $3 S-100 miner, level system, reward points, and more. What would you like help with?`,
    ["How does mining work?","What miners can I buy?","How do I recharge?","How do I withdraw?","Level system explained"],
    false
  );
};
