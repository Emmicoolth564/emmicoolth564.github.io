<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoJet Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#00ffcc; --blue:#00f0ff; --bg:#020617;
  --s1:#0c1628; --s2:#111f35; --border:rgba(0,255,204,0.12);
  --text:#e2e8f0; --muted:#64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; max-width:100vw; }

body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100%;
}

/* HEADER */
.header {
  padding:14px 16px;
  background:rgba(2,6,23,0.97);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  flex-shrink:0;
}
.back-btn {
  font-size:22px; color:var(--green); cursor:pointer;
  background:rgba(0,255,204,0.08); width:38px; height:38px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(0,255,204,0.15); flex-shrink:0;
}
.bot-avatar-wrap {
  position:relative; flex-shrink:0;
}
.bot-avatar {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,#00ffcc,#00f0ff);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; box-shadow:0 0 16px rgba(0,255,204,0.35);
}
.online-dot {
  position:absolute; bottom:1px; right:1px;
  width:10px; height:10px; background:#22c55e; border-radius:50%;
  border:2px solid var(--bg); animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-info { flex:1; }
.bot-name { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--green); }
.bot-status { font-size:12px; color:#22c55e; margin-top:1px; }

/* CHAT AREA */
.chat-area {
  flex:1;
  overflow-y:auto;
  padding:16px 14px 12px;
  display:flex;
  flex-direction:column;
  gap:2px;
  scroll-behavior:smooth;
  scrollbar-width:thin;
  scrollbar-color:#1e2937 transparent;
}
.chat-area::-webkit-scrollbar { width:3px; }
.chat-area::-webkit-scrollbar-thumb { background:#1e2937; border-radius:4px; }

/* MESSAGES */
.msg-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:8px; }
.msg-row.user { flex-direction:row-reverse; }

.row-avatar {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,#00ffcc,#00f0ff);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; margin-bottom:2px;
}

.msg-wrap { display:flex; flex-direction:column; max-width:80%; }
.user .msg-wrap { align-items:flex-end; }

.bubble {
  padding:12px 16px; border-radius:18px;
  line-height:1.65; font-size:14px; word-break:break-word;
  white-space:pre-wrap;
}
.bubble.bot {
  background:var(--s1); border:1px solid var(--border);
  border-bottom-left-radius:4px; color:var(--text);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.bubble.user {
  background:linear-gradient(135deg,#00ffcc,#00bfff);
  color:#020617; border-bottom-right-radius:4px; font-weight:500;
}
.bubble.bot strong { color:var(--green); }
.bubble.bot .hi { color:var(--green); font-weight:700; }
.bubble.bot .hi-b { color:var(--blue); font-weight:700; }
.bubble.bot .warn { color:#f59e0b; font-weight:700; }
.bubble.bot ul { padding-left:16px; margin:6px 0; }
.bubble.bot ul li { margin-bottom:4px; color:#cbd5e1; font-size:13px; }
.bubble.bot .miner-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 12px; background:var(--s2); border-radius:10px; margin:4px 0;
  border:1px solid rgba(0,255,204,0.1);
}
.bubble.bot .miner-label { font-weight:700; color:var(--green); font-size:13px; }
.bubble.bot .miner-meta  { font-size:12px; color:var(--muted); margin-top:2px; }
.bubble.bot .miner-price { color:#22c55e; font-weight:700; font-size:13px; }

.msg-time { font-size:11px; color:#334155; margin-top:3px; padding:0 2px; }

/* TYPING */
.typing-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:8px; }
.typing-bubble {
  background:var(--s1); border:1px solid var(--border);
  padding:12px 16px; border-radius:18px; border-bottom-left-radius:4px;
  display:flex; align-items:center; gap:5px;
}
.dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:bounce 1.2s infinite; opacity:0.7; }
.dot:nth-child(2){ animation-delay:.18s; }
.dot:nth-child(3){ animation-delay:.36s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px); opacity:1} }

/* SUGGESTIONS */
.chips {
  display:flex; flex-wrap:wrap; gap:6px;
  padding-left:36px; margin-bottom:8px;
}
.chip {
  padding:7px 14px; border-radius:999px; font-size:12px; font-weight:600;
  cursor:pointer; border:1.5px solid rgba(0,255,204,0.2);
  background:rgba(0,255,204,0.06); color:var(--green);
  transition:all 0.2s; font-family:'DM Sans',sans-serif;
}
.chip:active { transform:scale(0.96); background:rgba(0,255,204,0.12); }

/* SUPPORT BUTTON */
.support-wrap { padding-left:36px; margin-bottom:8px; }
.support-btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:12px 20px; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(90deg,#00ffcc,#00bfff); color:#020617;
  font-family:'DM Sans',sans-serif; font-weight:700; font-size:14px;
}

/* INPUT AREA */
.input-wrap {
  padding:12px 14px;
  background:rgba(2,6,23,0.97); backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex; gap:10px; align-items:center; flex-shrink:0;
}
.chat-input {
  flex:1; padding:12px 16px; border-radius:999px;
  border:1.5px solid rgba(0,255,204,0.18);
  background:var(--s1); color:var(--text);
  font-size:14px; font-family:'DM Sans',sans-serif;
  outline:none; transition:border-color 0.2s;
  -webkit-appearance:none;
}
.chat-input:focus { border-color:rgba(0,255,204,0.45); }
.chat-input::placeholder { color:#334155; }
.send-btn {
  width:46px; height:46px; border-radius:50%; flex-shrink:0; border:none;
  background:linear-gradient(135deg,#00ffcc,#00bfff); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 0 16px rgba(0,255,204,0.3);
  transition:transform 0.15s;
}
.send-btn:active { transform:scale(0.92); }
.send-btn:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="back-btn" onclick="history.back()">←</div>
  <div class="bot-avatar-wrap">
    <div class="bot-avatar">⚡</div>
    <div class="online-dot"></div>
  </div>
  <div class="header-info">
    <div class="bot-name">CryptoJet AI</div>
    <div class="bot-status">Always Online • AI Powered</div>
  </div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-wrap">
  <input class="chat-input" id="msgInput" placeholder="Ask me anything about CryptoJet..." autocomplete="off">
  <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
</div>

<script>
// ── FULL CRYPTOJET KNOWLEDGE BASE (no sensitive data) ─────────
const SYSTEM_PROMPT = `You are CryptoJet AI, the friendly and knowledgeable support assistant for CryptoJet — a Nigerian cloud-based crypto mining investment platform. You help users understand how the platform works, solve problems, and guide them through every feature.

== PLATFORM OVERVIEW ==
CryptoJet is a web-based passive income platform where users buy cloud miners, activate them, and earn daily income automatically. It is mobile-first, built for Nigerian users, and supports both bank transfers and USDT crypto payments.

== HOW MINING WORKS ==
- Users buy a miner (one-time purchase per miner type, except S-244 which can be bought twice)
- After buying, they tap "Start Mining" to begin a cycle
- S-244 and S-500: 48-hour cycles. Earnings show in real-time on screen but only credit to balance at end of 48 hours.
- S-900 and S-1200: 24-hour cycles. Earnings credit at end of 24 hours.
- For 48hr miners: after first 24hrs the earned amount shows as "pending balance" (not yet credited). At 48hrs the full cycle amount credits to balance.
- When a cycle ends, the miner shows "Earning Paused" in red. User must tap "Start New Cycle" to continue earning.
- A miner plan has a total duration (30-45 days) during which users can run multiple cycles.

== THE 4 MINER PLANS ==
1. S-244: $10, earns $0.50/day, 48-hour cycle, can buy maximum 2 of these, plan lasts 30 days
2. S-500: $30, earns $1.50/day, 48-hour cycle, own 1 only, plan lasts 30 days
3. S-900: $50, earns $2.00/day, 24-hour cycle, own 1 only, plan lasts 35 days
4. S-1200: $120, earns $4.00/day, 24-hour cycle, own 1 only, plan lasts 45 days

All miners pay for themselves within 25-30 days of consistent use.

== BUYING A MINER ==
- Funds are deducted from balance (main balance first, then team income)
- After purchase the miner appears on the Running tab
- User must tap Start to begin earning

== RECHARGING (DEPOSITING) ==
Two methods:
1. Bank Transfer (Opay): User enters USD amount, sees naira equivalent at ₦1,500/dollar, transfers to the Opay account, uploads receipt screenshot, admin reviews and approves. Usually takes 3-20 minutes.
2. USDT: Supports BEP20 (Binance Smart Chain) and TRC20 (TRON) networks. User sends USDT, pastes their Transaction Hash (TX ID), system verifies on blockchain automatically. BEP20 auto-approves. TRC20 also supported.
- Minimum deposit: $5 USDT
- There can only be ONE pending deposit at a time — must wait for current one to be settled
- Reference code must be included in bank transfer narration

== WITHDRAWALS ==
Two methods:
1. Bank Transfer: User must have bank details saved and withdrawal password set. Available Monday-Friday only. 10% fee deducted. Processing within 48 hours.
2. USDT BEP20: User provides BEP20 wallet address (must start with 0x). Sent automatically upon admin approval. 10% fee deducted.
- Minimum withdrawal: $10
- Withdrawal password required for all withdrawals
- Bank details must be saved first (in Bank Settings/Me page)
- Sharing withdrawal proof in community feed boosts "Miner Trust Score" for priority processing

== TEAM INCOME (PASSIVE REFERRAL EARNINGS) ==
- Users earn when people they referred complete mining cycles
- Level 1 (direct referrals): earn 10% of their mining cycle earnings
- Level 2 (referral's referrals): earn 4% of their mining cycle earnings
- Level 3: earn 2% of their mining cycle earnings
- These earnings go to "Team Income" balance, NOT main balance
- Team income can be used to buy miners OR withdrawn like normal balance
- View records on Team Income page

== REFERRAL SYSTEM ==
- Each user has a unique referral link (from Invite page)
- Share with friends to earn team income when they mine
- Referrals are tracked and shown in account

== TASKS & POINTS ==
- Daily check-in: earn 1 point per day, resets each 24 hours
- Social tasks (Telegram, WhatsApp, Facebook, Twitter, Instagram): earn 2 points each
- Points contribute to Miner Trust Score
- Trust Score affects withdrawal priority

== SIGN IN / ACCOUNT ==
- Sign up with Email (requires email verification for new accounts), Phone number, or Google
- Existing/old users are not required to re-verify email when signing in
- Phone users use +country code + number (20 country codes supported)
- Forgot Password: email users get reset link, phone users must add a recovery email first
- Miner ID format: CJ followed by a number (e.g. CJ1234) — given at account creation

== PAGES & NAVIGATION ==
- Dashboard: balance, team income, points, miner status, market prices, quick links
- Miner: running miners (with progress rings and countdown timers) + purchase tab
- Me (Profile): balance overview, bank settings, referral, team, transactions, miners
- Recharge: bank transfer or USDT deposit
- Withdraw: bank or USDT BEP20 withdrawal
- Transactions: full history of all deposits and withdrawals
- Team Record: history of team income earnings by level
- Tasks: daily check-in calendar + social tasks
- Feeds: community feed for sharing updates, reactions
- About: full platform info
- Invite: referral link + stats
- Mining Power (Miner Power): detailed specs of each miner model

== FEES ==
- Withdrawal fee: 10% on all withdrawals
- No deposit fee

== EXCHANGE RATE ==
- $1 USD = ₦1,500 (for bank transfer deposits)

== SUPPORTED BANKS / PAYMENTS ==
- Bank deposits: via Opay transfer
- USDT deposits: BEP20 (BSC) and TRC20 (TRON)
- USDT withdrawals: BEP20 only

== COMMON ISSUES & ANSWERS ==
- "Balance not updating": Mining earnings only credit at END of cycle (24h or 48h). The live counter shows real-time decimals but doesn't move to balance until cycle ends.
- "Miner paused": Cycle ended. Tap "Start New Cycle" to begin a new one.
- "Can't withdraw": Need bank details saved AND withdrawal password set. Go to Me > Bank Information.
- "Deposit not approved": Usually within 20 mins. Upload receipt if you haven't. Contact support if over 30 mins.
- "Two pending deposits blocked": Only 1 pending deposit allowed at a time. Wait for current one to settle.
- "Google sign-in issues": Ensure popups are allowed in browser settings.
- "Email verification": New email signups must verify before first login. Phone signups don't need verification.

== SUPPORT ==
- Telegram support: https://t.me/tiffany682
- Direct user-to-user community on Feeds page

== RULES FOR YOUR RESPONSES ==
1. Be warm, friendly, and encouraging — like a helpful friend, not a robot
2. Keep answers concise but complete. Use bullet points for steps.
3. If asked about private/technical/backend info (private keys, admin passwords, function URLs, database structure, exact API keys, admin chat IDs), say you don't have that info and refer to support
4. If you don't know something specific, give your best helpful guess and offer to connect to support
5. Use emojis naturally but don't overdo it
6. Always respond in the same language the user writes in
7. For greetings or small talk, respond warmly and offer to help with CryptoJet topics
8. Never make up prices, percentages, or features that aren't listed above
9. Encourage users — mining is exciting and the platform is legitimate
10. If user seems frustrated or confused, empathize first before explaining`;

// ── HELPERS ──────────────────────────────────────────────────
const chat      = document.getElementById("chat");
const input     = document.getElementById("msgInput");
const sendBtn   = document.getElementById("sendBtn");
let history     = [];
let isBusy      = false;

function now() {
  return new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}
function scroll() {
  chat.scrollTop = chat.scrollHeight;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── ADD USER BUBBLE ───────────────────────────────────────────
function addUser(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="msg-wrap">
      <div class="bubble user">${text.replace(/</g,"&lt;")}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  chat.appendChild(row);
  scroll();
}

// ── SHOW / REMOVE TYPING ──────────────────────────────────────
function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row"; row.id = "typing";
  row.innerHTML = `
    <div class="row-avatar">⚡</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  chat.appendChild(row); scroll();
}
function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

// ── RENDER MARKDOWN-LITE ──────────────────────────────────────
// Converts **bold**, *italic*, - lists, numbered lists into HTML
function renderMarkdown(text) {
  // Code blocks first
  text = text.replace(/```[\s\S]*?```/g, match => {
    const code = match.replace(/^```\w*\n?/, "").replace(/```$/, "");
    return `<code style="background:#0c1628;padding:2px 6px;border-radius:5px;font-size:12px;color:#00ffcc;">${code.replace(/</g,"&lt;")}</code>`;
  });
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  // Italic
  text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");
  // Bullet lists
  const lines = text.split("\n");
  let result = []; let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-•]\s+/.test(trimmed)) {
      if (!inList) { result.push("<ul>"); inList = true; }
      result.push("<li>" + trimmed.replace(/^[-•]\s+/, "") + "</li>");
    } else if (/^\d+\.\s+/.test(trimmed)) {
      if (!inList) { result.push("<ul>"); inList = true; }
      result.push("<li>" + trimmed.replace(/^\d+\.\s+/, "") + "</li>");
    } else {
      if (inList) { result.push("</ul>"); inList = false; }
      result.push(trimmed ? trimmed + "<br>" : "<br>");
    }
  }
  if (inList) result.push("</ul>");
  return result.join("").replace(/(<br>)+$/,"").replace(/^(<br>)+/,"");
}

// ── ADD BOT BUBBLE ────────────────────────────────────────────
async function addBot(text, chips) {
  const row = document.createElement("div");
  row.className = "msg-row";
  const bubbleId = "b" + Date.now();
  row.innerHTML = `
    <div class="row-avatar">⚡</div>
    <div class="msg-wrap">
      <div class="bubble bot" id="${bubbleId}"></div>
      <div class="msg-time">${now()}</div>
    </div>`;
  chat.appendChild(row);

  const bubble = document.getElementById(bubbleId);

  // Stream-render word by word for short responses, instant for long
  const words = text.split(" ");
  if (words.length < 60) {
    for (let i = 0; i < words.length; i++) {
      bubble.innerHTML = renderMarkdown(words.slice(0, i + 1).join(" "));
      scroll();
      await sleep(18);
    }
  } else {
    bubble.innerHTML = renderMarkdown(text);
    scroll();
  }

  bubble.removeAttribute("id");

  // Add chips if provided
  if (chips && chips.length) {
    const chipRow = document.createElement("div");
    chipRow.className = "chips";
    chips.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "chip"; btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll(".chips").forEach(el => el.remove());
        input.value = c;
        send();
      };
      chipRow.appendChild(btn);
    });
    chat.appendChild(chipRow);
    scroll();
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || isBusy) return;

  isBusy = true;
  sendBtn.disabled = true;
  document.querySelectorAll(".chips").forEach(el => el.remove());

  addUser(text);
  input.value = "";
  history.push({ role:"user", content:text });

  await sleep(400);
  showTyping();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model:      "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system:     SYSTEM_PROMPT,
        messages:   history
      })
    });

    const data    = await response.json();
    const content = data.content?.[0]?.text || "Sorry, I couldn't get a response. Please try again.";

    removeTyping();
    history.push({ role:"assistant", content });

    // Keep history max 20 messages to avoid token overflow
    if (history.length > 20) history = history.slice(-20);

    // Detect support escalation
    const wantsSupport = /telegram|support|human|agent|real person|t\.me/i.test(content);

    await addBot(content, getSuggestedChips(text, content));

    if (wantsSupport) {
      const wrap = document.createElement("div");
      wrap.className = "support-wrap";
      const btn = document.createElement("button");
      btn.className = "support-btn";
      btn.innerHTML = "💬 Open Telegram Support";
      btn.onclick = () => window.open("https://t.me/tiffany682", "_blank");
      wrap.appendChild(btn);
      chat.appendChild(wrap);
      scroll();
    }

  } catch (err) {
    removeTyping();
    await addBot("I'm having trouble connecting right now. Please try again in a moment, or contact our support on Telegram. 🙏");
  }

  isBusy = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── SMART CHIP SUGGESTIONS ────────────────────────────────────
function getSuggestedChips(userMsg, botResponse) {
  const m = userMsg.toLowerCase();
  const b = botResponse.toLowerCase();

  if (m.includes("miner") || b.includes("s-244") || b.includes("s-1200"))
    return ["How do I start mining?","How do I recharge?","Which miner is best?"];
  if (m.includes("recharge") || m.includes("deposit") || m.includes("fund"))
    return ["How long does approval take?","How do I withdraw?","What miners can I buy?"];
  if (m.includes("withdraw") || m.includes("cash out"))
    return ["What's the fee?","What days can I withdraw?","How do I add my bank?"];
  if (m.includes("refer") || m.includes("team") || m.includes("invite"))
    return ["Where is my referral link?","How do I withdraw team income?","What are the referral percentages?"];
  if (m.includes("hi") || m.includes("hello") || m.includes("hey") || m.includes("start"))
    return ["How does mining work?","How do I recharge?","What miners are available?","How do I withdraw?"];
  if (m.includes("balance") || m.includes("earning"))
    return ["Why isn't my balance updating?","How do I withdraw?","How does mining work?"];
  if (b.includes("support") || b.includes("telegram"))
    return [];

  return ["How does mining work?","How do I recharge?","How do I withdraw?"];
}

// ── ENTER KEY ─────────────────────────────────────────────────
input.addEventListener("keypress", e => { if (e.key === "Enter" && !isBusy) send(); });

// ── GREETING ON LOAD ──────────────────────────────────────────
window.onload = async () => {
  await sleep(300);
  const greeting = `Hey! 👋 I'm **CryptoJet AI** — your 24/7 mining assistant powered by real AI.\n\nI know everything about CryptoJet — miners, recharges, withdrawals, referrals, team income, and more. What do you need help with?`;
  await addBot(greeting, [
    "How does mining work?",
    "How do I recharge?",
    "What miners are available?",
    "How do I withdraw?",
    "How does referral work?"
  ]);
};
</script>
</body>
</html>
