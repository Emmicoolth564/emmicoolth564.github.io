<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Points Exchange • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
        --neon: #00f0ff;
        --accent: #00ffcc;
        --dark: #020617;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
        height: 100%;
        overflow: hidden; /* Prevents extra scroll */
    }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: linear-gradient(145deg, #020617, #0a1428);
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
    }

    .header {
        padding: 20px 16px;
        display: flex;
        align-items: center;
        background: rgba(2,6,23,0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0,240,255,0.2);
        flex-shrink: 0;
    }
    .back { font-size:28px; color:#00ffcc; cursor:pointer; }
    .header h3 { flex:1; text-align:center; font-size:22px; font-weight:700; font-family:'Space Grotesk', sans-serif; }

    .content-wrapper {
        flex: 1;
        overflow-y: auto;
        padding: 24px 16px;
        -webkit-overflow-scrolling: touch;
    }

    .card {
        background: rgba(15,23,42,0.85);
        border-radius: 28px;
        padding: 32px 24px;
        box-shadow: 0 25px 70px rgba(0,240,255,0.18);
        border: 1px solid rgba(0,240,255,0.3);
        backdrop-filter: blur(16px);
    }

    .logo {
        text-align:center;
        font-family: 'Space Grotesk', sans-serif;
        font-size:42px;
        font-weight:700;
        background: linear-gradient(90deg, #00f0ff, #00ffcc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
        animation: glow 4s infinite alternate;
    }
    @keyframes glow { from { text-shadow: 0 0 20px #00f0ff; } to { text-shadow: 0 0 45px #00ffcc; } }

    .points-display {
        text-align:center;
        margin: 40px 0 30px;
        padding: 24px;
        background: rgba(0,240,255,0.08);
        border-radius: 24px;
        border: 1px solid rgba(0,240,255,0.25);
    }
    .points-label { font-size:15px; color:#94a3b8; letter-spacing:2px; text-transform:uppercase; }
    .points-value { 
        font-size:64px; 
        font-weight:700; 
        color:#00ffcc; 
        font-family:'Space Grotesk', sans-serif;
        text-shadow: 0 0 30px rgba(0,255,204,0.7);
    }

    .input-container {
        position: relative;
        margin: 30px 0;
    }
    input {
        width:100%;
        padding:22px 24px;
        background:#020617;
        border:2px solid rgba(0,240,255,0.4);
        border-radius:20px;
        color:white;
        font-size:24px;
        text-align:center;
        transition: all 0.3s;
    }
    input:focus {
        border-color:#00ffcc;
        box-shadow:0 0 0 8px rgba(0,255,204,0.15);
        outline:none;
    }

    .rate {
        text-align:center;
        color:#00ffcc;
        font-size:17px;
        margin:15px 0 25px;
        font-weight:500;
    }

    .btn {
        width:100%;
        padding:20px;
        background:linear-gradient(90deg,#00ffcc,#22c55e);
        color:#000;
        border:none;
        border-radius:20px;
        font-weight:700;
        font-size:18px;
        cursor:pointer;
        box-shadow:0 0 35px rgba(0,255,204,0.7);
        transition:0.3s;
        margin-top:10px;
    }
    .btn:disabled {
        background:#334155;
        color:#64748b;
        cursor:not-allowed;
        box-shadow:none;
    }
    .btn:active { transform:scale(0.96); }

    .instructions {
        margin-top:40px;
        background:rgba(30,41,59,0.7);
        padding:28px;
        border-radius:24px;
        font-size:15px;
        line-height:1.8;
        border:1px solid rgba(0,240,255,0.15);
    }

    .error {
        color:#f87171;
        text-align:center;
        margin:15px 0;
        font-size:15px;
    }

    .success {
        color:#22c55e;
        text-align:center;
        margin:20px 0;
        font-size:16px;
        font-weight:600;
    }
</style>
</head>
<body>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Points Exchange</h3>
</div>

<div class="content-wrapper">
    <div class="card">
        <div class="logo">CryptoJet</div>
        
        <div class="points-display">
            <div class="points-label">AVAILABLE POINTS</div>
            <div id="points" class="points-value">0</div>
        </div>

        <div class="input-container">
            <input type="number" id="amount" placeholder="Enter points (min 100)" min="100">
        </div>

        <div class="rate">100 Points = <strong>$1.00 USD</strong></div>

        <button onclick="exchangePoints()" id="exchangeBtn" class="btn">CONVERT TO TEAM INCOME</button>

        <div id="message" style="margin-top:16px;min-height:28px;"></div>

        <div class="instructions">
            <strong>How It Works</strong><br><br>
            • Minimum 100 points ($1.00)<br>
            • Points converted directly to Team Income<br>
            • Cannot be withdrawn but usable for miners<br>
            • Purchase miners using Team Income<br>
            • Exchange is irreversible and secure
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "signin.html";

let currentPoints = 0;

function loadPoints() {
  db.ref("users/" + uid).on("value", snap => {
    const d = snap.val() || {};
    currentPoints = d.points || 0;
    document.getElementById("points").innerText = currentPoints.toLocaleString();
  });
}

function exchangePoints() {
  const input = document.getElementById("amount");
  const pointsToExchange = parseInt(input.value);
  const messageDiv = document.getElementById("message");
  const btn = document.getElementById("exchangeBtn");

  messageDiv.innerHTML = "";
  btn.disabled = true;

  if (!pointsToExchange || pointsToExchange < 100) {
    messageDiv.innerHTML = `<div class="error">❌ Minimum 100 points required</div>`;
    btn.disabled = false;
    return;
  }

  if (pointsToExchange > currentPoints) {
    messageDiv.innerHTML = `<div class="error">❌ You don't have enough points</div>`;
    btn.disabled = false;
    return;
  }

  const dollars = Math.floor(pointsToExchange / 100);

  db.ref("users/" + uid).once("value", snap => {
    const d = snap.val() || {};

    db.ref("users/" + uid).update({
      points: (d.points || 0) - pointsToExchange,
      teamIncome: (d.teamIncome || 0) + dollars
    }).then(() => {
      messageDiv.innerHTML = `
        <div class="success">
          ✅ Exchanged ${pointsToExchange} points<br>
          +$${dollars} to Team Income
        </div>`;
      input.value = "";
      btn.disabled = false;
      setTimeout(() => loadPoints(), 800);
    }).catch(() => {
      messageDiv.innerHTML = `<div class="error">❌ Something went wrong. Try again.</div>`;
      btn.disabled = false;
    });
  });
}

window.onload = () => {
  loadPoints();
};
</script>
</body>
</html>
