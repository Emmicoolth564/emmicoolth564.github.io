<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mining Income • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
        --neon: #00f0ff;
        --accent: #00ffcc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .header {
        padding: 20px 16px;
        display: flex;
        align-items: center;
        background: rgba(2,6,23,0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(34,197,94,0.15);
    }
    .back { font-size:28px; color:#22c55e; cursor:pointer; }
    .header h3 { flex:1; text-align:center; font-size:20px; font-weight:600; }

    .content-wrapper { padding:0 16px 30px; }

    /* HERO */
    .hero {
        background: linear-gradient(145deg, #0f172a, #1e2937);
        border-radius: 28px;
        padding: 32px 24px;
        margin-bottom: 28px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,240,255,0.2);
    }
    .hero h2 { font-size: 18px; color: #94a3b8; margin-bottom: 8px; }
    .hero .total { font-size: 48px; font-weight: 700; color: #00ffcc; letter-spacing: -2px; }

    /* RECORD CARD */
    .record-card {
        background: linear-gradient(145deg, #0f172a, #1e2937);
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 18px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        border: 1px solid rgba(0,240,255,0.15);
        transition: all 0.4s;
    }
    .record-card:hover {
        transform: translateY(-6px);
        border-color: var(--neon);
    }

    .record-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }
    .miner-name {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #00ffcc;
    }
    .amount {
        font-size: 28px;
        font-weight: 700;
        color: #22c55e;
    }

    .record-meta {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: #94a3b8;
    }

    .loader {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        flex-direction: column;
        color: #00f0ff;
    }
    .spinner {
        width: 72px;
        height: 72px;
        border: 8px solid rgba(0,240,255,0.15);
        border-top: 8px solid #00f0ff;
        border-radius: 50%;
        animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
        text-align: center;
        padding: 100px 20px;
        color: #64748b;
        font-size: 16px;
    }
</style>
</head>
<body>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <div style="margin-top:24px;font-size:18px;font-weight:600;">Loading mining records...</div>
</div>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Mining Income</h3>
</div>

<div id="content" class="content-wrapper"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const uid = localStorage.getItem("uid");
if (!uid) {
    alert("Please sign in first");
    window.location.href = "signin.html";
}

function loadRecords() {
    document.getElementById("loader").style.display = "flex";

    db.ref("users/" + uid + "/miningRecords").orderByChild("timestamp").once("value").then(snap => {
        document.getElementById("loader").style.display = "none";

        const records = snap.val() || {};
        let total = 0;
        let html = `
        <div class="hero">
            <h2>Total Mining Income</h2>
            <div class="total" id="totalEarned">$0.00</div>
        </div>`;

        // Sort by timestamp descending (newest first)
        const sortedRecords = Object.entries(records).sort((a,b) => b[1].timestamp - a[1].timestamp);

        sortedRecords.forEach(([id, record]) => {
            const amount = parseFloat(record.amount || 0);
            total += amount;

            const date = new Date(record.timestamp);
            const formattedDate = date.toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' });
            const formattedTime = date.toLocaleTimeString('en-NG', { hour:'numeric', minute:'2-digit' });

            html += `
            <div class="record-card">
                <div class="record-header">
                    <div class="miner-name">${record.miner || 'Unknown Miner'}</div>
                    <div class="amount">+$${amount}</div>
                </div>
                <div class="record-meta">
                    <div>${formattedDate}</div>
                    <div>${formattedTime}</div>
                </div>
            </div>`;
        });

        document.getElementById("content").innerHTML = html;
        document.getElementById("totalEarned").textContent = "$" + total.toFixed(2);

        if (sortedRecords.length === 0) {
            document.getElementById("content").innerHTML = `
            <div class="empty">
                💰 No mining income yet<br>
                <span style="font-size:14px;">Your earning records appears after adding to balance </span>
            </div>`;
        }
    }).catch(err => {
        console.error(err);
        document.getElementById("loader").style.display = "none";
        alert("Error loading records");
    });
}

auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = "signin.html"; return; }
  loadRecords();
});
</script>
</body>
</html>
