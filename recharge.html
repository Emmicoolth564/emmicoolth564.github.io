// ── STATE — persisted across refreshes ────────────────────────
let proofBase64       = null;
let currentStep       = parseInt(localStorage.getItem("cj_r_step") || "1");
let selectedAmountUSD = parseFloat(localStorage.getItem("cj_r_amount") || "0");
let selectedNetwork   = localStorage.getItem("cj_r_network") || null;
let timerInterval     = null;
let currentTab        = localStorage.getItem("cj_r_tab") || "bank";

function saveState() {
    localStorage.setItem("cj_r_step",    currentStep);
    localStorage.setItem("cj_r_amount",  selectedAmountUSD);
    localStorage.setItem("cj_r_network", selectedNetwork || "");
    localStorage.setItem("cj_r_tab",     currentTab);
}

function clearState() {
    localStorage.removeItem("cj_r_step");
    localStorage.removeItem("cj_r_amount");
    localStorage.removeItem("cj_r_network");
    localStorage.removeItem("cj_r_tab");
    currentStep = 1; selectedAmountUSD = 0; selectedNetwork = null;
}

// ── CHECK FOR EXISTING PENDING RECHARGE ───────────────────────
async function hasPendingRecharge() {
    const snap = await db.ref("userTransactions/" + uid).once("value");
    const txs  = snap.val() || {};
    return Object.values(txs).some(t => t.type === "recharge" && t.status === "pending");
}

// ── TAB SWITCH ────────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + tab).classList.add("active");
    currentStep = 1; selectedAmountUSD = 0; selectedNetwork = null;
    proofBase64 = null;
    clearState();
    renderTab(tab);
}

function renderTab(tab) {
    if (tab === "bank") renderBank();
    else renderUSDT();
}

            </div>`;

        }

        c.innerHTML = `
        <div class="card">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:6px;">Bank Deposit</h3>
            <p style="font-size:13px;color:#64748b;margin-bottom:16px;">Enter the amount you want to recharge in USD</p>

            <button onclick="confirmBankAmount()" class="button">Continue →</button>
        </div>`;
        document.getElementById("usdAmount").addEventListener("input", e => {
            const usd = parseFloat(e.target.value) || 0;
            document.getElementById("ngnPreview").textContent =
                usd > 0 ? `You will pay: ₦${(usd * 1500).toLocaleString("en-US")}` : "You will pay: ₦0.00";
        });
        return;
    }

    // STEP 2 — payment screen
    const ngn = (selectedAmountUSD * 1500).toLocaleString("en-US");
    c.innerHTML = `
    <div class="instructions-box">
        <div class="inst-title">⚠️ Important Instructions</div>
        <ul class="inst-list">
            <li class="inst-item"><span class="num">1</span><span class="inst-text">Always add your reference code <span class="hi">${REFERENCE_CODE}</span> as the transfer description/narration</span></li>
            <li class="inst-item"><span class="num">2</span><span class="inst-text">Transfer the <span class="hi-g">exact naira amount</span> shown — do not round up or down</span></li>
            <li class="inst-item"><span class="num">3</span><span class="inst-text">Always upload a clear screenshot of your payment receipt before submitting</span></li>

            <li class="inst-item"><span class="num">5</span><span class="inst-text">Recharge typically reflects within 3–20 minutes after proof is verified</span></li>
            <li class="inst-item"><span class="num">6</span><span class="inst-text">Contact support immediately if balance is not updated after 30 minutes</span></li>
        </ul>

    <div class="bank-details-card">

        <div class="bank-row">

            <div class="bank-row-value">Opay</div>
        </div>

            <div class="bank-row-value">Miracle Elijah Nwanso</div>

        <div style="font-size:15px;font-weight:700;margin-bottom:4px;">Upload Receipt</div>

        <div class="upload-area" onclick="document.getElementById('proofFile').click()">

function confirmBankAmount() {
    const amount = parseFloat(document.getElementById("usdAmount").value);
    if (!amount || amount <= 0) return toast("Please enter a valid amount");
    if (amount < 5) return toast("Minimum deposit is $5");
    selectedAmountUSD = amount;
    currentStep = 2;
    saveState();
    renderBank();
}

function cancelPayment() {
    if (!confirm("Cancel this payment? Your saved progress will be cleared.")) return;
    clearState();
    proofBase64 = null;
    if (timerInterval) clearInterval(timerInterval);
    renderBank();
}

function startCountdown() {
    if (timerInterval) clearInterval(timerInterval);
    let secs = 30 * 60;
    const savedEnd = parseInt(localStorage.getItem("cj_r_timer_end") || "0");
    if (savedEnd > 0) {
        secs = Math.max(0, Math.floor((savedEnd - Date.now()) / 1000));
    } else {
        localStorage.setItem("cj_r_timer_end", Date.now() + 30 * 60 * 1000);
    }
    timerInterval = setInterval(() => {
        secs--;
        if (secs <= 0) {
            clearInterval(timerInterval);
            const el = document.getElementById("countdown");
            if (el) el.textContent = "EXPIRED";
            localStorage.removeItem("cj_r_timer_end");
            return;
        }
        const el = document.getElementById("countdown");
        if (el) el.textContent = `${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`;
    }, 1000);
}

// ── SUBMIT BANK — Firebase write is instant, Telegram runs in background ──
async function submitBank() {
    if (!proofBase64) return toast("Please upload your payment receipt first");
    showLoader("Saving your request...");

    // Double-check for pending before submitting
    const pending = await hasPendingRecharge();
    if (pending) { hideLoader(); return toast("You already have a pending deposit — wait for it to settle"); }

    const txData = {
        uid,
        type: "recharge",
        method: "bank",
        amount: selectedAmountUSD,
        nairaEquivalent: selectedAmountUSD * 1500,
        status: "pending",
        date: Date.now(),
        referenceCode: REFERENCE_CODE
    };
    const txRef = db.ref("transactions").push();
    await txRef.set({ ...txData, proof: proofBase64 });
    await db.ref("userTransactions/" + uid + "/" + txRef.key).set(txData);

    // ── Done — show success immediately ──────────────────────
    hideLoader();
    toast("✅ Receipt submitted! Processing in 3–20 mins");
    clearState();
    localStorage.removeItem("cj_r_timer_end");
    if (timerInterval) clearInterval(timerInterval);

    // ── Fire Telegram notification in background (non-blocking) ──
    // If this fails due to network, admin can still approve from admin panel
    sendTelegramNotification(txRef.key, txData, proofBase64).catch(() => {});
    proofBase64 = null;

    setTimeout(() => renderBank(), 2000);
}

// ── Telegram helper — runs independently, never blocks the user ──
async function sendTelegramNotification(txKey, txData, proof) {
    const approveUrl = `${URL_APPROVE_RECHARGE}?txId=${txKey}&secret=${SECRET}`;
    const rejectUrl  = `${URL_REJECT_RECHARGE}?txId=${txKey}&secret=${SECRET}`;
    const minerId    = await getMinerId();

    const caption = `🏦 Bank Recharge Request\n──────────────────\n👤 User: ${txData.uid}\n🆔 Miner ID: ${minerId}\n💰 Amount: $${txData.amount}\n💵 Naira: ₦${(txData.amount * 1500).toLocaleString()}\n🔑 Ref: ${REFERENCE_CODE}\n📅 Time: ${new Date().toLocaleString()}\n🗝 Tx ID: ${txKey}`;

    const byteCharacters = atob(proof.split(",")[1]);
    const bytes = new Uint8Array([...byteCharacters].map(c => c.charCodeAt(0)));
    const blob  = new Blob([bytes], { type: "image/jpeg" });
    const form  = new FormData();
    form.append("chat_id", ADMIN_CHAT_ID);
    form.append("caption", caption);
    form.append("photo", blob, "receipt.jpg");
    form.append("reply_markup", JSON.stringify({ inline_keyboard: [[
        { text: "✅ Approve", url: approveUrl },
        { text: "❌ Reject",  url: rejectUrl  }
    ]]}));
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: form });
}

function selectNetwork(net) {
    selectedNetwork = net;
    currentStep = 2;
    saveState();
    document.querySelectorAll(".network-card").forEach(c => c.classList.remove("selected"));
    const el = document.getElementById("card-" + net);
    if (el) el.classList.add("selected");
    setTimeout(() => renderUSDT(), 200);
}

function goBackUSDT() {
    currentStep = 1; selectedNetwork = null;
    proofBase64 = null; saveState(); renderUSDT();
}

async function submitUSDT() {
    const amount = parseFloat(document.getElementById("usdAmountUSDT").value);
    const txHash = document.getElementById("txHash").value.trim();
    if (!amount || amount < 5) return toast("Minimum deposit is $5 USDT");
    if (!txHash)               return toast("Please paste your Transaction Hash");

    showLoader("Verifying your transaction on blockchain...");

    const dupSnap = await db.ref("usedTxHashes/" + sanitizeTxKey(txHash)).once("value");
    if (dupSnap.val()) { hideLoader(); return toast("This TX hash was already used"); }

    const txData = { uid, type:"recharge", method:selectedNetwork, amount, status:"pending", txHash, date:Date.now() };
    const txRef  = db.ref("transactions").push();
    await txRef.set({ ...txData, proof: proofBase64 || null });
    await db.ref("userTransactions/" + uid + "/" + txRef.key).set(txData);
    await db.ref("usedTxHashes/" + sanitizeTxKey(txHash)).set({ uid, txId: txRef.key, date: Date.now() });

    try {
        const resp   = await fetch(`${URL_VERIFY_USDT}?txId=${txRef.key}&secret=${SECRET}`);
        const result = await resp.text();
        hideLoader();
        if (result.includes("APPROVED")) {
            showVerified(amount);
        } else {
            toast("Transaction submitted — verifying on blockchain...");
            proofBase64 = null; clearState();
            setTimeout(() => renderUSDT(), 2500);
        }
    } catch(e) {
        hideLoader();
        toast("Submitted — verification in progress");
        proofBase64 = null; clearState();
        setTimeout(() => renderUSDT(), 2500);
    }
}

function showVerified(amount) {
    document.getElementById("content").innerHTML = `
    <div class="card" style="text-align:center;padding:36px 20px;">
        <div class="verified-box">
            <div class="v-icon">✅</div>
            <div class="v-text">Payment Verified!</div>
            <div class="v-sub">$${amount} USDT has been added to your balance</div>
        </div>
        <button onclick="clearState();currentStep=1;selectedNetwork=null;renderUSDT()" class="button" style="margin-top:18px;">Make Another Deposit</button>
    </div>`;
}

function sanitizeTxKey(hash) { return hash.replace(/[.#$/\[\]]/g,"_").substring(0,100); }

function handleFile(input, previewId) {
    const file = input.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
        proofBase64 = e.target.result;
        const img = document.getElementById(previewId);
        if (img) { img.src = e.target.result; img.style.display = "block"; }
    };
    r.readAsDataURL(file);
}

function copyText(text, label) {
    navigator.clipboard.writeText(text).then(() => toast(`✅ ${label} copied!`));
}

function showLoader(msg) {
    document.getElementById("loader-text").textContent = msg || "Processing...";
    document.getElementById("loader").style.display = "flex";
}
function hideLoader() { document.getElementById("loader").style.display = "none"; }

async function getMinerId() {
    return new Promise(resolve => {
        db.ref("users/" + uid).once("value", snap => resolve((snap.val()||{}).minerId||"N/A"));
    });
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3200);
}

window.onload = () => {
    if (currentTab === "usdt") {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById("tab-usdt").classList.add("active");
    }
    renderTab(currentTab);
};
