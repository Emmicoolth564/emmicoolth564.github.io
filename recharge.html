<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge • CryptoJet</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root { --green: #22c55e; --dark: #020617; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #020617; color: #e2e8f0; min-height: 100vh; }
    .header { padding: 20px 16px; display: flex; align-items: center; background: rgba(2,6,23,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(34,197,94,0.15); }
    .back { font-size:28px; color:#22c55e; cursor:pointer; }
    .header h3 { flex:1; text-align:center; font-size:20px; font-weight:600; }
    .tabs { display:flex; background:#0f172a; border-radius:9999px; padding:6px; margin:20px 16px 16px; }
    .tab { flex:1; padding:14px; text-align:center; font-weight:600; border-radius:9999px; cursor:pointer; color:#94a3b8; }
    .tab.active { background:#22c55e; color:#022c22; box-shadow:0 4px 15px rgba(34,197,94,0.4); }
    .content-wrapper { padding:0 16px 30px; }
    .card { background:#0f172a; border-radius:24px; padding:28px 24px; box-shadow:0 10px 30px rgba(0,0,0,0.4); margin-bottom:20px; }
    .timer { position:absolute; top:16px; right:16px; background:#ef4444; color:white; font-size:13px; font-weight:700; padding:6px 14px; border-radius:9999px; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.4; } }
    .copy-btn { background:#334155; color:white; border:none; padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; margin-left:8px; }
    input { width:100%; padding:16px 18px; margin-top:12px; background:#1e2937; border:2px solid transparent; border-radius:16px; color:white; font-size:16px; }
    input:focus { border-color:#22c55e; box-shadow:0 0 0 4px rgba(34,197,94,0.2); outline:none; }
    .upload-area { border:2px dashed #64748b; border-radius:16px; padding:40px 20px; text-align:center; cursor:pointer; margin:24px 0; }
    #preview { max-width:100%; max-height:240px; border-radius:16px; margin-top:16px; display:none; }
    .button { width:100%; padding:16px; margin-top:24px; background:#22c55e; color:#022c22; font-weight:700; font-size:17px; border:none; border-radius:16px; cursor:pointer; box-shadow:0 8px 25px rgba(34,197,94,0.3); }
    .ngn-rate { font-size:15px; color:#94a3b8; text-align:center; margin:12px 0; font-weight:500; }
    .loader { position: fixed; inset: 0; background: rgba(2,6,23,0.95); display: none; align-items: center; justify-content: center; z-index: 99999; flex-direction: column; color: #22c55e; font-size: 18px; gap: 20px; }
    .crypto-loader { width: 80px; height: 80px; border: 8px solid rgba(34,197,94,0.2); border-top: 8px solid #22c55e; border-radius: 50%; animation: spin 1.2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#22c55e; color:#022c22; padding:14px 28px; border-radius:9999px; font-weight:600; box-shadow:0 10px 30px rgba(34,197,94,0.4); opacity:0; transition:all 0.3s; z-index:100000; }
</style>
</head>
<body>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Recharge</h3>
</div>

<div class="tabs">
    <div class="tab active" id="tab-bank" onclick="switchTab('bank')">Bank Transfer</div>
    <div class="tab" id="tab-usdt" onclick="switchTab('usdt')">USDT</div>
</div>

<div id="content" class="content-wrapper"></div>

<div class="loader" id="loader">
    <div class="crypto-loader"></div>
    <div>Processing your request...</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "signin.html";

let proofBase64 = null;
let currentStep = 1;
let selectedAmountUSD = 0;
let timerInterval = null;

const BOT_TOKEN = "8688577357:AAHt9nAPIESkZiDZFDGRmyaJmzxogrpY3PY";
const ADMIN_CHAT_ID = 8632260150;

function switchTab(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    if (tab === "bank") document.getElementById("tab-bank").classList.add("active");
    else document.getElementById("tab-usdt").classList.add("active");
    currentStep = 1;
    renderTab(tab);
}

function renderTab(tab) {
    const content = document.getElementById("content");
    
    if (tab === "bank") {
        if (currentStep === 1) {
            content.innerHTML = `
            <div class="card">
                <h3 style="margin-bottom:24px;font-size:20px;font-weight:600;text-align:center;">Bank Deposit</h3>
                <input id="usdAmount" type="number" placeholder="Amount in USD" style="margin-bottom:12px;">
                <div id="ngnPreview" class="ngn-rate">You will pay: ₦0.00</div>
                <button onclick="confirmAmount('bank')" class="button">Continue</button>
            </div>`;
            
            const input = document.getElementById("usdAmount");
            const preview = document.getElementById("ngnPreview");
            input.addEventListener("input", () => {
                const usd = parseFloat(input.value) || 0;
                preview.textContent = `You will pay: ₦${(usd * 1500).toLocaleString('en-US')}`;
            });
        } else if (currentStep === 2) {
            content.innerHTML = `
            <div class="card">
                <h3 style="margin-bottom:20px;font-size:20px;font-weight:600;">Complete Bank Deposit</h3>
                
                <div class="bank-card" style="position:relative;background:#1e2937;border-radius:20px;padding:24px;margin-bottom:24px;">
                    <div class="timer" id="countdown">30:00.00</div>
                    <p><strong>Bank:</strong> Opay</p>
                    <p><strong>Account Name:</strong> Tomiwa Tosin Adeniyi</p>
                    <p style="display:flex;align-items:center;">
                        <strong>Account Number:</strong> 
                        <span id="accNumber">8115667110</span>
                        <button onclick="copyAccount()" class="copy-btn">Copy</button>
                    </p>
                    <div style="margin-top:16px;font-size:15px;color:#94a3b8;">
                        Amount to pay: <strong>₦${(selectedAmountUSD * 1500).toLocaleString('en-US')}</strong>
                    </div>
                </div>

                <div class="upload-area" onclick="document.getElementById('proofFile').click()">
                    📸 Tap to upload payment receipt
                    <input type="file" id="proofFile" accept="image/*" style="display:none" onchange="handleFile(this)">
                    <img id="preview" alt="Receipt preview">
                </div>
                
                <button onclick="submitRecharge('bank')" class="button">I Have Paid • Submit Proof</button>
            </div>`;
            startCountdown();
        }
    } else {
        content.innerHTML = `
        <div class="card">
            <h3 style="margin-bottom:20px;font-size:20px;font-weight:600;">USDT Deposit</h3>
            <div style="background:#1e2937;border-radius:20px;padding:20px;margin-bottom:20px;">
                <p><strong>Network:</strong> TRC20</p>
                <p><strong>Address:</strong> TXY72hshsjsjsjsjsjss</p>
            </div>
            
            <input id="usdAmountUSDT" type="number" placeholder="Amount in USD">
            
            <div class="upload-area" onclick="document.getElementById('proofFileUSDT').click()">
                📸 Tap to upload transaction screenshot
                <input type="file" id="proofFileUSDT" accept="image/*" style="display:none" onchange="handleFile(this)">
                <img id="previewUSDT" alt="Receipt preview">
            </div>
            
            <button onclick="submitRecharge('usdt')" class="button">I Have Paid • Submit Proof</button>
        </div>`;
    }
}

function confirmAmount(tab) {
    const amountInput = document.getElementById("usdAmount");
    const amount = parseFloat(amountInput.value);
    if (!amount || amount <= 0) return toast("Please enter a valid amount");
    selectedAmountUSD = amount;
    currentStep = 2;
    renderTab("bank");
}

function startCountdown() {
    if (timerInterval) clearInterval(timerInterval);
    let timeLeft = 30 * 60 * 1000;
    timerInterval = setInterval(() => {
        timeLeft -= 10;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            document.getElementById("countdown").innerHTML = "EXPIRED";
            return;
        }
        const min = Math.floor(timeLeft / 60000);
        const sec = Math.floor((timeLeft % 60000) / 1000);
        const ms = Math.floor((timeLeft % 1000) / 10);
        document.getElementById("countdown").innerHTML = `${min}:${sec.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
    }, 10);
}

function copyAccount() {
    const num = document.getElementById("accNumber").innerText;
    navigator.clipboard.writeText(num).then(() => toast("✅ Account number copied!"));
}

function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        proofBase64 = e.target.result;
        const previewId = input.id.includes("USDT") ? "previewUSDT" : "preview";
        document.getElementById(previewId).src = proofBase64;
        document.getElementById(previewId).style.display = "block";
    };
    reader.readAsDataURL(file);
}

async function getMinerId() {
    return new Promise(resolve => {
        db.ref("users/" + uid).once("value", snap => {
            const data = snap.val() || {};
            resolve(data.minerId || "No Miner ID");
        });
    });
}

async function sendToTelegramBot(method, amount, photoBase64, txKey) {
    const minerId = await getMinerId();
    const formData = new FormData();
    formData.append("chat_id", ADMIN_CHAT_ID);
    formData.append("caption", `🔥 New Recharge Request\nUser ID: ${uid}\nMiner ID: ${minerId}\nAmount: $${amount} (${method})\nTime: ${new Date().toLocaleString()}`);

    // Convert base64 to blob for photo
    const byteCharacters = atob(photoBase64.split(',')[1]);
    const byteNumbers = new Array(byteCharacters.length);
    for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
    const byteArray = new Uint8Array(byteNumbers);
    const blob = new Blob([byteArray], { type: 'image/jpeg' });
formData.append("reply_markup", JSON.stringify({ inline_keyboard: [[{ text: "✅ Approve", callback_data: `approve_recharge_${txKey}` }, { text: "❌ Reject", callback_data: `reject_recharge_${txKey}` }]] }));
    formData.append("photo", blob, "receipt.jpg");

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: "POST",
        body: formData
    });
}

function submitRecharge(method) {
    const loader = document.getElementById("loader");
    loader.style.display = "flex";

    setTimeout(async () => {
        let amount = 0;
        if (method === "bank") amount = selectedAmountUSD;
        else amount = parseFloat(document.getElementById("usdAmountUSDT").value) || 0;

        if (!amount || amount <= 0) {
            loader.style.display = "none";
            return toast("Enter a valid amount");
        }

        // Save to Firebase (your original logic)
        const txRef = db.ref("transactions").push();
        txRef.set({
            uid: uid,
            type: "recharge",
            method: method,
            amount: amount,
            nairaEquivalent: method === "bank" ? amount * 1500 : null,
            proof: proofBase64 || null,
            status: "pending",
            date: Date.now()
        });

        // Automatically send receipt + details to your Telegram bot
        if (proofBase64) await sendToTelegramBot(method, amount, proofBase64, txRef.key);
        loader.style.display = "none";
        toast("Receipt sent to Financial Department • Awaiting admin approval");

        proofBase64 = null;
        currentStep = 1;
        setTimeout(() => renderTab(method), 1800);
    }, 5000);
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3000);
}

window.onload = () => renderTab("bank");
</script>
</body>
</html>
