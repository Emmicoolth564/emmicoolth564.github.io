function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + tab).classList.add("active");
    currentStep = 1; proofBase64 = null; selectedNetwork = null;

}

function renderTab(tab) {

}

// ════════════════════════════════════════════════════════════════
function renderBank() {
    const c = document.getElementById("content");
    if (currentStep === 1) {
        c.innerHTML = `
        <div class="card">
            <h3 style="font-size:19px;font-weight:700;margin-bottom:6px;">Bank Deposit</h3>

            <div id="ngnPreview" class="ngn-rate">You will pay: ₦0.00</div>
            <button onclick="confirmBankAmount()" class="button">Continue →</button>
        </div>`;
        document.getElementById("usdAmount").addEventListener("input", e => {
            const usd = parseFloat(e.target.value) || 0;

        const ngn = (selectedAmountUSD * 1500).toLocaleString("en-US");

        <div class="instructions-box">

                <li><span class="num">1</span>Always add your reference code <strong style="color:#f59e0b">${REFERENCE_CODE}</strong> as the transfer description/narration</li>

            </div>
            <div class="bank-row">
                <div class="bank-row-label">Account Number</div>

                    <button class="copy-btn" onclick="copyText('8115667110','Account number')">Copy</button>

            <div class="bank-row">
                <div class="bank-row-label">Reference Code</div>

                    <button class="copy-btn" onclick="copyText('${REFERENCE_CODE}','Reference code')" style="border-color:rgba(245,158,11,0.3);color:#f59e0b;background:rgba(245,158,11,0.08)">Copy</button>

            </div>
        </div>

        <div class="card" style="padding:20px;">
            <div style="font-size:15px;font-weight:600;margin-bottom:4px;">Upload Receipt</div>

            <div class="upload-area" onclick="document.getElementById('proofFile').click()">

function confirmBankAmount() {
    const amount = parseFloat(document.getElementById("usdAmount").value);
    if (!amount || amount <= 0) return toast("Please enter a valid amount");
    selectedAmountUSD = amount;
    currentStep = 2;
    renderBank();
}

function startCountdown() {
    if (timerInterval) clearInterval(timerInterval);
    let secs = 30 * 60;
    timerInterval = setInterval(() => {
        secs--;
        if (secs <= 0) { clearInterval(timerInterval); const el = document.getElementById("countdown"); if(el) el.textContent = "EXPIRED"; return; }
        const m = Math.floor(secs/60), s = secs % 60;
        const el = document.getElementById("countdown");
        if (el) el.textContent = `${m}:${String(s).padStart(2,"0")}`;
    }, 1000);
}

async function submitBank() {
    if (!proofBase64) return toast("Please upload your payment receipt first");
    showLoader("Submitting your request...");

    const txData = { uid, type:"recharge", method:"bank", amount:selectedAmountUSD, nairaEquivalent:selectedAmountUSD*1500, status:"pending", date:Date.now(), referenceCode:REFERENCE_CODE };
    const txRef  = db.ref("transactions").push();
    await txRef.set({ ...txData, proof: proofBase64 });
    await db.ref("userTransactions/" + uid + "/" + txRef.key).set(txData);

    const approveUrl = `${URL_APPROVE_RECHARGE}?txId=${txRef.key}&secret=${SECRET}`;
    const rejectUrl  = `${URL_REJECT_RECHARGE}?txId=${txRef.key}&secret=${SECRET}`;
    const minerId    = await getMinerId();

    const caption =
`🏦 Bank Recharge Request
──────────────────
👤 User: ${uid}
🆔 Miner ID: ${minerId}
💰 Amount: $${selectedAmountUSD}
💵 Naira: ₦${(selectedAmountUSD*1500).toLocaleString()}
🔑 Ref: ${REFERENCE_CODE}
📅 Time: ${new Date().toLocaleString()}
🗝 Tx ID: ${txRef.key}`;

    const byteCharacters = atob(proofBase64.split(",")[1]);
    const bytes = new Uint8Array([...byteCharacters].map(c => c.charCodeAt(0)));
    const blob  = new Blob([bytes], { type:"image/jpeg" });
    const form  = new FormData();
    form.append("chat_id", ADMIN_CHAT_ID);
    form.append("caption", caption);
    form.append("photo", blob, "receipt.jpg");
    form.append("reply_markup", JSON.stringify({ inline_keyboard:[[
        { text:"✅ Approve", url:approveUrl },
        { text:"❌ Reject",  url:rejectUrl  }
    ]]}));
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method:"POST", body:form });

    hideLoader();
    toast("✅ Receipt submitted! Processing in 3–20 mins");
    proofBase64 = null; currentStep = 1;
    setTimeout(() => renderBank(), 2000);
}

                <input type="file" id="proofUSDT" accept="image/*" style="display:none" onchange="handleFile(this,'usdtPreview')">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Tap to upload transaction screenshot</div>
            </div>
            <img id="usdtPreview" class="preview-img" alt="Receipt">

            <button onclick="submitUSDT()" class="button">Verify & Submit</button>
            <button onclick="goBackUSDT()" style="width:100%;padding:13px;margin-top:8px;background:transparent;color:#64748b;border:1px solid #1e2937;border-radius:14px;cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;">← Change Network</button>
        </div>`;
    }
}

function selectNetwork(net) {
    selectedNetwork = net;
    document.querySelectorAll(".network-card").forEach(c => c.classList.remove("selected"));
    document.getElementById("card-" + net).classList.add("selected");
    setTimeout(() => { currentStep = 2; renderUSDT(); }, 300);
}

function goBackUSDT() {
    currentStep = 1; selectedNetwork = null; proofBase64 = null;
    renderUSDT();
}

async function submitUSDT() {
    const amount = parseFloat(document.getElementById("usdAmountUSDT").value);
    const txHash = document.getElementById("txHash").value.trim();

    if (!amount || amount < 5) return toast("Minimum deposit is $5 USDT");
    if (!txHash)               return toast("Please paste your Transaction Hash");

    showLoader("Verifying your transaction on blockchain...");

    const dupSnap = await db.ref("usedTxHashes/" + sanitizeTxKey(txHash)).once("value");
    if (dupSnap.val()) { hideLoader(); return toast("This TX hash was already used"); }

    const txData = { uid, type:"recharge", method:selectedNetwork, amount, status:"pending", txHash, date:Date.now() };
    const txRef  = db.ref("transactions").push();
    await txRef.set({ ...txData, proof: proofBase64 || null });
    await db.ref("userTransactions/" + uid + "/" + txRef.key).set(txData);
    await db.ref("usedTxHashes/" + sanitizeTxKey(txHash)).set({ uid, txId: txRef.key, date: Date.now() });

    try {
        const verifyUrl = `${URL_VERIFY_USDT}?txId=${txRef.key}&secret=${SECRET}`;
        const resp      = await fetch(verifyUrl);
        const result    = await resp.text();
        hideLoader();
        if (result.includes("APPROVED")) {
            showVerified(amount);
        } else {
            toast("Transaction submitted — verifying on blockchain...");
            proofBase64 = null; currentStep = 1; selectedNetwork = null;
            setTimeout(() => renderUSDT(), 2500);
        }
    } catch(e) {
        hideLoader();
        toast("Submitted — verification in progress");
        currentStep = 1; selectedNetwork = null;
        setTimeout(() => renderUSDT(), 2500);
    }
}

function showVerified(amount) {
    document.getElementById("content").innerHTML = `
    <div class="card" style="text-align:center;padding:40px 24px;">
        <div class="verified-box">
            <div class="v-icon">✅</div>
            <div class="v-text">Payment Verified!</div>
            <div class="v-sub">$${amount} USDT has been added to your balance</div>
        </div>
        <button onclick="currentStep=1;selectedNetwork=null;renderUSDT()" class="button" style="margin-top:20px;">Make Another Deposit</button>
    </div>`;
}

function sanitizeTxKey(hash) {
    return hash.replace(/[.#$/\[\]]/g,"_").substring(0,100);
}

function handleFile(input, previewId) {
    const file = input.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
        proofBase64 = e.target.result;
        const img = document.getElementById(previewId);
        if (img) { img.src = e.target.result; img.style.display = "block"; }
    };
    r.readAsDataURL(file);
}

function copyText(text, label) {
    navigator.clipboard.writeText(text).then(() => toast(`✅ ${label} copied!`));
}

function showLoader(msg) {
    document.getElementById("loader-text").textContent = msg || "Processing...";
    document.getElementById("loader").style.display = "flex";
}
function hideLoader() {
    document.getElementById("loader").style.display = "none";
}

async function getMinerId() {
    return new Promise(resolve => {
        db.ref("users/" + uid).once("value", snap => resolve((snap.val()||{}).minerId||"N/A"));
    });
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3000);
}

window.onload = () => renderTab("bank");
</script>
</body>
</html>
