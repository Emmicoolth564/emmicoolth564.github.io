<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings • CryptoJet</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

:root {
    --neon: #00f0ff;
    --accent: #00ffcc;
    --dark-bg: #020617;
    --card-bg: #0f172a;
    --border-color: rgba(0,240,255,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #020617 0%, #0a1428 50%, #020617 100%);
    color: #e2e8f0;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 28px 20px;
    background: rgba(15,23,42,0.98);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(0,240,255,0.2);
    box-shadow: 0 8px 32px rgba(0,240,255,0.1);
}

.back {
    font-size: 32px;
    color: var(--neon);
    cursor: pointer;
    padding: 8px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
}

.back:hover {
    transform: translateX(-4px);
    text-shadow: 0 0 20px rgba(0,240,255,0.6);
}

.title {
    flex: 1;
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 30px rgba(0,240,255,0.4);
    letter-spacing: 1px;
}

.container {
    padding: 28px 18px 120px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
}

/* GLASS CARD */
.card {
    background: linear-gradient(135deg, rgba(15,23,42,0.85) 0%, rgba(20,30,48,0.85) 100%);
    border-radius: 28px;
    padding: 28px;
    margin-bottom: 24px;
    border: 1px solid var(--border-color);
    box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 40px rgba(0,240,255,0.1);
    backdrop-filter: blur(20px);
    transition: all 0.4s;
}

.card:hover {
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 50px rgba(0,240,255,0.15);
    border-color: rgba(0,240,255,0.3);
}

/* PROFILE */
.profile {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(0,240,255,0.15);
}

.profile-avatar {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #00f0ff, #00ffcc);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 16px;
    box-shadow: 0 0 30px rgba(0,240,255,0.3);
}

.miner-id {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #00ffcc;
    letter-spacing: 3px;
    margin: 12px 0 4px;
    text-shadow: 0 0 20px rgba(0,255,204,0.4);
}

.status-badge {
    display: inline-block;
    background: rgba(34,197,94,0.2);
    color: #22c55e;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 16px;
}

.name-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 18px 0;
}

#nameDisplay {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, #00f0ff, #00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.edit-btn {
    background: rgba(0,240,255,0.15);
    border: 1px solid var(--neon);
    color: var(--neon);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.edit-btn:hover {
    background: rgba(0,240,255,0.25);
    box-shadow: 0 0 15px rgba(0,240,255,0.3);
}

/* FORM */
.input-group {
    margin-bottom: 22px;
}

label {
    display: block;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

input {
    width: 100%;
    padding: 16px 18px;
    background: rgba(2,6,23,0.6);
    border: 1.5px solid rgba(0,240,255,0.25);
    border-radius: 16px;
    color: white;
    font-size: 16px;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
}

input:focus {
    outline: none;
    border-color: var(--neon);
    box-shadow: 0 0 0 3px rgba(0,240,255,0.2);
    background: rgba(2,6,23,0.8);
}

input::placeholder {
    color: #475569;
}

/* SECTION TITLE */
.section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--neon);
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* INFO ROWS */
.info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid rgba(0,240,255,0.08);
}

.info-row:last-child {
    border-bottom: none;
}

.info-label {
    color: #94a3b8;
    font-size: 14px;
    font-weight: 500;
}

.info-value {
    font-weight: 700;
    font-size: 15px;
}

.info-value.accent {
    color: #00ffcc;
}

.info-value.success {
    color: #22c55e;
}

.info-value.info {
    color: #38bdf8;
}

.info-value.warning {
    color: #f59e0b;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    margin-top: 14px;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.5px;
}

.btn-primary {
    background: linear-gradient(90deg, #00f0ff, #00ffcc);
    color: #000;
    box-shadow: 0 8px 25px rgba(0,240,255,0.3);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(0,240,255,0.4);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-danger {
    background: linear-gradient(90deg, #dc2626, #ef4444);
    color: white;
    box-shadow: 0 8px 25px rgba(239,68,68,0.2);
}

.btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(239,68,68,0.3);
}

.btn-danger:active {
    transform: translateY(0);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #22c55e;
    color: #022c22;
    padding: 16px 32px;
    border-radius: 20px;
    font-weight: 700;
    box-shadow: 0 12px 40px rgba(34,197,94,0.4);
    z-index: 10000;
    opacity: 0;
    transition: all 0.4s;
    font-size: 15px;
}

/* DANGER ZONE */
.danger-zone {
    border: 1.5px solid rgba(239,68,68,0.4);
    background: linear-gradient(135deg, rgba(30,22,22,0.8) 0%, rgba(35,25,25,0.8) 100%);
    border-radius: 24px;
    padding: 28px;
    margin-top: 24px;
}

.danger-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #ef4444;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.danger-desc {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid rgba(239,68,68,0.2);
}
</style>
</head>
<body>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <div class="title">Account Settings</div>
</div>

<div class="container">

    <!-- PROFILE CARD -->
    <div class="card">
        <div class="profile">
            <div class="profile-avatar">👤</div>
            <div class="miner-id" id="minerIdDisplay">CJ-XXXX</div>
            <div class="status-badge">Active Account</div>
            
            <div class="name-row">
                <span id="nameDisplay">Loading...</span>
                <button class="edit-btn" onclick="toggleNameEdit()">✏️ Edit</button>
            </div>
        </div>

        <!-- Edit Name -->
        <div id="nameEditSection" style="display:none;margin-top:20px;">
            <div class="input-group">
                <label>New Display Name</label>
                <input type="text" id="newNameInput" placeholder="Enter new name">
            </div>
            <button class="btn btn-primary" onclick="saveName()">Save Name</button>
        </div>
    </div>

    <!-- ACCOUNT INFO -->
    <div class="card">
        <div class="section-title">📊 Account Overview</div>
        
        <div class="info-row">
            <span class="info-label">Current Balance</span>
            <span id="balanceDisplay" class="info-value accent">$0.00</span>
        </div>
        <div class="info-row">
            <span class="info-label">Team Income</span>
            <span id="teamIncomeDisplay" class="info-value success">$0.00</span>
        </div>
        <div class="info-row">
            <span class="info-label">Points</span>
            <span id="pointsDisplay" class="info-value warning">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Miner Level</span>
            <span id="levelDisplay" class="info-value info">Novice Miner</span>
        </div>
    </div>

    <!-- CHANGE PASSWORD -->
    <div class="card">
        <div class="section-title">🔐 Change Password</div>
        
        <div class="input-group">
            <label>Old Password</label>
            <input type="password" id="oldPassword" placeholder="Enter current password">
        </div>
        
        <div class="input-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        
        <div class="input-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>

        <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
    </div>

    <!-- SECURITY OPTIONS -->
    <div class="card danger-zone">
        <div class="danger-title">⚠️ Security Options</div>
        
        <button class="btn btn-danger" onclick="resetPasswordOnly()">
            🔑 Reset Password via Email
        </button>
        
        <button class="btn btn-danger" onclick="confirmLogout()">
            🚪 Logout from This Device
        </button>
        
        <div class="danger-desc">
            These actions will require confirmation. For password reset, check your email inbox for a secure link.
        </div>
    </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cryptojetmining.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let uid = localStorage.getItem("uid");
if (!uid) {
    alert("Session expired");
    window.location.href = "signin.html";
}

// Load user data
async function loadUserData() {
    const snap = await db.ref("users/" + uid).once("value");
    const data = snap.val() || {};

    document.getElementById("minerIdDisplay").textContent = data.minerId || "CJ-" + Math.floor(1000 + Math.random()*9000);
    document.getElementById("nameDisplay").textContent = data.name || "CryptoJet User";
    document.getElementById("balanceDisplay").textContent = "$" + Math.floor(data.balance || 0);
    document.getElementById("teamIncomeDisplay").textContent = "$" + Math.floor(data.team || 0);
    document.getElementById("pointsDisplay").textContent = data.points || 0;
    document.getElementById("levelDisplay").textContent = data.level || "Novice Miner";
}
loadUserData();

// Toggle name edit
function toggleNameEdit() {
    const section = document.getElementById("nameEditSection");
    section.style.display = section.style.display === "none" ? "block" : "none";
}

// Save name
async function saveName() {
    const newName = document.getElementById("newNameInput").value.trim();
    if (!newName) return alert("Please enter a name");

    await db.ref("users/" + uid).update({ name: newName });
    document.getElementById("nameDisplay").textContent = newName;
    document.getElementById("nameEditSection").style.display = "none";
    document.getElementById("newNameInput").value = "";
    showToast("Name updated successfully", "#22c55e");
}

// Change password with old password verification
async function changePassword() {
    const oldPass = document.getElementById("oldPassword").value;
    const newPass = document.getElementById("newPassword").value;
    const confirmPass = document.getElementById("confirmPassword").value;

    if (!oldPass || !newPass || !confirmPass) return showToast("All fields are required", "#ef4444");
    if (newPass !== confirmPass) return showToast("New passwords do not match", "#ef4444");
    if (newPass.length < 6) return showToast("Password must be at least 6 characters", "#ef4444");

    const user = auth.currentUser;
    if (!user) return showToast("Please sign in again", "#ef4444");

    try {
        // Re-authenticate with old password
        const credential = firebase.auth.EmailAuthProvider.credential(user.email, oldPass);
        await user.reauthenticateWithCredential(credential);

        // Update password
        await user.updatePassword(newPass);
        
        // Clear fields
        document.getElementById("oldPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";

        showToast("Password changed successfully!", "#22c55e");
    } catch (err) {
        showToast("Old password is incorrect or error occurred", "#ef4444");
    }
}

// Reset functions
function resetPasswordOnly() {
    if (confirm("This will send a password reset link to your email.\nContinue?")) {
        const user = auth.currentUser;
        if (user && user.email) {
            auth.sendPasswordResetEmail(user.email)
                .then(() => showToast("Password reset link sent to your email", "#22c55e"))
                .catch(() => showToast("Error sending reset link", "#ef4444"));
        }
    }
}

function confirmLogout() {
    if (confirm("Logout from this device?")) {
        localStorage.removeItem("uid");
        window.location.href = "signin.html";
    }
}

// Toast
function showToast(msg, color) {
    const toast = document.getElementById("toast");
    toast.style.background = color;
    toast.textContent = msg;
    toast.style.opacity = "1";
    setTimeout(() => toast.style.opacity = "0", 2800);
}

// Back button already works with history.back()
</script>
</body>
</html>
