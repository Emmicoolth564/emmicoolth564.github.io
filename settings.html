

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings • CryptoJet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --neon:#00f0ff; --green:#00ffcc; --bg:#020617;
  --s1:#0c1628; --s2:#111f35; --border:rgba(0,240,255,0.15);
  --text:#e2e8f0; --muted:#64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { max-width:100vw; overflow-x:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header {
  padding:16px 18px; background:rgba(2,6,23,0.97);
  backdrop-filter:blur(16px); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:100;
}
.back { font-size:24px; color:var(--green); cursor:pointer; }
.header-title { font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700; color:var(--neon); flex:1; text-align:center; }
.spacer { width:24px; }

.container { padding:16px 16px 60px; max-width:480px; margin:0 auto; }

/* PROFILE CARD */
.profile-card {
  background:var(--s1); border:1px solid var(--border);
  border-radius:20px; padding:24px 20px; margin-bottom:14px;
  text-align:center;
}
.profile-avatar {
  width:72px; height:72px;
  background:linear-gradient(135deg,#00f0ff,#00ffcc);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:32px; margin:0 auto 14px;
  box-shadow:0 0 24px rgba(0,240,255,0.3);
}
.miner-id {
  font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700;
  color:var(--green); letter-spacing:2px; margin-bottom:6px;
}
.status-badge {
  display:inline-block; background:rgba(34,197,94,0.15);
  color:#22c55e; padding:5px 14px; border-radius:999px;
  font-size:12px; font-weight:600; letter-spacing:0.06em; margin-bottom:14px;
}
.name-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:4px; }
.name-display { font-size:20px; font-weight:700; color:var(--green); }
.edit-btn {
  background:rgba(0,240,255,0.1); border:1px solid rgba(0,240,255,0.25);
  color:var(--neon); padding:6px 14px; border-radius:999px;
  font-size:12px; cursor:pointer; font-weight:600; font-family:'DM Sans',sans-serif;
}

.edit-section { margin-top:16px; display:none; }

/* STAT CARDS */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stat-box { background:var(--s1); border:1px solid var(--border); border-radius:16px; padding:16px; text-align:center; }
.stat-val { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; color:var(--neon); }
.stat-lbl { font-size:11px; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:0.06em; }

/* SECTION CARD */
.section-card { background:var(--s1); border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:14px; }
.section-title { font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; color:var(--neon); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px; }

/* INPUTS */
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:5px; }
.field input {
  width:100%; padding:12px 14px; border-radius:12px;
  border:1.5px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04); color:var(--text);
  font-size:14px; font-family:'DM Sans',sans-serif; transition:all 0.2s;
  -webkit-appearance:none;
}
.field input:focus { border-color:var(--green); outline:none; box-shadow:0 0 0 3px rgba(0,255,204,0.1); }

/* BUTTONS */
.btn {
  width:100%; padding:14px; border-radius:13px; border:none;
  font-family:'DM Sans',sans-serif; font-weight:700; font-size:14px;
  cursor:pointer; transition:all 0.2s; margin-top:10px;
}
.btn-primary { background:linear-gradient(90deg,#00ffcc,#00bfff); color:#000; box-shadow:0 6px 18px rgba(0,255,204,0.2); }
.btn-primary:active { transform:scale(0.98); }
.btn-danger  { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.25); }
.btn-danger:active { transform:scale(0.98); }

/* DANGER ZONE */
.danger-card {
  background:rgba(239,68,68,0.04); border:1px solid rgba(239,68,68,0.2);
  border-radius:20px; padding:20px; margin-bottom:14px;
}
.danger-title { font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; color:#f87171; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:14px; }

/* TOAST */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  padding:12px 22px; border-radius:999px; font-weight:700; font-size:13px;
  opacity:0; transition:opacity 0.3s; z-index:9999; pointer-events:none;
  max-width:90vw; text-align:center;
}
.toast.success { background:#00ffcc; color:#022c22; }
.toast.error   { background:#ef4444; color:white; }
</style>
</head>
<body>

<div class="header">
  <div class="back" onclick="history.back()">←</div>
  <div class="header-title">Account Settings</div>
  <div class="spacer"></div>
</div>

<div class="container">

  <!-- PROFILE -->
  <div class="profile-card">
    <div class="profile-avatar">👤</div>
    <div class="miner-id" id="minerIdDisplay">CJ-XXXX</div>
    <div class="status-badge">Active Account</div>
    <div class="name-row">
      <span class="name-display" id="nameDisplay">Loading...</span>
      <button class="edit-btn" onclick="toggleNameEdit()">✏️ Edit</button>
    </div>
    <div class="edit-section" id="editSection">
      <div class="field" style="margin-top:12px;">
        <label>New Display Name</label>
        <input type="text" id="newNameInput" placeholder="Enter new name">
      </div>
      <button class="btn btn-primary" style="margin-top:8px;" onclick="saveName()">Save Name</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-val" id="balanceDisplay">$0</div>
      <div class="stat-lbl">Balance</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="teamDisplay">$0</div>
      <div class="stat-lbl">Team Income</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="pointsDisplay">0</div>
      <div class="stat-lbl">Points</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="levelDisplay" style="font-size:13px;padding-top:4px;">Novice</div>
      <div class="stat-lbl">Level</div>
    </div>
  </div>

  <!-- CHANGE PASSWORD -->
  <div class="section-card">
    <div class="section-title">🔐 Change Password</div>
    <div class="field">
      <label>Current Password</label>
      <input type="password" id="oldPassword" placeholder="Enter current password">
    </div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Min 6 characters">
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat new password">
    </div>
    <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
  </div>

  <!-- DANGER ZONE -->
  <div class="danger-card">
    <div class="danger-title">⚠️ Account Actions</div>
    <button class="btn btn-danger" onclick="confirmLogout()">🚪 Logout from This Device</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey:      "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain:  "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:   "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

const uid = localStorage.getItem("uid");
if (!uid) { window.location.href = "signin.html"; }

// Load user data
db.ref("users/" + uid).on("value", snap => {
  const d = snap.val() || {};
  document.getElementById("minerIdDisplay").textContent = d.minerId || "CJ-XXXX";
  document.getElementById("nameDisplay").textContent    = d.name    || "CryptoJet User";
  document.getElementById("balanceDisplay").textContent = "$" + Math.floor(d.balance || 0);
  document.getElementById("teamDisplay").textContent    = "$" + Math.floor(d.team    || 0);
  document.getElementById("pointsDisplay").textContent = d.points  || 0;
  document.getElementById("levelDisplay").textContent  = d.level   || "Novice Miner";
});

function toggleNameEdit() {
  const s = document.getElementById("editSection");
  s.style.display = s.style.display === "none" || s.style.display === "" ? "block" : "none";
}

async function saveName() {
  const newName = document.getElementById("newNameInput").value.trim();
  if (!newName) return showToast("Please enter a name", "error");
  await db.ref("users/" + uid).update({ name: newName });
  document.getElementById("editSection").style.display = "none";
  document.getElementById("newNameInput").value = "";
  showToast("Name updated! ✅", "success");
}

async function changePassword() {
  const oldPass  = document.getElementById("oldPassword").value;
  const newPass  = document.getElementById("newPassword").value;
  const confPass = document.getElementById("confirmPassword").value;
  if (!oldPass || !newPass || !confPass) return showToast("All fields are required", "error");
  if (newPass !== confPass)              return showToast("New passwords do not match", "error");
  if (newPass.length < 6)               return showToast("Password must be at least 6 characters", "error");

  const user = auth.currentUser;
  if (!user) return showToast("Please sign in again", "error");

  try {
    const credential = firebase.auth.EmailAuthProvider.credential(user.email, oldPass);
    await user.reauthenticateWithCredential(credential);
    await user.updatePassword(newPass);
    document.getElementById("oldPassword").value    = "";
    document.getElementById("newPassword").value    = "";
    document.getElementById("confirmPassword").value = "";
    showToast("Password updated! ✅", "success");
  } catch (err) {
    showToast("Current password is incorrect", "error");
  }
}

function confirmLogout() {
  if (confirm("Log out from this device?")) {
    localStorage.removeItem("uid");
    window.location.href = "signin.html";
  }
}

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast " + type; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2800);
}
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = "signin.html"; return; }
});
</script>
</body>
</html>
