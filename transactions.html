<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction History • CryptoJet</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

:root {
    --neon: #00f0ff;
    --accent: #00ffcc;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: #020617;
    color: #e2e8f0;
    min-height: 100vh;
    overflow-x: hidden;
}

.header {
    padding: 20px 16px;
    display: flex;
    align-items: center;
    background: rgba(2,6,23,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(34,197,94,0.15);
}
.back { font-size:28px; color:#22c55e; cursor:pointer; }
.header h3 { flex:1; text-align:center; font-size:20px; font-weight:600; }

.content-wrapper { padding:0 16px 100px; }

/* LOADER */
.loader {
    position: fixed;
    inset: 0;
    background: #020617;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    color: var(--neon);
    opacity: 1;
    transition: opacity 0.4s;
}

.loader.hidden { opacity: 0; pointer-events: none; }

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(0,240,255,0.15);
    border-top: 4px solid var(--neon);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* TABS */
.tabs {
    display: flex;
    gap: 8px;
    margin: 16px 0 20px;
    background: #0f172a;
    border-radius: 16px;
    padding: 8px;
}

.tab {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    border-radius: 12px;
    color: #94a3b8;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
}

.tab.active {
    background: linear-gradient(90deg, var(--neon), var(--accent));
    color: #000;
    box-shadow: 0 4px 15px rgba(0,240,255,0.3);
}

/* TRANSACTION CARD */
.tx-card {
    background: linear-gradient(135deg, #0f172a, #1e2937);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid rgba(0,240,255,0.15);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.tx-left { flex: 1; }
.tx-type { 
    font-family: 'Space Grotesk';
    font-size: 16px; 
    font-weight: 700; 
    color: var(--accent);
    margin-bottom: 6px;
}

.tx-date {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 8px;
}

.tx-meta {
    font-size: 12px;
    color: #64748b;
}

.tx-right {
    text-align: right;
}

.tx-amount {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
}

.tx-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.badge-approved {
    background: rgba(34,197,94,0.2);
    color: var(--success);
}

.badge-pending {
    background: rgba(245,158,11,0.2);
    color: var(--warning);
    animation: pulse 2s infinite;
}

.badge-rejected {
    background: rgba(239,68,68,0.2);
    color: var(--danger);
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

.empty {
    text-align: center;
    padding: 100px 20px;
    color: #64748b;
    font-size: 16px;
}

.status-positive { color: var(--success); }
.status-negative { color: var(--danger); }
.status-pending { color: var(--warning); }
</style>
</head>
<body>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <div style="margin-top:24px;font-size:15px;font-weight:600;">Loading transactions...</div>
</div>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Transaction History</h3>
</div>

<div class="content-wrapper">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">All</button>
        <button class="tab" onclick="switchTab('pending')">⏳ Pending</button>
        <button class="tab" onclick="switchTab('approved')">✅ Completed</button>
        <button class="tab" onclick="switchTab('rejected')">❌ Rejected</button>
    </div>

    <div id="tx-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
  authDomain: "cj-miner.firebaseapp.com",
  databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "cj-miner"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = localStorage.getItem("uid");
if (!uid) {
    alert("Please sign in first");
    window.location.href = "signin.html";
}

let currentTab = "all";
let allTransactions = [];
let cachedTransactions = null;
let lastLoadTime = 0;
const CACHE_DURATION = 30000; // Cache for 30 seconds

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
    renderTransactions();
}

async function loadTransactions() {
    const now = Date.now();
    
    // Use cache if available and fresh
    if (cachedTransactions && (now - lastLoadTime) < CACHE_DURATION) {
        allTransactions = cachedTransactions;
        renderTransactions();
        return;
    }
    
    document.getElementById("loader").classList.remove("hidden");

    try {
        // Get only transactions for the current user
        const snap = await db.ref("transactions").orderByChild("uid").equalTo(uid).once("value");
        const txns = snap.val() || {};

        allTransactions = [];
        Object.entries(txns).forEach(([key, tx]) => {
            // Only show transactions for current user
            if (tx.uid !== uid) return;
            
            // Skip recharge receipts
            if (tx.type === "recharge" && tx.status === "approved") return;

            allTransactions.push({
                id: key,
                ...tx,
                timestamp: tx.date || tx.processedAt || Date.now()
            });
        });

        // Sort by timestamp descending
        allTransactions.sort((a, b) => b.timestamp - a.timestamp);
        
        // Cache the results
        cachedTransactions = allTransactions;
        lastLoadTime = now;

        renderTransactions();
    } catch (err) {
        console.error("Error loading transactions:", err);
        document.getElementById("tx-list").innerHTML = `<div class="empty">❌ Error loading transactions</div>`;
    } finally {
        document.getElementById("loader").classList.add("hidden");
    }
}

function renderTransactions() {
    const list = document.getElementById("tx-list");
    let filtered = allTransactions;

    if (currentTab === "pending") {
        filtered = allTransactions.filter(tx => tx.status === "pending");
    } else if (currentTab === "approved") {
        filtered = allTransactions.filter(tx => tx.status === "approved");
    } else if (currentTab === "rejected") {
        filtered = allTransactions.filter(tx => tx.status === "rejected");
    }

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">📭 No transactions</div>`;
        return;
    }

    list.innerHTML = filtered.map(tx => {
        const date = new Date(tx.timestamp);
        const formattedDate = date.toLocaleDateString();
        const formattedTime = date.toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit' });

        let amountColor = tx.type === "withdraw" ? "status-negative" : "status-positive";
        let amountPrefix = tx.type === "withdraw" ? "−$" : "+$";
        let badgeClass = `badge-${tx.status || "approved"}`;

        return `
            <div class="tx-card">
                <div class="tx-left">
                    <div class="tx-type">${tx.type.toUpperCase()}</div>
                    <div class="tx-date">${formattedDate} at ${formattedTime}</div>
                    <div class="tx-meta">${tx.method || "N/A"}</div>
                </div>
                <div class="tx-right">
                    <div class="tx-amount ${amountColor}">${amountPrefix}${tx.amount}</div>
                    <div class="tx-badge ${badgeClass}">${(tx.status || "approved").toUpperCase()}</div>
                </div>
            </div>`;
    }).join("");
}

window.addEventListener("load", () => {
    loadTransactions();
});
</script>
</body>
</html>
