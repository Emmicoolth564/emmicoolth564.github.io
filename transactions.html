<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions • CryptoJet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: #020617;
    color: #e2e8f0;
    min-height: 100vh;
}

.header {
    padding: 20px 16px;
    display: flex;
    align-items: center;
    background: rgba(2,6,23,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(34,197,94,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
}
.back { font-size:28px; color:#22c55e; cursor:pointer; margin-right:8px; }
.header h3 { flex:1; text-align:center; font-size:18px; font-weight:700; }

.page-loader {
    position: fixed;
    inset: 0;
    background: #020617;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    gap: 20px;
    transition: opacity 0.4s;
}
.page-loader.hidden { opacity: 0; pointer-events: none; }
.spinner {
    width: 52px; height: 52px;
    border: 5px solid rgba(34,197,94,0.15);
    border-top: 5px solid #22c55e;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
}
.spinner-text { font-size: 14px; color: #64748b; font-weight: 500; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
    display: flex;
    gap: 6px;
    padding: 14px 16px;
    background: #020617;
    position: sticky;
    top: 65px;
    z-index: 99;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    flex-shrink: 0;
    padding: 9px 16px;
    background: #0f172a;
    border: 1.5px solid transparent;
    border-radius: 10px;
    color: #64748b;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
.tab.active {
    background: rgba(34,197,94,0.12);
    border-color: #22c55e;
    color: #22c55e;
}

.content { padding: 14px 16px 100px; }

.summary {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
}
.summary-box {
    flex: 1;
    background: #0f172a;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
}
.summary-label { font-size: 11px; color: #64748b; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
.summary-value { font-size: 17px; font-weight: 700; }

.tx-card {
    background: #0f172a;
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.06);
    animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

.tx-icon {
    width: 44px; height: 44px;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    margin-right: 14px;
    flex-shrink: 0;
}
.icon-recharge { background: rgba(34,197,94,0.12); }
.icon-withdraw  { background: rgba(239,68,68,0.12); }

.tx-left { display: flex; align-items: center; flex: 1; min-width: 0; }
.tx-info { min-width: 0; }
.tx-type  { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 3px; }
.tx-date  { font-size: 12px; color: #475569; }
.tx-method{ font-size: 12px; color: #64748b; margin-top: 2px; text-transform: capitalize; }

.tx-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
.tx-amount { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.amount-in  { color: #22c55e; }
.amount-out { color: #f87171; }

.tx-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
}
.badge-approved { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-pending  { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-rejected { background: rgba(239,68,68,0.15);  color: #f87171; }

.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
}
.mini-spinner {
    width: 36px; height: 36px;
    border: 4px solid rgba(34,197,94,0.1);
    border-top: 4px solid #22c55e;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
}
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
    <div class="spinner"></div>
    <div class="spinner-text">Loading your transactions...</div>
</div>

<div class="header">
    <div class="back" onclick="history.back()">←</div>
    <h3>Transactions</h3>
    <div style="width:36px"></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('all', this)">All</div>
    <div class="tab" onclick="switchTab('pending', this)">⏳ Pending</div>
    <div class="tab" onclick="switchTab('approved', this)">✅ Approved</div>
    <div class="tab" onclick="switchTab('rejected', this)">❌ Rejected</div>
</div>

<div class="content" id="mainContent" style="display:none">
    <div class="summary">
        <div class="summary-box">
            <div class="summary-label">Total Recharged</div>
            <div class="summary-value amount-in" id="totalIn">$0.00</div>
        </div>
        <div class="summary-box">
            <div class="summary-label">Total Withdrawn</div>
            <div class="summary-value amount-out" id="totalOut">$0.00</div>
        </div>
    </div>
    <div id="tx-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
    authDomain: "cj-miner.firebaseapp.com",
    databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const uid = localStorage.getItem("uid");
if (!uid) { alert("Please sign in first"); window.location.href = "signin.html"; }

let currentTab = "all";
let allTransactions = [];

function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    renderTransactions();
}

// ── FAST: reads only THIS user's node directly — no scan, no filter ──
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = "signin.html"; return; }
  db.ref("userTransactions/" + uid).on("value", snap => {
    const txns = snap.val() || {};
    allTransactions = Object.entries(txns)
        .map(([key, tx]) => ({
            id: key, type: tx.type || "recharge",
            method: tx.method || "bank", amount: tx.amount || 0,
            status: tx.status || "pending", timestamp: tx.date || Date.now()
        }))
        .sort((a, b) => b.timestamp - a.timestamp);
    document.getElementById("pageLoader").classList.add("hidden");
    document.getElementById("mainContent").style.display = "block";
    renderTransactions();
  });
});

function formatDateTime(ts) {
    const d = new Date(ts);
    const day = d.getDate();
    const mon = d.toLocaleString('en-NG', { month: 'short' });
    const yr  = d.getFullYear();
    let   hr  = d.getHours();
    const min = d.getMinutes().toString().padStart(2, '0');
    const ampm = hr >= 12 ? 'PM' : 'AM';
    hr = hr % 12 || 12;
    return `${day} ${mon} ${yr}  ·  ${hr}:${min} ${ampm}`;
}

function renderTransactions() {
    const list = document.getElementById("tx-list");
    const totalIn  = allTransactions.filter(t => t.type === "recharge" && t.status === "approved").reduce((s, t) => s + t.amount, 0);
    const totalOut = allTransactions.filter(t => t.type === "withdraw" && t.status === "approved").reduce((s, t) => s + t.amount, 0);
    document.getElementById("totalIn").textContent  = "$" + totalIn.toFixed(2);
    document.getElementById("totalOut").textContent = "$" + totalOut.toFixed(2);
    const filtered = currentTab === "all" ? allTransactions : allTransactions.filter(tx => tx.status === currentTab);
    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><div class="mini-spinner"></div></div>`;
        return;
    }
    list.innerHTML = filtered.map(tx => {
        const isRecharge = tx.type === "recharge";
        return `
        <div class="tx-card">
            <div class="tx-left">
                <div class="tx-icon ${isRecharge ? 'icon-recharge' : 'icon-withdraw'}">${isRecharge ? '💳' : '🏦'}</div>
                <div class="tx-info">
                    <div class="tx-type">${isRecharge ? 'Recharge' : 'Withdrawal'}</div>
                    <div class="tx-date">${formatDateTime(tx.timestamp)}</div>
                    <div class="tx-method">${tx.method}</div>
                </div>
            </div>
            <div class="tx-right">
                <div class="tx-amount ${isRecharge ? 'amount-in' : 'amount-out'}">${isRecharge ? '+' : '−'}$${Number(tx.amount).toFixed(2)}</div>
                <div class="tx-badge badge-${tx.status}">${tx.status.toUpperCase()}</div>
            </div>
        </div>`;
    }).join("");
}
</script>
</body>
</html>
