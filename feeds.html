function getAvatarColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    return avatarColors[Math.abs(hash) % avatarColors.length];
}
function getInitials(id) {
    if (!id) return "CJ";
    const parts = id.split("-");
    if (parts.length > 1) return parts[0].substring(0,2).toUpperCase();
    const letters = id.replace(/[0-9]/g,"");
    return (letters.substring(0,2) || id.substring(0,2)).toUpperCase();
}
function letterAvatar(id, size=38) {
    const color = getAvatarColor(id||"CJ");
    const initials = getInitials(id);
    return `<div class="letter-avatar" style="width:${size}px;height:${size}px;background:${color};">${initials}</div>`;
}

function timeAgo(ts) {
    const diff = Date.now() - ts;
    const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
    if (m < 1) return "just now";
    if (m < 60) return m + "m ago";
    if (h < 24) return h + "h ago";
    if (d < 7) return d + "d ago";
    return new Date(ts).toLocaleDateString();
}

function fakeCommentsForPost(postIndex, count) {
    const comments = [];
    for (let i = 0; i < count; i++) {
        const csNum = 100 + ((postIndex * 73 + i * 17 + i * i * 3) % 900);
        const minerId = "CS-" + csNum;
        const templateIdx = (postIndex * 11 + i * 7 + i) % commentTemplates.length;
        const text = commentTemplates[templateIdx];
        const hoursAgo = 24 * 30 * (1 + (i % 6)) + (i * 3);
        comments.push({ minerId, text, timestamp: Date.now() - hoursAgo * 3600000 });
    }
    return comments;
}

let liveLikes = {};

function checkUnreadBadge() {
    const lastSeen = parseInt(localStorage.getItem("lastSeenFeed") || "0");
    db.ref("feedMeta/latestTimestamp").once("value", snap => {
        const latest = snap.val() || 0;
        if (latest > lastSeen) {
            db.ref("feedPosts").orderByChild("timestamp").startAt(lastSeen + 1).once("value", snap2 => {
                const count = snap2.numChildren();
                if (count > 0) {
                    const badge = document.getElementById("feedsBadge");
                    badge.textContent = count;
                    badge.style.display = "inline-block";
                }
            });
        }
    });
}

function markFeedsAsSeen() {
    localStorage.setItem("lastSeenFeed", Date.now().toString());
    document.getElementById("feedsBadge").style.display = "none";
}

function switchTab(n) {
    currentTab = n;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
    renderContent();
}

function renderContent() {
    const content = document.getElementById('content');
    content.innerHTML = '';
    const typeMap = [null,'news','update','community','feedback'];
    const filter = typeMap[currentTab];
    const filteredLive = filter ? livePosts.filter(p => p.type === filter) : livePosts;
    const filteredStatic = filter ? staticPosts.filter(p => p.type === filter) : staticPosts;

    if (filteredLive.length > 0) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = 'New Posts';
        content.appendChild(label);
        filteredLive.forEach((post, i) => renderCard(post, content, true, i));
    }

    if (filteredStatic.length > 0) {
        if (filteredLive.length > 0) {
            const label2 = document.createElement('div');
            label2.className = 'section-label';
            label2.style.marginTop = '20px';
            label2.textContent = 'Older Posts';
            content.appendChild(label2);
        }
        filteredStatic.forEach((post, i) => renderCard(post, content, false, i));
    }
}

function renderCard(post, container, isNew, index) {
    const likes = liveLikes[post.id] || post.likes || 1000;
    const liked = likedPosts[post.id];
    const card = document.createElement('div');
    card.className = 'feed-card' + (isNew ? ' new-post' : '');
    card.id = 'card-' + post.id;
    const timeLabel = isNew ? timeAgo(post.timestamp || Date.now()) : (post.time || "");
    const commentCount = post.locked ? (115 + index * 3).toLocaleString() : '...';
    const commentAction = post.locked
        ? `openLockedPost('${post.id}',${index})`
        : `openPost('${post.id}')`;

    card.innerHTML = `
        <div class="feed-header">
            <span class="cat-tag">${post.category}</span>
            <span>${timeLabel}${isNew ? '<span class="new-badge">NEW</span>' : ''}</span>
        </div>
        <div class="feed-title">${escapeHtml(post.title)}</div>
        <div class="feed-meta">
            <span class="action ${liked ? 'liked' : ''}" id="like-${post.id}" onclick="likePost('${post.id}',${post.likes||1000})">
                ❤️ <span id="likecount-${post.id}">${likes.toLocaleString()}</span>
            </span>
            <span class="action ${post.locked ? 'locked-comments' : ''}" onclick="${commentAction}">
                💬 <span id="commentcount-${post.id}">${commentCount}</span>
            </span>
        </div>
    `;
    container.appendChild(card);

    db.ref("feedLikes/" + post.id).on("value", snap => {
        const count = snap.val() || post.likes || 1000;
        liveLikes[post.id] = count;
        const el = document.getElementById("likecount-" + post.id);
        if (el) el.textContent = count.toLocaleString();
    });

    if (isNew) {
        db.ref("feedComments/" + post.id).on("value", snap => {
            const el = document.getElementById("commentcount-" + post.id);
            if (el) el.textContent = snap.numChildren().toLocaleString();
        });
    }
}

function likePost(id, defaultLikes) {
    if (likedPosts[id]) return;
    likedPosts[id] = true;
    localStorage.setItem("likedPosts", JSON.stringify(likedPosts));
    const current = liveLikes[id] || defaultLikes;
    db.ref("feedLikes/" + id).set(current + 1);
    const btn = document.getElementById("like-" + id);
    if (btn) btn.classList.add("liked");
}

function openPost(id) {
    currentOpenPostId = id;
    currentPostLocked = false;
    const post = livePosts.find(p => p.id === id);
    if (!post) return;

    document.getElementById("modal-header").innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span class="cat-tag">${post.category}</span>
            <span onclick="hideModal()" style="font-size:24px;cursor:pointer;color:#64748b;">✕</span>
        </div>
        <h2 style="font-size:18px;line-height:1.4;margin-bottom:4px;">${escapeHtml(post.title)}</h2>
        <p style="font-size:13px;color:#64748b;margin-top:6px;">${timeAgo(post.timestamp)}</p>
        <hr style="border-color:#1e2937;margin:16px 0 12px;">
        <h4 style="font-size:14px;color:#94a3b8;">Comments</h4>
    `;
    document.getElementById("comment-input-wrap").innerHTML = `
        <div class="comment-input-area">
            <input type="text" id="commentInput" placeholder="Write a comment..." maxlength="300">
            <button onclick="postComment()">Post Comment</button>
        </div>
    `;

    const scroll = document.getElementById("comments-scroll");
    scroll.innerHTML = '<div class="loading-comments">Loading...</div>';
    document.getElementById("modal").style.display = "flex";

    db.ref("feedComments/" + id).orderByChild("timestamp").on("value", snap => {
        const comments = [];
        snap.forEach(c => comments.push({ key: c.key, ...c.val() }));
        if (comments.length === 0) {
            scroll.innerHTML = '<div class="no-comments">No comments yet. Be the first! 👇</div>';
            return;
        }
        scroll.innerHTML = comments.map(c => `
            <div class="comment">
                ${letterAvatar(c.minerId)}
                <div class="comment-body">
                    <div class="comment-name">${escapeHtml(c.minerId||"Anonymous")}</div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                    <div class="comment-time">${timeAgo(c.timestamp)}</div>
                </div>
            </div>
        `).join('');
        scroll.scrollTop = scroll.scrollHeight;
    });
}

function openLockedPost(id, index) {
    currentOpenPostId = id;
    currentPostLocked = true;
    const post = staticPosts.find(p => p.id === id);
    if (!post) return;

    document.getElementById("modal-header").innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span class="cat-tag">${post.category}</span>
            <span onclick="hideModal()" style="font-size:24px;cursor:pointer;color:#64748b;">✕</span>
        </div>
        <h2 style="font-size:18px;line-height:1.4;margin-bottom:4px;">${escapeHtml(post.title)}</h2>
        <p style="font-size:13px;color:#64748b;margin-top:6px;">${post.time}</p>
        <hr style="border-color:#1e2937;margin:16px 0 12px;">
        <h4 style="font-size:14px;color:#94a3b8;">Comments</h4>
    `;
    document.getElementById("comment-input-wrap").innerHTML = `
        <div class="locked-notice">🔒 Comments are closed for older posts</div>
    `;

    const scroll = document.getElementById("comments-scroll");
    const fakeComments = fakeCommentsForPost(index, 115 + index * 3);
    scroll.innerHTML = fakeComments.map(c => `
        <div class="comment">
            ${letterAvatar(c.minerId)}
            <div class="comment-body">
                <div class="comment-name">${c.minerId}</div>
                <div class="comment-text">${c.text}</div>
                <div class="comment-time">${timeAgo(c.timestamp)}</div>
            </div>
        </div>
    `).join('');
    document.getElementById("modal").style.display = "flex";
}

function hideModal() {
    document.getElementById("modal").style.display = "none";
    if (currentOpenPostId && !currentPostLocked) {
        db.ref("feedComments/" + currentOpenPostId).off();
    }
    currentOpenPostId = null;
    currentPostLocked = false;
}

function postComment() {
    const input = document.getElementById("commentInput");
    if (!input) return;
    const text = input.value.trim();
    if (!text || !currentOpenPostId) return;
    db.ref("feedComments/" + currentOpenPostId).push({
        uid: uid,
        minerId: userMinerId,
        text: text,
        timestamp: Date.now()
    });
    input.value = "";
    toast("Comment posted!");
}

function postOwnFeed() {
    const textarea = document.getElementById("ownPost");
    const text = textarea.value.trim();
    if (!text) return toast("Write something first!");
    db.ref("feedComments/community-wall").push({
        uid: uid,
        minerId: userMinerId,
        text: text,
        timestamp: Date.now()
    });
    textarea.value = "";
    toast("Posted to the community!");
}

function escapeHtml(str) {
    return String(str||"")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 2500);
}

db.ref("feedPosts").orderByChild("timestamp").on("value", snap => {
    livePosts = [];
    snap.forEach(child => livePosts.push({ id: child.key, ...child.val() }));
    livePosts.reverse();
    renderContent();
});

checkUnreadBadge();
markFeedsAsSeen();
</script>
</body>
</html>
