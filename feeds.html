<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feeds • CryptoJet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
    --bg: #020617;
    --surface: #0c1628;
    --surface2: #111f35;
    --border: rgba(255,255,255,0.07);
    --gold: #f59e0b;
    --gold-dim: rgba(245,158,11,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --text: #e2e8f0;
    --muted: #64748b;
    --subtle: #1e3050;
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────────────────── */
.header {
    padding: 22px 20px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(2,6,23,0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 200;
}
.header-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
    background: linear-gradient(90deg, #f59e0b, #fcd34d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.feeds-badge {
    background: #ef4444;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    display: none;
    animation: badgePulse 2s infinite;
    font-family: 'DM Sans', sans-serif;
}
@keyframes badgePulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { transform: scale(1.08); box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}

/* ── TABS ─────────────────────────────────────────────────────── */
.tabs-wrap {
    background: var(--bg);
    padding: 14px 16px 12px;
    position: sticky;
    top: 63px;
    z-index: 199;
    border-bottom: 1px solid var(--border);
}
.tabs {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    color: var(--muted);
    background: var(--surface);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
}
.tab.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
}

/* ── CONTENT ─────────────────────────────────────────────────── */
.content { padding: 18px 16px 100px; }

.section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 14px 2px;
    font-family: 'DM Sans', sans-serif;
}

/* ── FEED CARD ───────────────────────────────────────────────── */
.feed-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 20px 20px 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
}
.feed-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(245,158,11,0.4), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}
.feed-card:hover::before { opacity: 1; }
.feed-card:hover { transform: translateY(-2px); border-color: rgba(245,158,11,0.2); }
.feed-card.new-post { border-color: rgba(34,197,94,0.2); }
.feed-card.new-post::before { background: linear-gradient(90deg, transparent, rgba(34,197,94,0.5), transparent); opacity: 1; }

.card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
}
.cat-tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 4px 10px;
    border-radius: 8px;
    background: var(--surface2);
    color: var(--muted);
}
.cat-tag.news     { background: rgba(59,130,246,0.12); color: #60a5fa; }
.cat-tag.update   { background: rgba(34,197,94,0.12);  color: #4ade80; }
.cat-tag.community{ background: rgba(168,85,247,0.12); color: #c084fc; }
.cat-tag.feedback { background: rgba(245,158,11,0.12); color: #fcd34d; }
.cat-tag.rewards  { background: rgba(236,72,153,0.12); color: #f472b6; }

.card-time {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
}
.new-badge {
    background: var(--green);
    color: #022c22;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.feed-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
}

/* ── REACTIONS BAR ───────────────────────────────────────────── */
.reactions-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding-top: 14px;
    border-top: 1px solid var(--border);
}

.reaction-bubble {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: var(--surface2);
    border-radius: 999px;
    font-size: 15px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.reaction-bubble:hover { background: var(--subtle); border-color: rgba(255,255,255,0.1); }
.reaction-bubble.reacted { background: var(--gold-dim); border-color: rgba(245,158,11,0.4); }
.reaction-count {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    min-width: 14px;
}
.reaction-bubble.reacted .reaction-count { color: var(--gold); }

.more-reactions-btn {
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 999px;
    font-size: 16px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
}
.more-reactions-btn:hover { background: var(--subtle); }

/* ── EMOJI PICKER ────────────────────────────────────────────── */
.emoji-picker {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px 16px 40px;
    border-top: 1px solid var(--border);
    z-index: 99999;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.emoji-picker.open { transform: translateY(0); }
.picker-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
}
.picker-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
}
.emoji-option {
    font-size: 26px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
}
.emoji-option:hover, .emoji-option:active { background: var(--subtle); transform: scale(1.2); }

.picker-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.7);
    z-index: 99998;
    display: none;
}
.picker-overlay.open { display: block; }

/* ── FLOATING EMOJI ANIMATION ────────────────────────────────── */
.float-emoji {
    position: fixed;
    font-size: 28px;
    pointer-events: none;
    z-index: 999999;
    animation: floatUp 1.2s ease forwards;
}
@keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    60%  { opacity: 1; transform: translateY(-80px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-140px) scale(0.8); }
}

/* ── LOADER ──────────────────────────────────────────────────── */
.page-loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999999;
    gap: 18px;
    transition: opacity 0.4s;
}
.page-loader.hidden { opacity: 0; pointer-events: none; }
.loader-ring {
    width: 50px; height: 50px;
    border: 4px solid rgba(245,158,11,0.15);
    border-top: 4px solid var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
}
.loader-text {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #022c22;
    padding: 11px 24px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 999999;
    pointer-events: none;
    white-space: nowrap;
}

/* ── EMPTY ───────────────────────────────────────────────────── */
.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
}
.mini-spin {
    width: 32px; height: 32px;
    border: 3px solid rgba(245,158,11,0.1);
    border-top: 3px solid var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
}
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading feeds...</div>
</div>

<div class="header">
    <div style="width:50px"></div>
    <div class="header-title">⚡ Feeds</div>
    <div class="feeds-badge" id="feedsBadge">New</div>
</div>

<div class="tabs-wrap">
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0,this)">All</div>
        <div class="tab" onclick="switchTab(1,this)">📰 News</div>
        <div class="tab" onclick="switchTab(2,this)">🔧 Updates</div>
        <div class="tab" onclick="switchTab(3,this)">👥 Community</div>
        <div class="tab" onclick="switchTab(4,this)">💬 Feedback</div>
    </div>
</div>

<div class="content" id="content"></div>

<!-- Emoji picker -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePicker()"></div>
<div class="emoji-picker" id="emojiPicker">
    <div class="picker-handle"></div>
    <div class="picker-title">React to this post</div>
    <div class="emoji-grid" id="emojiGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyC6FpkoVyWoDxnzSqC39X8_pqwoEyc7tvw",
    authDomain: "cj-miner.firebaseapp.com",
    databaseURL: "https://cj-miner-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cj-miner"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = localStorage.getItem("uid") || ("guest_" + Math.random().toString(36).slice(2,8));
let currentTab = 0;
let livePosts = [];
let myReactions = JSON.parse(localStorage.getItem("myReactions_v2") || "{}");
let currentPickerPostId = null;

// ── ALL EMOJIS for picker ─────────────────────────────────────
const ALL_EMOJIS = [
    "🔥","❤️","🚀","💎","🤑","💯","😍","🙌",
    "👏","⚡","💪","🏆","🎯","✅","😎","🤩",
    "💰","📈","🌙","⭐","🎉","🥳","😂","👍",
    "😮","🫡","🫶","❤️‍🔥","💥","✨","🌊","🦁",
    "👀","🙏","😤","💫","🤯","🔑","🏅","🎊"
];

// ── DEFAULT REACTIONS shown on each card ──────────────────────
const DEFAULT_REACTIONS = ["🔥","❤️","🚀","💎"];

// ── STATIC POSTS with real timestamps ────────────────────────
// Today = April 23, 2026
const NOW = Date.now();
const mins  = m  => m  * 60 * 1000;
const hrs   = h  => h  * 3600 * 1000;
const days  = d  => d  * 86400 * 1000;
const weeks = w  => w  * 7 * days(1);
const months = m => m  * 30 * days(1);
const years  = y => y  * 365 * days(1);

const staticPosts = [
    { id:"p1",  type:"news",      category:"Crypto News",    title:"Bitcoin ETF Inflows Hit Record $2.3 Billion This Week",           ts: NOW - mins(11)     },
    { id:"p2",  type:"update",    category:"Product Update", title:"CryptoJet v2.4 Released – Faster Withdrawals & New Miner Tiers",  ts: NOW - years(2)     },
    { id:"p3",  type:"community", category:"Top Earner",     title:"@CryptoQueenNG just earned $8,420 this month with S-900!",        ts: NOW - years(3)     },
    { id:"p4",  type:"news",      category:"Crypto News",    title:"Ethereum Pectra Upgrade Live – What Miners Need to Know",         ts: NOW - days(1)      },
    { id:"p5",  type:"community", category:"Rewards",        title:"Double Points Weekend – Refer & Earn 2x on All Miner Purchases",  ts: NOW - months(6)    },
    { id:"p6",  type:"update",    category:"Product Update", title:"USDT Withdrawals Now Instant – No More 30min Wait",               ts: NOW - months(10)   },
    { id:"p7",  type:"community", category:"Community",      title:"Share your mining journey and win $500 in rewards!",              ts: NOW - months(4)    },
    { id:"p8",  type:"news",      category:"Crypto News",    title:"Solana Hits New ATH – Is This the Next 10x?",                    ts: NOW - years(1)     },
    { id:"p9",  type:"feedback",  category:"Feedback",       title:"User suggestion: Add dark mode toggle for dashboard",             ts: NOW - days(5)      },
    { id:"p10", type:"update",    category:"Product Update", title:"New S-1500 Miner Coming Soon – 2.5x Hashrate",                   ts: NOW - months(4)    },
    { id:"p11", type:"community", category:"Community",      title:"Weekly Mining Contest – Top 10 earners get bonus USDT",           ts: NOW - weeks(4)     },
    { id:"p12", type:"news",      category:"Crypto News",    title:"Nigeria Crypto Regulation Update – Good News for Miners",         ts: NOW - weeks(1)     },
    { id:"p13", type:"community", category:"Rewards",        title:"Referral Leaderboard – Top 5 this month get free S-500",          ts: NOW - weeks(2)     },
    { id:"p14", type:"update",    category:"Product Update", title:"Bank withdrawals now support 28 Nigerian banks",                  ts: NOW - weeks(2)     },
    { id:"p15", type:"community", category:"Community",      title:"Meet our top miner from Lagos – @MiningBossNG",                   ts: NOW - weeks(3)     },
];

function timeAgo(ts) {
    const diff = Date.now() - ts;
    const s = Math.floor(diff/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
    const mo = Math.floor(d/30), y = Math.floor(d/365);
    if (s < 60)  return "just now";
    if (m < 60)  return m + "m ago";
    if (h < 24)  return h + "h ago";
    if (d < 7)   return d + "d ago";
    if (d < 30)  return Math.floor(d/7) + "w ago";
    if (mo < 12) return mo + " mo ago";
    return y + "yr" + (y > 1 ? "s" : "") + " ago";
}

function getCatClass(type) {
    const map = { news:"news", update:"update", community:"community", feedback:"feedback", rewards:"rewards" };
    return map[type] || "";
}

// ── RENDER ────────────────────────────────────────────────────
function switchTab(n, el) {
    currentTab = n;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    renderContent();
}

function renderContent() {
    const content = document.getElementById("content");
    content.innerHTML = "";

    const typeMap = [null,"news","update","community","feedback"];
    const filter  = typeMap[currentTab];

    const filteredLive   = filter ? livePosts.filter(p => p.type === filter)  : livePosts;
    const filteredStatic = filter ? staticPosts.filter(p => p.type === filter) : staticPosts;

    if (filteredLive.length === 0 && filteredStatic.length === 0) {
        content.innerHTML = `<div class="empty"><div class="mini-spin"></div></div>`;
        return;
    }

    if (filteredLive.length > 0) {
        appendLabel(content, "Latest");
        filteredLive.forEach(p => content.appendChild(buildCard(p, true)));
    }

    if (filteredStatic.length > 0) {
        if (filteredLive.length > 0) appendLabel(content, "Archive");
        filteredStatic.forEach(p => content.appendChild(buildCard(p, false)));
    }
}

function appendLabel(parent, text) {
    const el = document.createElement("div");
    el.className = "section-label";
    el.textContent = text;
    parent.appendChild(el);
}

function buildCard(post, isNew) {
    const card = document.createElement("div");
    card.className = "feed-card" + (isNew ? " new-post" : "");
    card.id = "card-" + post.id;

    const ts = post.ts || post.timestamp || Date.now();
    const timeStr = timeAgo(ts);

    card.innerHTML = `
        <div class="card-top">
            <span class="cat-tag ${getCatClass(post.type)}">${post.category}</span>
            <span class="card-time">
                ${timeStr}
                ${isNew ? '<span class="new-badge">NEW</span>' : ''}
            </span>
        </div>
        <div class="feed-title">${escHtml(post.title)}</div>
        <div class="reactions-bar" id="rxbar-${post.id}">
            <div class="empty" style="padding:4px"><div class="mini-spin" style="width:20px;height:20px;border-width:2px"></div></div>
        </div>
    `;

    // Load live reactions
    db.ref("feedReactions/" + post.id).on("value", snap => {
        renderReactionsBar(post.id, snap.val() || {});
    });

    return card;
}

function renderReactionsBar(postId, reactionsData) {
    const bar = document.getElementById("rxbar-" + postId);
    if (!bar) return;

    // Collect top reactions
    const totals = {};
    Object.values(reactionsData).forEach(userRxs => {
        Object.entries(userRxs).forEach(([emoji, val]) => {
            if (val) totals[emoji] = (totals[emoji] || 0) + 1;
        });
    });

    // Show default emojis + any extras with count > 0
    const shown = new Set([...DEFAULT_REACTIONS]);
    Object.keys(totals).forEach(e => shown.add(e));
    const myRx = (myReactions[postId] || {});

    bar.innerHTML = "";
    [...shown].slice(0, 8).forEach(emoji => {
        const count = totals[emoji] || 0;
        const reacted = !!myRx[emoji];
        const btn = document.createElement("div");
        btn.className = "reaction-bubble" + (reacted ? " reacted" : "");
        btn.innerHTML = `${emoji} <span class="reaction-count">${count > 0 ? formatCount(count) : ""}</span>`;
        btn.onclick = (e) => toggleReaction(postId, emoji, e);
        bar.appendChild(btn);
    });

    // More button
    const moreBtn = document.createElement("div");
    moreBtn.className = "more-reactions-btn";
    moreBtn.innerHTML = "＋";
    moreBtn.onclick = () => openPicker(postId);
    bar.appendChild(moreBtn);
}

function formatCount(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1).replace(".0","") + "M";
    if (n >= 1000)    return (n/1000).toFixed(1).replace(".0","") + "K";
    return n;
}

function toggleReaction(postId, emoji, e) {
    if (!myReactions[postId]) myReactions[postId] = {};
    const already = myReactions[postId][emoji];

    if (already) {
        myReactions[postId][emoji] = false;
        db.ref(`feedReactions/${postId}/${uid}/${encodeEmoji(emoji)}`).set(false);
    } else {
        myReactions[postId][emoji] = true;
        db.ref(`feedReactions/${postId}/${uid}/${encodeEmoji(emoji)}`).set(true);
        // Float emoji
        floatEmoji(emoji, e);
    }
    localStorage.setItem("myReactions_v2", JSON.stringify(myReactions));
}

function encodeEmoji(emoji) {
    // Firebase keys can't have special chars — use codepoints
    return [...emoji].map(c => c.codePointAt(0).toString(16)).join("_");
}

function floatEmoji(emoji, e) {
    const el = document.createElement("div");
    el.className = "float-emoji";
    el.textContent = emoji;
    const x = e ? e.clientX : window.innerWidth / 2;
    const y = e ? e.clientY : window.innerHeight / 2;
    el.style.left = (x - 14) + "px";
    el.style.top  = (y - 14) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
}

// ── EMOJI PICKER ──────────────────────────────────────────────
function openPicker(postId) {
    currentPickerPostId = postId;
    const grid = document.getElementById("emojiGrid");
    grid.innerHTML = ALL_EMOJIS.map(e => `
        <div class="emoji-option" onclick="pickEmoji('${e}', event)">${e}</div>
    `).join("");
    document.getElementById("emojiPicker").classList.add("open");
    document.getElementById("pickerOverlay").classList.add("open");
}
function closePicker() {
    document.getElementById("emojiPicker").classList.remove("open");
    document.getElementById("pickerOverlay").classList.remove("open");
    currentPickerPostId = null;
}
function pickEmoji(emoji, e) {
    if (!currentPickerPostId) return;
    toggleReaction(currentPickerPostId, emoji, e);
    closePicker();
}

// ── HELPERS ───────────────────────────────────────────────────
function escHtml(s) {
    return String(s||"")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 2500);
}

// ── UNREAD BADGE ──────────────────────────────────────────────
function checkBadge() {
    const lastSeen = parseInt(localStorage.getItem("lastSeenFeed") || "0");
    db.ref("feedPosts").orderByChild("timestamp").startAt(lastSeen + 1).once("value", snap => {
        const count = snap.numChildren();
        if (count > 0) {
            const badge = document.getElementById("feedsBadge");
            badge.textContent = count + " new";
            badge.style.display = "inline-block";
        }
    });
}
function markSeen() {
    localStorage.setItem("lastSeenFeed", Date.now().toString());
    document.getElementById("feedsBadge").style.display = "none";
}

// ── BOOT ──────────────────────────────────────────────────────
db.ref("feedPosts").orderByChild("timestamp").on("value", snap => {
    livePosts = [];
    snap.forEach(c => livePosts.push({ id: c.key, ...c.val() }));
    livePosts.reverse();

    document.getElementById("pageLoader").classList.add("hidden");
    renderContent();
});

// If no live posts arrive quickly, still hide loader and show static
setTimeout(() => {
    document.getElementById("pageLoader").classList.add("hidden");
    if (livePosts.length === 0) renderContent();
}, 2500);

checkBadge();
markSeen();
</script>
</body>
</html>
